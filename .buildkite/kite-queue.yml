# Kite — CI pipeline for kite-* branches.
#
# kite-queue-* branches: run tests, then rebase and push to main.
# kite-test-*  branches: run tests only.
#
# Change detection (like GHA queue-main.yml):
#   shelley/* changed  → run shelley tests
#   other files changed → run exe tests (checks, unit, e1e)
#   both changed       → run both

agents:
  queue: exe-ci

steps:
  - label: ":mag: detect changes"
    key: detect
    command: .buildkite/steps/detect-changes.sh
    timeout_in_minutes: 2

  - label: ":clipboard: commit validation"
    key: commit-validation
    command: .buildkite/steps/commit-validation.sh
    timeout_in_minutes: 5

  - label: ":white_check_mark: non-e1e checks"
    key: checks
    depends_on: detect
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      .buildkite/steps/test-non-e1e-checks.sh
    timeout_in_minutes: 20

  - label: ":go: unit tests (execore A-H)"
    key: unit-a
    depends_on: detect
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      .buildkite/steps/test-non-e1e-tests.sh
    timeout_in_minutes: 20
    env:
      UNIT_TEST_SHARD: A

  - label: ":go: unit tests (other pkgs)"
    key: unit-b
    depends_on: detect
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      .buildkite/steps/test-non-e1e-tests.sh
    timeout_in_minutes: 20
    env:
      UNIT_TEST_SHARD: B

  - label: ":go: unit tests (execore I-P)"
    key: unit-c
    depends_on: detect
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      .buildkite/steps/test-non-e1e-tests.sh
    timeout_in_minutes: 20
    env:
      UNIT_TEST_SHARD: C

  - label: ":go: unit tests (execore Q-Z)"
    key: unit-d
    depends_on: detect
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      .buildkite/steps/test-non-e1e-tests.sh
    timeout_in_minutes: 20
    env:
      UNIT_TEST_SHARD: D

  - label: ":wrench: build e1e binaries"
    key: build-e1e
    depends_on: detect
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      python3 .buildkite/steps/build-e1e-binaries.py
    timeout_in_minutes: 10

  - label: ":rocket: e1e tests (A-N)"
    key: test-e1e-1
    depends_on: build-e1e
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      python3 .buildkite/steps/test-e1e.py
    timeout_in_minutes: 20
    env:
      VM_DRIVER: cloudhypervisor
      E1E_SHARD: "1"
      E1E_RUN_FILTER: "^Test[A-Na-n]"
    artifact_paths:
      - "recordings-1.html"
      - "e1e-results-1.json"
      - "e1e-logs-1/**/*"

  - label: ":rocket: e1e tests (O-S)"
    key: test-e1e-2
    depends_on: build-e1e
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      python3 .buildkite/steps/test-e1e.py
    timeout_in_minutes: 20
    env:
      VM_DRIVER: cloudhypervisor
      E1E_SHARD: "2"
      E1E_RUN_FILTER: "^Test[O-So-s]"
    artifact_paths:
      - "recordings-2.html"
      - "e1e-results-2.json"
      - "e1e-logs-2/**/*"

  - label: ":rocket: e1e tests (T-Z)"
    key: test-e1e-3
    depends_on: build-e1e
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      python3 .buildkite/steps/test-e1e.py
    timeout_in_minutes: 20
    env:
      VM_DRIVER: cloudhypervisor
      E1E_SHARD: "3"
      E1E_RUN_FILTER: "^Test[T-Zt-z]"
    artifact_paths:
      - "recordings-3.html"
      - "e1e-results-3.json"
      - "e1e-logs-3/**/*"

  - label: ":electric_plug: e1e exelets"
    key: test-exelets
    depends_on: build-e1e
    command: |
      if [ "$(buildkite-agent meta-data get exe_changed)" != "true" ]; then
        echo "No exe changes, skipping"
        exit 0
      fi
      python3 .buildkite/steps/test-e1e-exelets.py
    timeout_in_minutes: 15
    env:
      VM_DRIVER: cloudhypervisor
    artifact_paths:
      - "e1e-results-exelets.json"
      - "e1e-logs-exelets/**/*"

  - label: ":robot_face: shelley go + UI checks"
    key: test-shelley
    depends_on: detect
    command: |
      if [ "$(buildkite-agent meta-data get shelley_changed)" != "true" ]; then
        echo "No shelley changes, skipping"
        exit 0
      fi
      .buildkite/steps/test-shelley.sh
    timeout_in_minutes: 20

  - label: ":performing_arts: shelley playwright"
    key: test-shelley-playwright
    depends_on: detect
    command: |
      if [ "$(buildkite-agent meta-data get shelley_changed)" != "true" ]; then
        echo "No shelley changes, skipping"
        exit 0
      fi
      .buildkite/steps/test-shelley-playwright.sh
    timeout_in_minutes: 20
    artifact_paths:
      - "shelley/ui/playwright-report/**/*"
      - "shelley/ui/test-results/**/*"

  - label: ":art: format"
    key: format
    depends_on:
      - commit-validation
      - checks
      - unit-a
      - unit-b
      - unit-c
      - unit-d
      - test-e1e-1
      - test-e1e-2
      - test-e1e-3
      - test-exelets
      - test-shelley
      - test-shelley-playwright
    command: .buildkite/steps/format-and-push.sh
    timeout_in_minutes: 10

  - label: ":shipit: rebase and push to main"
    key: push-to-main
    depends_on: format
    branches: "kite-queue-*"
    command: python3 .buildkite/steps/rebase-and-push.py
    timeout_in_minutes: 5
    retry:
      automatic:
        - exit_status: 1
          limit: 1

  - label: ":slack: notify"
    key: notify
    depends_on:
      - commit-validation
      - checks
      - unit-a
      - unit-b
      - unit-c
      - unit-d
      - test-e1e-1
      - test-e1e-2
      - test-e1e-3
      - test-exelets
      - test-shelley
      - test-shelley-playwright
      - format
      - push-to-main
    allow_dependency_failure: true
    branches: "kite-queue-*"
    command: python3 .buildkite/steps/notify-slack.py
    timeout_in_minutes: 2
    soft_fail: true
