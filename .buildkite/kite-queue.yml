# Kite Queue — lightweight commit queue for testing CI changes.
#
# Push to kite-queue-* branches. On success, force-pushes to kite-main.
# These are temporary branches; it's OK to override them.
#
# To set up this pipeline in Buildkite:
#   1. Create a new pipeline "exe-kite-queue" in the bold-software org
#   2. Set the repository to the exe repo
#   3. Set branch filter to: kite-queue-*
#   4. Set the bootstrap command to:
#      buildkite-agent pipeline upload .buildkite/kite-queue.yml
#   5. Set the agent queue to: exe-ci

agents:
  queue: exe-ci

steps:
  - label: ":white_check_mark: non-e1e checks"
    key: checks
    command: .buildkite/steps/test-non-e1e-checks.sh
    timeout_in_minutes: 20

  - label: ":go: unit tests"
    key: unit-tests
    command: .buildkite/steps/test-non-e1e-tests.sh
    timeout_in_minutes: 20

  - label: ":wrench: build e1e binaries"
    key: build-e1e
    command: python3 .buildkite/steps/build-e1e-binaries.py
    timeout_in_minutes: 10

  - label: ":rocket: e1e tests"
    key: test-e1e
    depends_on: build-e1e
    command: python3 .buildkite/steps/test-e1e.py
    timeout_in_minutes: 30
    env:
      VM_DRIVER: cloudhypervisor
    artifact_paths:
      - "recordings.html"
      - "e1e-logs/**/*"

  - label: ":electric_plug: e1e exelets"
    key: test-exelets
    depends_on: build-e1e
    command: python3 .buildkite/steps/test-e1e-exelets.py
    timeout_in_minutes: 15
    env:
      VM_DRIVER: cloudhypervisor
    artifact_paths:
      - "e1e-logs-exelets/**/*"

  - label: ":arrow_right: push to kite-main"
    key: push-to-kite-main
    depends_on:
      - checks
      - unit-tests
      - test-e1e
      - test-exelets
    command: |
      echo "All tests passed. Pushing to kite-main..."
      git push --force origin HEAD:refs/heads/kite-main
    timeout_in_minutes: 5
