- label: ":wrench: build e1e binaries"
  key: build-e1e
  command: python3 .buildkite/steps/build-e1e-binaries.py
  timeout_in_minutes: 10

- label: ":camera: ensure VM snapshot"
  key: ensure-snapshot
  command: .buildkite/steps/ensure-snapshot.sh
  timeout_in_minutes: 10

# non-e1e checks depend on build-e1e to stagger CPU usage: the Go compile in
# build-e1e is CPU-hungry, and these checks (vet, build-only tests) are too.
# Running them serially via this dep keeps wall-clock down off-critical-path.
- label: ":white_check_mark: non-e1e checks"
  key: checks
  depends_on: build-e1e
  command: .buildkite/steps/test-non-e1e-checks.sh
  timeout_in_minutes: 20

# Unit tests depend on build-e1e (not format) to stagger CPU usage.
# build-e1e saturates the CPU during its 10-12s window; delaying unit tests
# until after it finishes reduces contention with the concurrent compile.
# They're not on the critical path (longest unit shard ~71s, critical path
# is e1e migration ~95-100s).
- label: ":go: unit tests (execore A-H)"
  key: unit-a
  depends_on: build-e1e
  command: .buildkite/steps/test-non-e1e-tests.sh
  timeout_in_minutes: 20
  env:
    UNIT_TEST_SHARD: A
  artifact_paths:
    - "unit-results-*.json"
    - "unit-results-*.xml"
    - "test-gantt-unit-*.html"
    - "coverage-unit-*.txt"

- label: ":go: unit tests (other pkgs)"
  key: unit-b
  depends_on: build-e1e
  command: .buildkite/steps/test-non-e1e-tests.sh
  timeout_in_minutes: 20
  env:
    UNIT_TEST_SHARD: B
  artifact_paths:
    - "unit-results-*.json"
    - "unit-results-*.xml"
    - "test-gantt-unit-*.html"
    - "coverage-unit-*.txt"

- label: ":go: unit tests (execore I-P)"
  key: unit-c
  depends_on: build-e1e
  command: .buildkite/steps/test-non-e1e-tests.sh
  timeout_in_minutes: 20
  env:
    UNIT_TEST_SHARD: C
  artifact_paths:
    - "unit-results-*.json"
    - "unit-results-*.xml"
    - "test-gantt-unit-*.html"
    - "coverage-unit-*.txt"

- label: ":go: unit tests (execore Q-Z)"
  key: unit-d
  depends_on: build-e1e
  command: .buildkite/steps/test-non-e1e-tests.sh
  timeout_in_minutes: 20
  env:
    UNIT_TEST_SHARD: D
  artifact_paths:
    - "unit-results-*.json"
    - "unit-results-*.xml"
    - "test-gantt-unit-*.html"
    - "coverage-unit-*.txt"

# e1e shard steps and exelets step are generated dynamically
# by generate-pipeline.py based on E1E_SHARDS / E1E_VM_CONCURRENCY env vars.
