- label: ":wrench: build e1e binaries"
  key: build-e1e
  command: python3 .buildkite/steps/build-e1e-binaries.py
  timeout_in_minutes: 10

- label: ":camera: ensure VM snapshot"
  key: ensure-snapshot
  command: .buildkite/steps/ensure-snapshot.sh
  timeout_in_minutes: 10

- label: ":white_check_mark: non-e1e checks"
  key: checks
  command: .buildkite/steps/test-non-e1e-checks.sh
  timeout_in_minutes: 20

- label: ":go: unit tests (execore A-H)"
  key: unit-a
  command: .buildkite/steps/test-non-e1e-tests.sh
  timeout_in_minutes: 20
  env:
    UNIT_TEST_SHARD: A
  artifact_paths:
    - "unit-results-*.json"
    - "unit-results-*.xml"
    - "test-gantt-unit-*.html"
    - "coverage-unit-*.txt"

- label: ":go: unit tests (other pkgs)"
  key: unit-b
  command: .buildkite/steps/test-non-e1e-tests.sh
  timeout_in_minutes: 20
  env:
    UNIT_TEST_SHARD: B
  artifact_paths:
    - "unit-results-*.json"
    - "unit-results-*.xml"
    - "test-gantt-unit-*.html"
    - "coverage-unit-*.txt"

- label: ":go: unit tests (execore I-P)"
  key: unit-c
  command: .buildkite/steps/test-non-e1e-tests.sh
  timeout_in_minutes: 20
  env:
    UNIT_TEST_SHARD: C
  artifact_paths:
    - "unit-results-*.json"
    - "unit-results-*.xml"
    - "test-gantt-unit-*.html"
    - "coverage-unit-*.txt"

- label: ":go: unit tests (execore Q-Z)"
  key: unit-d
  command: .buildkite/steps/test-non-e1e-tests.sh
  timeout_in_minutes: 20
  env:
    UNIT_TEST_SHARD: D
  artifact_paths:
    - "unit-results-*.json"
    - "unit-results-*.xml"
    - "test-gantt-unit-*.html"
    - "coverage-unit-*.txt"

# e1e shard steps and exelets step are generated dynamically
# by generate-pipeline.py based on E1E_SHARDS / E1E_VM_CONCURRENCY env vars.
