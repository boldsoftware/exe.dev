- label: ":shipit: rebase and push to main"
  key: push-to-main
  depends_on: __ALL_DEPS__
  command: python3 .buildkite/steps/rebase-and-push.py
  timeout_in_minutes: 10
  retry:
    automatic:
      - exit_status: 1
        limit: 1

- label: ":slack: notify"
  key: notify
  depends_on: __ALL_DEPS_PLUS_PUSH__
  allow_dependency_failure: true
  command: python3 .buildkite/steps/notify-slack.py
  timeout_in_minutes: 2
  soft_fail: true
