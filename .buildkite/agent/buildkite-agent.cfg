# Buildkite agent config for exe-ci-01.
# Installed at /etc/buildkite-agent/buildkite-agent.cfg
#
# The token must be replaced with the real cluster token from
# Buildkite → Organization → Clusters → Default cluster → exe-ci queue.

name="%hostname-%spawn"
spawn=16
token="bkct_REPLACE_ME"
# The hostname=<host> tag pins all jobs of a single build to one machine
# (see generate-pipeline.py). Replace exe-ci-01 with the actual hostname
# when installing on a new CI host.
tags="queue=exe-ci,hostname=exe-ci-01"
build-path="/data/buildkite/builds"
hooks-path="/etc/buildkite-agent/hooks"
plugins-path="/etc/buildkite-agent/plugins"
git-mirrors-path="/data/buildkite/git-mirrors"
