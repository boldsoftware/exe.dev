# This file mirrors the Buildkite pipeline configuration.
# The actual entrypoint is configured in the Buildkite UI to run
# generate-pipeline.py directly, skipping an extra upload step.
agents:
  queue: exe-ci

steps:
  - label: ":pipeline: Generate pipeline"
    # --async returns immediately; child steps get scheduled as soon as the
    # agent's pipeline processor picks them up, saving ~5s of "processing"
    # poll wait on the critical path.
    command: python3 .buildkite/steps/generate-pipeline.py | buildkite-agent pipeline upload --async
    timeout_in_minutes: 5
