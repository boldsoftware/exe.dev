<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico">
    <title>Jobs - exe.dev</title>
    <meta name="description" content="Jobs at exe.dev">
    <link rel="canonical" href="https://exe.dev/jobs">
    <meta property="og:title" content="Jobs - exe.dev">
    <meta property="og:description" content="Jobs at exe.dev">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://exe.dev/jobs">
    <meta property="og:site_name" content="exe.dev">
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
            overflow-x: hidden;
        }
        h1 {
            font-size: clamp(70px, 14vw, 140px);
            line-height: 0.9;
            margin-bottom: 40px;
            font-weight: normal;
            letter-spacing: -0.02em;
        }
        main {
            max-width: 720px;
            text-align: left;
            line-height: 1.7;
        }
        main * {
            margin: 0 auto 1em;
        }
        .intro-art {
            float: right;
            width: 40%;
            max-width: 280px;
            height: auto;
            margin: 0 0 1em 20px;
        }
        .intro-clear { clear: both; }
        hr {
            width: 200px;
            height: 40px;
            border: 0;
            margin: 40px auto;
            position: relative;
            opacity: 0.4;
        }
        hr::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--color-text-secondary) 20%, var(--color-text-secondary) 80%, transparent 100%);
        }
        hr::after {
            content: '❦';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            background: var(--color-bg);
            padding: 0 10px;
            color: var(--color-text-secondary);
        }
        nav {
            margin-top: 50px;
            text-align: center;
        }
        nav a {
            display: inline-block;
            font-size: var(--text-sm);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-variant: small-caps;
            color: var(--color-text-secondary);
        }
        nav a + a::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.6;
            margin: 0 12px 2px;
            vertical-align: middle;
        }
        @media (max-width: 700px) {
            .intro-art {
                float: none;
                display: block;
                margin: 0 auto 1em;
                width: 60%;
                max-width: 300px;
            }
        }
        @media (max-width: 600px) {
            hr { transform: scale(0.8); margin: 30px auto; }
            nav a { font-size: var(--text-xxs); letter-spacing: 0.2em; }
            nav a + a::before { margin: 0 8px 2px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>jobs</h1>
    </header>
    <main>
        <img src="exy-hardhat.png" alt="exy hardhat" class="intro-art">
        <p>
            We are not currently hiring, but we make exceptions for exceptional people.
        </p>
        <p>
            Write to <code>david@bold.dev</code>.
        </p>
        <div class="intro-clear"></div>

        <hr/>

        <nav>
            <a href="/docs/what-is-exe">about</a>
            <a href="/blog">blog</a>
            <a href="/jobs">jobs</a>
        </nav>
    </main>
</body>
</html>
