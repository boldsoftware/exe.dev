# THIS FILE IS UNDER SOURCE CONTROL at exe.git/observability/...
#
# NOTE: Exelet/replica/exe-ctr targets are auto-discovered from tailscale
# by discover-exelets.py (runs every 5min via systemd timer) and written
# to /etc/prometheus/targets/*.json. Both this file and otel-collector-config.yml
# reference the same file_sd target files.

global:
  scrape_interval: 30s
  scrape_timeout: 30s # Heavy nodes can stall on /proc/net/dev due to RTNL lock contention.
  evaluation_interval: 30s

scrape_configs:
  - job_name: "grafana"
    scheme: 'https'
    static_configs:
      - targets: ["grafana.crocodile-vector.ts.net"]
    metrics_path: '/metrics'

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: 'node'
    static_configs:
      - targets:
        - 'mon:9100'
        labels:
          stage: 'production'
      - targets:
        - 'exed-02:19100'  # exed listens on most ports for proxy, so use 10000+9100
        labels:
          stage: 'production'
          role: 'exed'
      - targets:
        - 'exeprox-atl-na-01:19100'  # exeprox listens on 3000-9999 for proxy, so use 10000+9100
        - 'exeprox-dxb-na-01:19100'
        - 'exeprox-jnb-na-01:19100'
        - 'exeprox-na-chi-01:19100'
        - 'exeprox-na-dfw-01:19100'
        - 'exeprox-na-fra-01:19100'
        - 'exeprox-na-gru-01:19100'
        - 'exeprox-na-hkg-01:19100'
        - 'exeprox-na-iad-01:19100'
        - 'exeprox-na-lax-01:19100'
        - 'exeprox-na-lga-01:19100'
        - 'exeprox-na-lhr-01:19100'
        - 'exeprox-na-mia-01:19100'
        - 'exeprox-na-otp-01:19100'
        - 'exeprox-na-sin-01:19100'
        - 'exeprox-na-sjc-01:19100'
        - 'exeprox-na-syd-01:19100'
        - 'exeprox-na-tyo-01:19100'
        - 'exeprox-pdx-na-01:19100'
        - 'exeprox-sea-na-01:19100'
        - 'exeprox-yyz-na-01:19100'
        labels:
          stage: 'production'
          role: 'exeprox'
      - targets:
        - 'exed-staging-01:19100'  # exed listens on most ports for proxy, so use 10000+9100
        labels:
          stage: 'staging'
          role: 'exed'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/node-exelets-prod.json'
          - '/etc/prometheus/targets/node-exelets-staging.json'

  - job_name: 'exed'
    scheme: https
    static_configs:
      - targets: ["exed-02.crocodile-vector.ts.net"]
        labels:
          stage: 'production'
      - targets: ["exed-staging-01.crocodile-vector.ts.net"]
        labels:
          stage: 'staging'
    metrics_path: '/metrics'

  - job_name: 'blogd'
    scheme: https
    static_configs:
      - targets: ["blog.exe.dev"]
        labels:
          stage: 'production'
    metrics_path: '/metrics'

  - job_name: 'sshpiperd'
    scheme: http
    static_configs:
      - targets: ["exed-02:30303"]
        labels:
          stage: 'production'
          role: 'exed'
      - targets:
        - 'exeprox-atl-na-01:30303'
        - 'exeprox-dxb-na-01:30303'
        - 'exeprox-jnb-na-01:30303'
        - 'exeprox-na-chi-01:30303'
        - 'exeprox-na-dfw-01:30303'
        - 'exeprox-na-fra-01:30303'
        - 'exeprox-na-gru-01:30303'
        - 'exeprox-na-hkg-01:30303'
        - 'exeprox-na-iad-01:30303'
        - 'exeprox-na-lax-01:30303'
        - 'exeprox-na-lga-01:30303'
        - 'exeprox-na-lhr-01:30303'
        - 'exeprox-na-mia-01:30303'
        - 'exeprox-na-otp-01:30303'
        - 'exeprox-na-sin-01:30303'
        - 'exeprox-na-sjc-01:30303'
        - 'exeprox-na-syd-01:30303'
        - 'exeprox-na-tyo-01:30303'
        - 'exeprox-pdx-na-01:30303'
        - 'exeprox-sea-na-01:30303'
        - 'exeprox-yyz-na-01:30303'
        labels:
          stage: 'production'
          role: 'exeprox'
      - targets: ["exed-staging-01:30303"]
        labels:
          stage: 'staging'
          role: 'exed'
    metrics_path: '/metrics'

  - job_name: 'exelet'
    scheme: http
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/exelet-prod.json'
          - '/etc/prometheus/targets/exelet-staging.json'
    metrics_path: '/metrics'

  - job_name: 'exeprox'
    scheme: https
    static_configs:
      - targets: ["exeprox-atl-na-01.crocodile-vector.ts.net", "exeprox-dxb-na-01.crocodile-vector.ts.net", "exeprox-jnb-na-01.crocodile-vector.ts.net", "exeprox-na-chi-01.crocodile-vector.ts.net", "exeprox-na-dfw-01.crocodile-vector.ts.net", "exeprox-na-fra-01.crocodile-vector.ts.net", "exeprox-na-gru-01.crocodile-vector.ts.net", "exeprox-na-hkg-01.crocodile-vector.ts.net", "exeprox-na-iad-01.crocodile-vector.ts.net", "exeprox-na-lax-01.crocodile-vector.ts.net", "exeprox-na-lga-01.crocodile-vector.ts.net", "exeprox-na-lhr-01.crocodile-vector.ts.net", "exeprox-na-mia-01.crocodile-vector.ts.net", "exeprox-na-otp-01.crocodile-vector.ts.net", "exeprox-na-sin-01.crocodile-vector.ts.net", "exeprox-na-sjc-01.crocodile-vector.ts.net", "exeprox-na-syd-01.crocodile-vector.ts.net", "exeprox-na-tyo-01.crocodile-vector.ts.net", "exeprox-pdx-na-01.crocodile-vector.ts.net", "exeprox-sea-na-01.crocodile-vector.ts.net", "exeprox-yyz-na-01.crocodile-vector.ts.net"]
        labels:
          stage: 'production'
    metrics_path: '/metrics'

  - job_name: 'metricsd'
    scheme: http
    static_configs:
      - targets: ["exed-02.crocodile-vector.ts.net:21090"]
        labels:
          stage: 'production'
      - targets: ["exed-staging-01.crocodile-vector.ts.net:21090"]
        labels:
          stage: 'staging'
    metrics_path: '/metrics'

  - job_name: 'yace'
    scheme: http
    static_configs:
      - targets: ["mon:5000"]
    metrics_path: '/metrics'

  - job_name: 'otel-collector'
    scheme: http
    static_configs:
      - targets: ["mon:8888"]
    metrics_path: '/metrics'

  - job_name: 'rummyd'
    scheme: http
    static_configs:
      - targets: ["mon:9099"]
    metrics_path: '/metrics'

  - job_name: 'rollcalld'
    scheme: http
    static_configs:
      - targets: ["mon:9098"]
    metrics_path: '/metrics'

  - job_name: 'exe-ops'
    scheme: http
    static_configs:
      - targets: ["exe-ops:9100", "exe-ops-staging:9100"]
    metrics_path: '/metrics'

