# THIS FILE IS UNDER SOURCE CONTROL at exe.git/observability/...
#
# NOTE: Scrape configs are duplicated in otel-collector-config.yml for
# forwarding metrics to S3. When updating targets, update both files to
# keep them in sync.

global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.

scrape_configs:
  - job_name: "grafana"
    scheme: 'https'
    static_configs:
      - targets: ["grafana.crocodile-vector.ts.net"]
    metrics_path: '/metrics'

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: 'node'
    static_configs:
      - targets:
        - 'sketch-01:9100'
        - 'mon:9100'
        - 'sketch-dev:9100'
        - 'docker-01:9100'
        - 'docker-02:9100'
        - 'ci.crocodile-vector.ts.net:9100'
        labels:
          stage: 'production'
      - targets:
        - 'exed-02:19100'  # exed listens on most ports for proxy, so use 10000+9100
        labels:
          stage: 'production'
          role: 'exed'
      - targets:
        - 'exe-ctr-03:9100'
        - 'exe-ctr-04:9100'
        - 'exe-ctr-05:9100'
        - 'exe-ctr-07:9100'
        - 'exe-ctr-08:9100'
        - 'exe-ctr-09:9100'
        - 'exe-ctr-10:9100'
        - 'exe-ctr-11:9100'
        - 'exe-ctr-12:9100'
        - 'exe-ctr-13:9100'
        - 'exe-ctr-14:9100'
        - 'exe-ctr-15:9100'
        - 'exe-ctr-16:9100'
        - 'exe-ctr-18:9100'
        - 'exe-ctr-19:9100'
        - 'exelet-lax2-prod-01:9100'
        - 'exelet-lax2-prod-02:9100'
        - 'exelet-lax-prod-03:9100'
        - 'exelet-lax-prod-04:9100'
        - 'exelet-nyc-prod-01:9100'
        - 'exelet-nyc-prod-02:9100'
        - 'exelet-nyc-prod-03:9100'
        - 'exelet-tyo4-prod-01:9100'
        - 'exelet-lon2-prod-01:9100'
        labels:
          stage: 'production'
          role: 'exelet'
      - targets:
        - 'exeprox-lax2-prod-01'
        - 'exeprox-dal-prod-01'
        - 'exeprox-fra2-prod-01'
        - 'exeprox-lon2-prod-01'
        - 'exeprox-nyc-prod-01'
        - 'exeprox-sjc2-prod-01'
        - 'exeprox-syd2-prod-01'
        - 'exeprox-tyo4-prod-01'
        labels:
          stage: 'production'
          role: 'exeprox'
      - targets:
        - 'exed-staging-01:19100'  # exed listens on most ports for proxy, so use 10000+9100
        labels:
          stage: 'staging'
          role: 'exed'
      - targets:
        - 'exelet-lax2-staging-01:9100'
        - 'exelet-lax2-staging-02:9100'
        - 'exelet-nyc-staging-01:9100'
        labels:
          stage: 'staging'
          role: 'exelet'

  - job_name: 'authd'
    static_configs:
      - targets: ["sketch-01:3001"]
    metrics_path: '/authd/metrics'

  - job_name: 'merde'
    scheme: 'https'
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["merde"]
    metrics_path: '/metrics'

  - job_name: 'skabandd'
    scheme: https
    static_configs:
      - targets: ["sketch-dev.crocodile-vector.ts.net"]
    metrics_path: '/debug/metrics'

  - job_name: 'exed'
    scheme: https
    static_configs:
      - targets: ["exed-02.crocodile-vector.ts.net"]
        labels:
          stage: 'production'
      - targets: ["exed-staging-01.crocodile-vector.ts.net"]
        labels:
          stage: 'staging'
    metrics_path: '/metrics'

  - job_name: 'blogd'
    scheme: https
    static_configs:
      - targets: ["blog.exe.dev"]
        labels:
          stage: 'production'
    metrics_path: '/metrics'

  - job_name: 'sshpiperd'
    scheme: http
    static_configs:
      - targets: ["exed-02:30303"]
        labels:
          stage: 'production'
          role: 'exed'
      - targets:
        - 'exeprox-lax2-prod-01:30303'
        - 'exeprox-dal-prod-01:30303'
        - 'exeprox-fra2-prod-01:30303'
        - 'exeprox-lon2-prod-01:30303'
        - 'exeprox-nyc-prod-01:30303'
        - 'exeprox-sjc2-prod-01:30303'
        - 'exeprox-syd2-prod-01:30303'
        - 'exeprox-tyo4-prod-01:30303'
        labels:
          stage: 'production'
          role: 'exeprox'
      - targets: ["exed-staging-01:30303"]
        labels:
          stage: 'staging'
          role: 'exed'
    metrics_path: '/metrics'

  - job_name: 'exelet'
    scheme: http
    static_configs:
      - targets: ["exe-ctr-03:9081", "exe-ctr-04:9081", "exe-ctr-05:9081", "exe-ctr-07:9081", "exe-ctr-08:9081", "exe-ctr-09:9081", "exe-ctr-10:9081", "exe-ctr-11:9081", "exe-ctr-12:9081", "exe-ctr-13:9081", "exe-ctr-14:9081", "exe-ctr-15:9081", "exe-ctr-16:9081", "exe-ctr-18:9081", "exe-ctr-19:9081", "exelet-lax2-prod-01:9081", "exelet-lax2-prod-02:9081", "exelet-lax-prod-03:9081", "exelet-lax-prod-04:9081", "exelet-nyc-prod-01:9081", "exelet-nyc-prod-02:9081", "exelet-nyc-prod-03:9081", "exelet-tyo4-prod-01:9081", "exelet-lon2-prod-01:9081"]
        labels:
          stage: 'production'
      - targets: ["exelet-lax2-staging-01:9081", "exelet-lax2-staging-02:9081", "exelet-nyc-staging-01:9081"]
        labels:
          stage: 'staging'
    metrics_path: '/metrics'

  - job_name: 'metricsd'
    scheme: http
    static_configs:
      - targets: ["exed-02.crocodile-vector.ts.net:21090"]
        labels:
          stage: 'production'
      - targets: ["exed-staging-01.crocodile-vector.ts.net:21090"]
        labels:
          stage: 'staging'
    metrics_path: '/metrics'

  - job_name: 'yace'
    scheme: http
    static_configs:
      - targets: ["mon:5000"]
    metrics_path: '/metrics'

  - job_name: 'otel-collector'
    scheme: http
    static_configs:
      - targets: ["mon:8888"]
    metrics_path: '/metrics'
