# OpenTelemetry Collector configuration for mon host
# Receives OTLP logs and forwards to Honeycomb, local JSON files, and S3
#
# Client configuration:
#   Set these environment variables on services sending logs:
#
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://mon:4318
#   OTEL_RESOURCE_ATTRIBUTES=deployment.environment=staging
#
#   Use deployment.environment=staging or deployment.environment=production
#   to route logs to the appropriate Honeycomb team and log files.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

connectors:
  # Route logs based on deployment.environment
  routing:
    default_pipelines: [logs/unknown]
    error_mode: ignore
    table:
      - statement: route() where resource.attributes["deployment.environment"] == "staging"
        pipelines: [logs/staging]
      - statement: route() where resource.attributes["deployment.environment"] == "production"
        pipelines: [logs/production]

exporters:
  # Honeycomb exporter for staging
  otlphttp/honeycomb-staging:
    endpoint: https://api.honeycomb.io
    headers:
      x-honeycomb-team: ${HONEYCOMB_API_KEY_STAGING}
      x-honeycomb-dataset: exe-logs

  # Honeycomb exporter for production
  otlphttp/honeycomb-production:
    endpoint: https://api.honeycomb.io
    headers:
      x-honeycomb-team: ${HONEYCOMB_API_KEY_PRODUCTION}
      x-honeycomb-dataset: exe-logs

  # File exporter for JSON logs - staging
  file/staging:
    path: /var/log/otel/staging/logs.json
    format: json
    rotation:
      max_megabytes: 50
      max_days: 7
      max_backups: 168
      localtime: true

  # File exporter for JSON logs - production
  file/production:
    path: /var/log/otel/production/logs.json
    format: json
    rotation:
      max_megabytes: 50
      max_days: 7
      max_backups: 168
      localtime: true

  # File exporter for logs without environment tag
  file/unknown:
    path: /var/log/otel/unknown/logs.json
    format: json
    rotation:
      max_megabytes: 50
      max_days: 7
      max_backups: 168
      localtime: true

  # S3 exporter for staging logs
  # Writes to s3://exe.dev-logs/staging/year=YYYY/month=MM/day=DD/hour=HH/
  awss3/staging:
    s3uploader:
      region: us-west-2
      s3_bucket: exe.dev-logs
      s3_prefix: staging
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H'
    marshaler: otlp_json

  # S3 exporter for production logs
  # Writes to s3://exe.dev-logs/production/year=YYYY/month=MM/day=DD/hour=HH/
  awss3/production:
    s3uploader:
      region: us-west-2
      s3_bucket: exe.dev-logs
      s3_prefix: production
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H'
    marshaler: otlp_json

  # S3 exporter for unknown environment logs
  awss3/unknown:
    s3uploader:
      region: us-west-2
      s3_bucket: exe.dev-logs
      s3_prefix: unknown
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H'
    marshaler: otlp_json

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  extensions: [health_check, zpages]
  pipelines:
    # Main pipeline: receive OTLP, batch, route by environment
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [routing]

    # Staging: Honeycomb + file + S3
    logs/staging:
      receivers: [routing]
      exporters: [otlphttp/honeycomb-staging, file/staging, awss3/staging]

    # Production: Honeycomb + file + S3
    logs/production:
      receivers: [routing]
      exporters: [otlphttp/honeycomb-production, file/production, awss3/production]

    # Unknown environment: file + S3 (no Honeycomb)
    logs/unknown:
      receivers: [routing]
      exporters: [file/unknown, awss3/unknown]
