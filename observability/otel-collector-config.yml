# OpenTelemetry Collector configuration for mon host
# Receives OTLP logs and forwards to Honeycomb, local JSON files, and S3
#
# Client configuration:
#   Set these environment variables on services sending logs:
#
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://mon:4318
#   OTEL_RESOURCE_ATTRIBUTES=deployment.environment=staging
#
#   Use deployment.environment=staging or deployment.environment=production
#   to route logs to the appropriate Honeycomb team and log files.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Prometheus receiver for staging metrics
  # NOTE: Keep staging scrape_configs in sync with prometheus.yml
  prometheus/staging:
    config:
      scrape_configs:
        - job_name: 'node-staging'
          scrape_interval: 60s
          static_configs:
            - targets:
                - 'exed-staging-01:19100'
              labels:
                stage: 'staging'
                role: 'exed'
            - targets:
                - 'exe-ctr-staging-01:9100'
              labels:
                stage: 'staging'
                role: 'exelet'

        - job_name: 'exed-staging'
          scrape_interval: 60s
          scheme: https
          static_configs:
            - targets: ["exed-staging-01.crocodile-vector.ts.net"]
              labels:
                stage: 'staging'
          metrics_path: '/metrics'

        - job_name: 'sshpiperd-staging'
          scrape_interval: 60s
          scheme: http
          static_configs:
            - targets: ["exed-staging-01:30303"]
              labels:
                stage: 'staging'
		rold: 'exed'
          metrics_path: '/metrics'

        - job_name: 'metricsd-staging'
          scrape_interval: 60s
          scheme: http
          static_configs:
            - targets: ["exed-staging-01.crocodile-vector.ts.net:21090"]
              labels:
                stage: 'staging'
          metrics_path: '/metrics'

        - job_name: 'exelet-staging'
          scrape_interval: 60s
          scheme: http
          static_configs:
            - targets: ["exe-ctr-staging-01:9081"]
              labels:
                stage: 'staging'
          metrics_path: '/metrics'

  # Prometheus receiver for production metrics
  # NOTE: Keep production scrape_configs in sync with prometheus.yml
  prometheus/production:
    config:
      scrape_configs:
        - job_name: 'node-production'
          scrape_interval: 60s
          static_configs:
            - targets:
                - 'sketch-01:9100'
                - 'mon:9100'
                - 'sketch-dev:9100'
                - 'docker-01:9100'
                - 'docker-02:9100'
                - 'ci.crocodile-vector.ts.net:9100'
              labels:
                stage: 'production'
            - targets:
                - 'exed-02:19100'
              labels:
                stage: 'production'
                role: 'exed'
            - targets:
                - 'exe-ctr-02:9100'
                - 'exe-ctr-03:9100'
                - 'exe-ctr-04:9100'
                - 'exe-ctr-05:9100'
                - 'exe-ctr-07:9100'
                - 'exe-ctr-08:9100'
                - 'exe-ctr-09:9100'
                - 'exe-ctr-10:9100'
                - 'exe-ctr-11:9100'
              labels:
                stage: 'production'
                role: 'exelet'
            - targets:
                - 'exeprox-lax2-prod-01'
                - 'exeprox-dal-prod-01'
                - 'exeprox-fra2-prod-01'
                - 'exeprox-lon2-prod-01'
                - 'exeprox-nyc-prod-01'
                - 'exeprox-sjc2-prod-01'
                - 'exeprox-syd2-prod-01'
                - 'exeprox-tyo4-prod-01'
              labels:
                stage: 'production'
                role: 'exeprox'

        - job_name: 'grafana-production'
          scrape_interval: 60s
          scheme: https
          static_configs:
            - targets: ["grafana.crocodile-vector.ts.net"]
          metrics_path: '/metrics'

        - job_name: 'authd-production'
          scrape_interval: 60s
          static_configs:
            - targets: ["sketch-01:3001"]
          metrics_path: '/authd/metrics'

        - job_name: 'merde-production'
          scrape_interval: 60s
          scheme: https
          tls_config:
            insecure_skip_verify: true
          static_configs:
            - targets: ["merde"]
          metrics_path: '/metrics'

        - job_name: 'skabandd-production'
          scrape_interval: 60s
          scheme: https
          static_configs:
            - targets: ["sketch-dev.crocodile-vector.ts.net"]
          metrics_path: '/debug/metrics'

        - job_name: 'exed-production'
          scrape_interval: 60s
          scheme: https
          static_configs:
            - targets: ["exed-02.crocodile-vector.ts.net"]
              labels:
                stage: 'production'
          metrics_path: '/metrics'

        - job_name: 'blogd-production'
          scrape_interval: 60s
          scheme: https
          static_configs:
            - targets: ["blog.exe.dev"]
              labels:
                stage: 'production'
          metrics_path: '/metrics'

        - job_name: 'sshpiperd-production'
          scrape_interval: 60s
          scheme: http
          static_configs:
            - targets: ["exed-02:30303"]
              labels:
                stage: 'production'
                rold: 'exed'
	    - targets:
	      - 'exeprox-lax2-prod-01:30303'
	      - 'exeprox-dal-prod-01:30303'
	      - 'exeprox-fra2-prod-01:30303'
	      - 'exeprox-lon2-prod-01:30303'
	      - 'exeprox-nyc-prod-01:30303'
	      - 'exeprox-sjc2-prod-01:30303'
	      - 'exeprox-syd2-prod-01:30303'
	      - 'exeprox-tyo4-prod-01:30303'
	      labels:
		stage: 'production'
		role: 'exeprox'
          metrics_path: '/metrics'

        - job_name: 'exelet-production'
          scrape_interval: 60s
          scheme: http
          static_configs:
            - targets: ["exe-ctr-02:9081", "exe-ctr-03:9081", "exe-ctr-04:9081", "exe-ctr-05:9081", "exe-ctr-07:9081", "exe-ctr-08:9081", "exe-ctr-09:9081", "exe-ctr-10:9081", "exe-ctr-11:9081"]
              labels:
                stage: 'production'
          metrics_path: '/metrics'

        - job_name: 'metricsd-production'
          scrape_interval: 60s
          scheme: http
          static_configs:
            - targets: ["exed-02.crocodile-vector.ts.net:21090"]
              labels:
                stage: 'production'
          metrics_path: '/metrics'

        - job_name: 'yace-production'
          scrape_interval: 60s
          scheme: http
          static_configs:
            - targets: ["mon:5000"]
          metrics_path: '/metrics'

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Filter out noisy log lines before sending to Honeycomb
  filter/honeycomb:
    logs:
      exclude:
        match_type: strict
        bodies:
          - "getting instance from config"
          - "resource manager: activity check"
          - "desired-state sync: cannot read cgroup file, skipping"

  # Filter out noisy log lines before sending to S3
  filter/storage:
    logs:
      exclude:
        match_type: strict
        bodies:
          - "desired-state sync: cannot read cgroup file, skipping"

connectors:
  # Route logs based on deployment.environment
  routing:
    default_pipelines: [logs/unknown]
    error_mode: ignore
    table:
      - statement: route() where resource.attributes["deployment.environment"] == "staging"
        pipelines: [logs/staging-honeycomb, logs/staging-storage]
      - statement: route() where resource.attributes["deployment.environment"] == "production"
        pipelines: [logs/production-honeycomb, logs/production-storage]

exporters:
  # Honeycomb exporter for staging
  otlphttp/honeycomb-staging:
    endpoint: https://api.honeycomb.io
    headers:
      x-honeycomb-team: ${HONEYCOMB_API_KEY_STAGING}
      x-honeycomb-dataset: exe-logs

  # Honeycomb exporter for production
  otlphttp/honeycomb-production:
    endpoint: https://api.honeycomb.io
    headers:
      x-honeycomb-team: ${HONEYCOMB_API_KEY_PRODUCTION}
      x-honeycomb-dataset: exe-logs

  # File exporter for JSON logs - staging
  file/staging:
    path: /var/log/otel/staging/logs.json
    format: json
    rotation:
      max_megabytes: 50
      max_days: 7
      max_backups: 168
      localtime: true

  # File exporter for JSON logs - production
  file/production:
    path: /var/log/otel/production/logs.json
    format: json
    rotation:
      max_megabytes: 50
      max_days: 7
      max_backups: 168
      localtime: true

  # File exporter for logs without environment tag
  file/unknown:
    path: /var/log/otel/unknown/logs.json
    format: json
    rotation:
      max_megabytes: 50
      max_days: 7
      max_backups: 168
      localtime: true

  # S3 exporter for staging logs
  # Writes to s3://exe.dev-logs/staging/year=YYYY/month=MM/day=DD/hour=HH/
  awss3/staging:
    s3uploader:
      region: us-west-2
      s3_bucket: exe.dev-logs
      s3_prefix: staging
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H'
      file_prefix: logs
      compression: gzip
    marshaler: otlp_json

  # S3 exporter for production logs
  # Writes to s3://exe.dev-logs/production/year=YYYY/month=MM/day=DD/hour=HH/
  awss3/production:
    s3uploader:
      region: us-west-2
      s3_bucket: exe.dev-logs
      s3_prefix: production
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H'
      file_prefix: logs
      compression: gzip
    marshaler: otlp_json

  # S3 exporter for unknown environment logs
  awss3/unknown:
    s3uploader:
      region: us-west-2
      s3_bucket: exe.dev-logs
      s3_prefix: unknown
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H'
      file_prefix: logs
      compression: gzip
    marshaler: otlp_json

  # S3 exporter for staging metrics
  # Writes to s3://exe.dev-logs/metrics/staging/year=YYYY/month=MM/day=DD/hour=HH/
  awss3/staging-metrics:
    s3uploader:
      region: us-west-2
      s3_bucket: exe.dev-logs
      s3_prefix: metrics/staging
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H'
      file_prefix: metrics
      compression: gzip
    marshaler: otlp_json

  # S3 exporter for production metrics
  # Writes to s3://exe.dev-logs/metrics/production/year=YYYY/month=MM/day=DD/hour=HH/
  awss3/production-metrics:
    s3uploader:
      region: us-west-2
      s3_bucket: exe.dev-logs
      s3_prefix: metrics/production
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H'
      file_prefix: metrics
      compression: gzip
    marshaler: otlp_json

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  extensions: [health_check, zpages]
  pipelines:
    # Main pipeline: receive OTLP, batch, route by environment
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [routing]

    # Staging Honeycomb: filtered to reduce noise
    logs/staging-honeycomb:
      receivers: [routing]
      processors: [filter/honeycomb]
      exporters: [otlphttp/honeycomb-staging]

    # Staging storage: file + S3
    logs/staging-storage:
      receivers: [routing]
      processors: [filter/storage]
      exporters: [file/staging, awss3/staging]

    # Production Honeycomb: filtered to reduce noise
    logs/production-honeycomb:
      receivers: [routing]
      processors: [filter/honeycomb]
      exporters: [otlphttp/honeycomb-production]

    # Production storage: file + S3
    logs/production-storage:
      receivers: [routing]
      processors: [filter/storage]
      exporters: [file/production, awss3/production]

    # Unknown environment: file + S3 (no Honeycomb)
    logs/unknown:
      receivers: [routing]
      exporters: [file/unknown, awss3/unknown]

    # Staging metrics: scrape prometheus endpoints, send to S3
    metrics/staging:
      receivers: [prometheus/staging]
      processors: [batch]
      exporters: [awss3/staging-metrics]

    # Production metrics: scrape prometheus endpoints, send to S3
    metrics/production:
      receivers: [prometheus/production]
      processors: [batch]
      exporters: [awss3/production-metrics]
