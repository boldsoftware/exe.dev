# YACE (Yet Another CloudWatch Exporter) configuration
# Documentation: https://github.com/prometheus-community/yet-another-cloudwatch-exporter/blob/master/docs/configuration.md

apiVersion: v1alpha1
sts-region: us-west-2

discovery:
  # Export AWS resource tags as Prometheus labels
  exportedTagsOnMetrics:
    AWS/EC2:
      - Name
    AWS/EBS:
      - Name

  jobs:
    # EC2 instances
    - type: AWS/EC2
      regions:
        - us-west-2
      metrics:
        - name: CPUUtilization
          statistics: [Average, Maximum]
          period: 300
          length: 300
        - name: NetworkIn
          statistics: [Sum]
          period: 300
          length: 300
        - name: NetworkOut
          statistics: [Sum]
          period: 300
          length: 300
        - name: DiskReadBytes
          statistics: [Sum]
          period: 300
          length: 300
        - name: DiskWriteBytes
          statistics: [Sum]
          period: 300
          length: 300
        - name: StatusCheckFailed
          statistics: [Maximum]
          period: 300
          length: 300

    # EBS volumes
    - type: AWS/EBS
      regions:
        - us-west-2
      metrics:
        - name: VolumeReadOps
          statistics: [Sum]
          period: 300
          length: 300
        - name: VolumeWriteOps
          statistics: [Sum]
          period: 300
          length: 300
        - name: VolumeReadBytes
          statistics: [Sum]
          period: 300
          length: 300
        - name: VolumeWriteBytes
          statistics: [Sum]
          period: 300
          length: 300
        - name: VolumeTotalReadTime
          statistics: [Sum]
          period: 300
          length: 300
        - name: VolumeTotalWriteTime
          statistics: [Sum]
          period: 300
          length: 300
        - name: BurstBalance
          statistics: [Minimum]
          period: 300
          length: 300
        - name: VolumeIOPSExceededCheck
          statistics: [Maximum]
          period: 300
          length: 300

# Route53 DNS queries per hosted zone (static config, discovery not supported)
# Note: Route53 metrics are only available in us-east-1
static:
  - name: route53-exe-staging-dev
    namespace: AWS/Route53
    regions:
      - us-east-1
    dimensions:
      - name: HostedZoneId
        value: Z081556933ZT77JWN6MNT
    customTags:
      - key: zone
        value: exe-staging.dev
    metrics:
      - name: DNSQueries
        statistics: [Sum]
        period: 300
        length: 300
