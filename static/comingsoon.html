<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXE.DEV - just use ssh</title>
    <link rel="stylesheet" href="exe.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
            overflow-x: hidden;
        }
        
        .content-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin: 40px auto 50px;
            flex-wrap: wrap;
        }
        
        .content-section.command-row {
            flex-direction: column;
            gap: 20px;
            margin: 30px auto;
        }
        
        .content-section.command-row .description {
            text-align: center;
            max-width: 600px;
        }
        
        .blowfish-logo {
            width: 200px;
            height: auto;
        }
        
        .https-section {
            display: flex;
            align-items: center;
            gap: 40px;
            justify-content: center;
            margin: 30px auto;
        }
        
        .https-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .description {
            font-size: 18px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-variant: small-caps;
            color: #444;
            line-height: 1.8;
            max-width: 420px;
            font-weight: 400;
            text-align: left;
        }
        
        .description strong {
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }
            
            
            
            .content-section {
                flex-direction: column;
                width: 100%;
                padding: 0 10px;
            }
            
            .description {
                font-size: 15px;
                letter-spacing: 0.1em;
                text-align: center;
            }
            
            .blowfish-logo {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <main>
        <aside>a vm for your thoughts</aside>
        
        <h1>coming soon</h1>

        <hr>
    </main>
</body>
</html>
