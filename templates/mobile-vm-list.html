<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exe.dev - Your VMs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #fffff8;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0,0,0,0.035) 0px,
                    rgba(0,0,0,0.035) 2px,
                    transparent 2px,
                    transparent 4px
                );
            background-size: 4px 4px;
            font-family: Georgia, 'Times New Roman', serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #666;
        }
        
        .vm-list {
            margin-bottom: 30px;
        }
        
        .vm-item {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: box-shadow 0.2s;
        }
        
        .vm-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .vm-name {
            font-size: 18px;
            font-family: 'Courier New', monospace;
            color: #333;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .vm-status {
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }
        
        .vm-status.running {
            background-color: #c8e6c9;
            color: #2e7d32;
        }
        
        .vm-status.stopped {
            background-color: #ffcdd2;
            color: #c62828;
        }
        
        .vm-status.unknown {
            background-color: #e0e0e0;
            color: #424242;
        }
        
        .vm-image {
            font-size: 12px;
            color: #666;
            font-style: italic;
        }
        
        .vm-created {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .empty-message {
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        .create-vm-button {
            display: inline-block;
            font-size: 18px;
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-family: Georgia, 'Times New Roman', serif;
            transition: background-color 0.2s;
        }
        
        .create-vm-button:hover {
            background-color: #45a049;
        }
        
        .actions {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            margin-top: 30px;
        }
        
        .logout-link {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        
        .logout-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">exe.dev</div>
            <div class="subtitle">Your Virtual Machines</div>
        </div>
        
        <div class="vm-list">
            {{if .Boxes}}
                {{range .Boxes}}
                <div class="vm-item">
                    <div class="vm-name">{{.Name}}.exe.dev</div>
                    <div class="vm-status {{if eq .Status "running"}}running{{else if eq .Status "stopped"}}stopped{{else}}unknown{{end}}">
                        {{.Status}}
                    </div>
                    {{if .Image}}
                    <div class="vm-image">Image: {{.Image}}</div>
                    {{end}}
                    <div class="vm-created">Created: {{.CreatedAt.Format "Jan 2, 2006"}}</div>
                </div>
                {{end}}
            {{else}}
            <div class="empty-state">
                <div class="empty-icon">💻</div>
                <div class="empty-message">You don't have any VMs yet</div>
                <a href="/m" class="create-vm-button">Create Your First VM</a>
            </div>
            {{end}}
        </div>
        
        {{if .Boxes}}
        <div class="actions">
            <a href="/m" class="create-vm-button">Create Another VM</a>
        </div>
        {{end}}
        
        <div class="actions">
            <a href="/logout" class="logout-link">Sign Out</a>
        </div>
    </div>
</body>
</html>
