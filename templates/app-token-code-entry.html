<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Enter Code - {{.WebHost}}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
</head>
<body class="font-mono text-zinc-900 dark:text-zinc-100 bg-white dark:bg-zinc-950 min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    <h1 class="text-4xl font-semibold mb-6">Check your email</h1>
    <p class="text-zinc-500 mb-8">We sent a code to <strong class="text-zinc-900 dark:text-zinc-100">{{.Email}}</strong></p>
    {{if .Error}}
    <p class="text-red-600 dark:text-red-400 mb-4">{{.Error}}</p>
    {{end}}
    <form method="POST" action="/auth/verify-code">
      <input type="hidden" name="email" value="{{.Email}}">
      <input type="text" name="code" maxlength="8" placeholder="a1b2c3d4" required autofocus autocomplete="one-time-code" spellcheck="false" autocapitalize="none"
        class="w-56 text-3xl tracking-[0.2em] text-center border-b-2 border-zinc-300 dark:border-zinc-600 py-3 bg-transparent focus:outline-none focus:border-zinc-900 dark:focus:border-zinc-100 placeholder:text-zinc-300 dark:placeholder:text-zinc-600 font-mono">
      <br>
      <button type="submit" class="mt-6 px-6 py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 text-lg hover:bg-zinc-700 dark:hover:bg-zinc-300 transition-colors">Verify</button>
    </form>
    {{if .DevCode}}
    <p class="mt-8 text-zinc-400 text-sm">(dev mode) code: {{.DevCode}}</p>
    {{end}}
  </main>
</body>
</html>
