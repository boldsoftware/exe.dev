<!doctype html>
<html>
  <head>
    <title>Email Verified - exe.dev</title>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 500px;
        margin: 100px auto;
        padding: 40px;
        background: #f5f5f5;
      }
      .container {
        background: white;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .exy {
        display: block;
        width: 72px;
        margin: 0 auto 24px;
      }
      h1 {
        color: #0f172a;
        margin-bottom: 16px;
        font-size: 28px;
      }
      p {
        color: #475569;
        line-height: 1.6;
        margin: 16px 0;
      }
      .code-box {
        background: #f0f9ff;
        border: 1px solid #0ea5e9;
        border-radius: 8px;
        padding: 16px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        color: #0f172a;
        letter-spacing: 0.12em;
        display: inline-block;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/static/exy.png" alt="exy the fish" class="exy" />
      <h1>Email Verified</h1>
      <p>You can now return to your SSH session.</p>
      <p>If you don't have one, connect with:</p>
      <div class="code-box">ssh exe.dev</div>

</html>
