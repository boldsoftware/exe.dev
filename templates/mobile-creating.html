<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exe.dev - Creating...</title>
    <link rel="stylesheet" href="/static/xterm.css">
    <style>
        body { background:#fffff8; font-family: Georgia, 'Times New Roman', serif; padding:20px; }
        .container { max-width:500px; margin:0 auto; }
        .logo { font-size:32px; font-weight:bold; color:#333; margin-bottom:10px; text-align:center; }
        .title { font-size:20px; color:#333; margin:10px 0; text-align:center; }
        .box { background:rgba(255,255,255,0.8); border:1px solid #ddd; border-radius:8px; padding:16px; overflow:hidden; }
        /* Read-only terminal area */
        #term { width:100%; height:120px; }
        .xterm { padding: 6px 8px; border-radius:6px; box-sizing:border-box; max-width:100%; }
        /* Keep viewport from creating horizontal overflow on small screens */
        .xterm .xterm-viewport { overflow-x: hidden; }
        .success { margin-top:16px; display:none; text-align:center; position:relative; z-index:1; }
        .link { display:block; margin:8px 0; padding:12px; background:#4CAF50; color:#fff; text-decoration:none; border-radius:8px; }
    </style>
    <script src="/static/xterm.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hostname = "{{.Hostname}}";
            const termEl = document.getElementById('term');

            // Initialize a read-only xterm.js instance
            const term = new Terminal({
                fontSize: 14,
                convertEol: true,
                disableStdin: true,
                cursorBlink: false,
                scrollback: 5000,
                theme: {
                    background: '#fffff8',
                    foreground: '#333333'
                }
            });
            term.open(termEl);

            // Fit using measured cell size from xterm's char-measure element
            const fit = () => {
                const xe = term.element || termEl.querySelector('.xterm');
                const xeRect = (xe || termEl).getBoundingClientRect();
                let padL=0, padR=0, padT=0, padB=0;
                if (xe) {
                    const cs = window.getComputedStyle(xe);
                    padL = parseFloat(cs.paddingLeft) || 0;
                    padR = parseFloat(cs.paddingRight) || 0;
                    padT = parseFloat(cs.paddingTop) || 0;
                    padB = parseFloat(cs.paddingBottom) || 0;
                }
                const width = Math.max(0, xeRect.width - padL - padR);
                const height = Math.max(0, xeRect.height - padT - padB);

                let cellW = 9, cellH = 18; // fallback
                const meas = xe && xe.querySelector('.xterm-char-measure-element');
                if (meas) {
                    const mr = meas.getBoundingClientRect();
                    if (mr.width > 0 && mr.height > 0) {
                        cellW = mr.width;
                        cellH = mr.height;
                    }
                }
                const cols = Math.max(40, Math.floor(width / cellW));
                const rows = Math.max(6, Math.floor(height / cellH));
                term.resize(cols, rows);
            };
            // Initial and deferred fits to handle font/metric readiness
            fit();
            setTimeout(fit, 0);
            setTimeout(fit, 100);
            window.addEventListener('resize', fit);

            // Stream creation logs via POST using fetch and parse SSE-format lines
            fetch('/m/creating/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'hostname=' + encodeURIComponent(hostname),
            }).then(async (resp) => {
                if (!resp.ok) {
                    const msg = (await resp.text()) || ('HTTP ' + resp.status);
                    term.write('Error: ' + msg + '\r\n');
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buf = '';
                let curEvent = '';

                const applyEvent = (event, data) => {
                    if (!event || event === 'message') {
                        // Normal log line: strip stray CR and add newline
                        term.write(((data || '').replace(/\r/g, '')) + '\r\n');
                        return;
                    }
                    if (event === 'spin') {
                        // Spinner/progress update: write raw (no newline)
                        term.write(data || '');
                        return;
                    }
                    if (event === 'fail') {
                        term.write('Error: ' + (data || 'failed') + '\r\n');
                        return;
                    }
                    if (event === 'done') {
                        const parts = (data || '').split('|');
                        const httpUrl = parts[0] || '#';
                        const termUrl = parts[1] || '#';
                        document.getElementById('httpLink').href = httpUrl;
                        document.getElementById('termLink').href = termUrl;
                        document.getElementById('success').style.display = 'block';
                        // Do not auto-redirect; keep logs visible for the user.
                        return;
                    }
                };

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buf += decoder.decode(value, { stream: true });
                    let idx;
                    while ((idx = buf.indexOf('\n')) !== -1) {
                        const line = buf.slice(0, idx);
                        buf = buf.slice(idx + 1);
                        if (line.startsWith('event: ')) {
                            curEvent = line.slice(7).trim();
                        } else if (line.startsWith('data: ')) {
                            // Preserve control characters (e.g., \r, ESC) for spinner frames
                            const data = line.slice(6);
                            applyEvent(curEvent, data);
                        } else if (line === '') {
                            curEvent = '';
                        }
                    }
                }
            }).catch(() => {
                term.write('Error: connection lost\r\n');
            });
        });
    </script>
    </head>
<body>
    <div class="container">
        <div class="logo">exe.dev</div>
        <div class="title">Creating {{.Hostname}}...</div>
        <div class="box">
            <div id="term"></div>
            <div id="success" class="success">
                <a id="httpLink" class="link" href="#">Open App</a>
                <a id="termLink" class="link" href="#" style="background:#333">Open Terminal</a>
                <a id="boxLink" class="link" href="/m/box/{{.Hostname}}" style="background:#2f6bff">Continue</a>
            </div>
        </div>
    </div>
</body>
</html>
