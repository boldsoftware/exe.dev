<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exe.dev - Love</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      .testimonial {
        animation: fadeIn 0.5s ease-out forwards;
      }
      .testimonial.fading {
        animation: fadeOut 0.5s ease-out forwards;
      }
      .attribution {
        margin-top: 1rem;
        color: #6b7280;
      }
      .source-link {
        display: inline-block;
        vertical-align: middle;
        margin-left: 0.25rem;
        color: #9ca3af;
        transition: color 0.2s;
      }
      .source-link:hover {
        color: #4b5563;
      }
      @media (prefers-color-scheme: dark) {
        .attribution { color: #9ca3af; }
        .source-link { color: #6b7280; }
        .source-link:hover { color: #d1d5db; }
      }
      .source-link svg {
        width: 0.875rem;
        height: 0.875rem;
      }
    </style>
  </head>
  <body class="min-h-dvh grid grid-rows-[auto_1fr_auto] bg-white dark:bg-zinc-950 text-gray-900 dark:text-gray-100">
    <nav class="flex justify-between px-6 py-4">
      <a href="/" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">exe.dev</a>
    </nav>
    <main class="flex flex-col justify-center items-center px-4 py-8">
      <div class="max-w-2xl mx-auto px-4 text-center">
        <div id="testimonial-container" class="testimonial text-sm sm:text-base text-gray-700 dark:text-gray-300 leading-relaxed">
          {{if .Testimonials}}
          <p class="text-gray-500">Loading...</p>
          {{else}}
          <p class="text-gray-500">No testimonials yet.</p>
          {{end}}
        </div>
        {{if gt (len .Testimonials) 1}}
        <div class="mt-8 flex justify-center gap-2">
          {{range $i, $t := .Testimonials}}
          <button class="testimonial-dot w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-600 hover:bg-gray-400 dark:hover:bg-gray-500 transition-colors{{if eq $i 0}} !bg-gray-600 dark:!bg-gray-300{{end}}" data-index="{{$i}}"></button>
          {{end}}
        </div>
        {{end}}
      </div>
    </main>
    <footer class="text-sm text-gray-400 min-w-full py-4 px-6 flex justify-center gap-4">
        <a href="/docs/what-is-exe" class="hover:underline">About</a>
        <span>&bull;</span>
        <a href="https://blog.exe.dev" class="hover:underline">Blog</a>
        <span>&bull;</span>
        <a href="https://discord.gg/jc9WQUfaxf" class="hover:underline">Discord</a>
    </footer>
    {{if .Testimonials}}
    <script>
      const testimonials = [
        {{range .Testimonials}}{
          quote: `{{.Quote}}`,
          author: `{{.Author}}`,
          link: `{{.Link}}`
        },
        {{end}}
      ];

      const linkIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.25 5.5a.75.75 0 0 0-.75.75v8.5c0 .414.336.75.75.75h8.5a.75.75 0 0 0 .75-.75v-4a.75.75 0 0 1 1.5 0v4A2.25 2.25 0 0 1 12.75 17h-8.5A2.25 2.25 0 0 1 2 14.75v-8.5A2.25 2.25 0 0 1 4.25 4h5a.75.75 0 0 1 0 1.5h-5Z" clip-rule="evenodd" /><path fill-rule="evenodd" d="M6.194 12.753a.75.75 0 0 0 1.06.053L16.5 4.44v2.81a.75.75 0 0 0 1.5 0v-4.5a.75.75 0 0 0-.75-.75h-4.5a.75.75 0 0 0 0 1.5h2.553l-9.056 8.194a.75.75 0 0 0-.053 1.06Z" clip-rule="evenodd" /></svg>';

      let currentIndex = 0;
      const container = document.getElementById('testimonial-container');
      const dots = document.querySelectorAll('.testimonial-dot');

      function renderTestimonial(t) {
        const quoteHtml = t.quote.replace(/\n\n/g, '<br><br>');
        let html = quoteHtml + '<div class="attribution">&mdash; ' + t.author;
        if (t.link) {
          html += ' <a href="' + t.link + '" class="source-link" target="_blank">' + linkIcon + '</a>';
        }
        html += '</div>';
        return html;
      }

      function showTestimonial(index, immediate) {
        if (index === currentIndex && !immediate) return;
        if (immediate) {
          currentIndex = index;
          container.innerHTML = renderTestimonial(testimonials[currentIndex]);
          return;
        }
        container.classList.add('fading');
        setTimeout(() => {
          currentIndex = index;
          container.innerHTML = renderTestimonial(testimonials[currentIndex]);
          container.classList.remove('fading');
          dots.forEach((dot, i) => {
            dot.classList.toggle('!bg-gray-600', i === currentIndex);
            dot.classList.toggle('dark:!bg-gray-300', i === currentIndex);
            dot.classList.toggle('bg-gray-300', i !== currentIndex);
            dot.classList.toggle('dark:bg-gray-600', i !== currentIndex);
          });
        }, 500);
      }

      // Show first testimonial immediately
      showTestimonial(0, true);

      dots.forEach((dot, i) => {
        dot.addEventListener('click', () => showTestimonial(i));
      });

      // Auto-cycle every 8 seconds
      setInterval(() => {
        showTestimonial((currentIndex + 1) % testimonials.length);
      }, 8000);
    </script>
    {{end}}
  </body>
</html>
