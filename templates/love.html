<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exe.dev - Love</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      .testimonial {
        animation: fadeIn 0.5s ease-out forwards;
      }
      .testimonial.fading {
        animation: fadeOut 0.5s ease-out forwards;
      }
    </style>
  </head>
  <body class="min-h-dvh grid grid-rows-[auto_1fr_auto] bg-white text-gray-900">
    <nav class="flex justify-between px-6 py-4">
      <a href="/" class="text-gray-400 hover:text-gray-600">exe.dev</a>
    </nav>
    <main class="flex flex-col justify-center items-center px-4 py-8">
      <div class="max-w-2xl mx-auto px-4 text-center">
        <div id="testimonial-container" class="testimonial text-sm sm:text-base text-gray-700 leading-relaxed">
          {{if .Testimonials}}
          {{(index .Testimonials 0).HTML}}
          {{else}}
          <p class="text-gray-500">No testimonials yet.</p>
          {{end}}
        </div>
        {{if gt (len .Testimonials) 1}}
        <div class="mt-8 flex justify-center gap-2">
          {{range $i, $t := .Testimonials}}
          <button class="testimonial-dot w-2 h-2 rounded-full bg-gray-300 hover:bg-gray-400 transition-colors{{if eq $i 0}} !bg-gray-600{{end}}" data-index="{{$i}}"></button>
          {{end}}
        </div>
        {{end}}
      </div>
    </main>
    <footer class="text-sm text-gray-400 min-w-full py-4 px-6 flex justify-center gap-4">
        <a href="/docs/what-is-exe" class="hover:underline">About</a>
        <span>&bull;</span>
        <a href="https://blog.exe.dev" class="hover:underline">Blog</a>
        <span>&bull;</span>
        <a href="https://discord.gg/jc9WQUfaxf" class="hover:underline">Discord</a>
    </footer>
    {{if gt (len .Testimonials) 1}}
    <script>
      const testimonials = [
        {{range .Testimonials}}`{{.HTML}}`,
        {{end}}
      ];
      let currentIndex = 0;
      const container = document.getElementById('testimonial-container');
      const dots = document.querySelectorAll('.testimonial-dot');

      function showTestimonial(index) {
        if (index === currentIndex) return;
        container.classList.add('fading');
        setTimeout(() => {
          currentIndex = index;
          container.innerHTML = testimonials[currentIndex];
          container.classList.remove('fading');
          dots.forEach((dot, i) => {
            dot.classList.toggle('!bg-gray-600', i === currentIndex);
            dot.classList.toggle('bg-gray-300', i !== currentIndex);
          });
        }, 500);
      }

      dots.forEach((dot, i) => {
        dot.addEventListener('click', () => showTestimonial(i));
      });

      // Auto-cycle every 8 seconds
      setInterval(() => {
        showTestimonial((currentIndex + 1) % testimonials.length);
      }, 8000);
    </script>
    {{end}}
  </body>
</html>
