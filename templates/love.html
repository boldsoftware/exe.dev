<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico">
    <title>exe.dev - Love</title>
    <link rel="stylesheet" href="/static/common.css">
    <link rel="stylesheet" href="/static/simple.css">
    <style>
      body.love-page {
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 0;
      }
      .love-nav {
        display: flex;
        justify-content: space-between;
        padding: 16px 24px;
      }
      .love-nav a {
        color: var(--color-text-muted);
      }
      .love-nav a:hover {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .love-main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 32px 16px;
      }
      .love-content {
        max-width: 42rem;
        margin: 0 auto;
        padding: 0 16px;
        text-align: center;
      }
      .love-footer {
        font-size: var(--text-sm);
        color: var(--color-text-muted);
        padding: 16px 24px;
        display: flex;
        justify-content: center;
        gap: 16px;
      }
      .love-footer a {
        color: inherit;
      }
      .love-footer a:hover {
        text-decoration: underline;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      .testimonial {
        animation: fadeIn 0.5s ease-out forwards;
        font-size: var(--text-sm);
        color: var(--color-text-secondary);
        line-height: 1.6;
      }
      @media (min-width: 640px) {
        .testimonial {
          font-size: var(--text-base);
        }
      }
      .testimonial.fading {
        animation: fadeOut 0.5s ease-out forwards;
      }
      .attribution {
        margin-top: 1rem;
        color: var(--color-text-muted);
      }
      .source-link {
        display: inline-block;
        vertical-align: middle;
        margin-left: 0.25rem;
        color: var(--color-text-muted);
        transition: color 0.2s;
      }
      .source-link:hover {
        color: var(--color-text-secondary);
      }
      .source-link svg {
        width: 0.875rem;
        height: 0.875rem;
      }
      .dot-nav {
        margin-top: 2rem;
        display: flex;
        justify-content: center;
        gap: 0.5rem;
      }
      .testimonial-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        transition: background-color 0.2s;
        padding: 0;
      }
      .testimonial-dot {
        background: var(--color-border);
      }
      .testimonial-dot.active {
        background: var(--color-text-secondary);
      }
    </style>
  </head>
  <body class="love-page">
    <nav class="love-nav">
      <a href="/">exe.dev</a>
    </nav>
    <main class="love-main">
      <div class="love-content">
        <div id="testimonial-container" class="testimonial">
          {{if .Testimonials}}
          <p class="text-muted">Loading...</p>
          {{else}}
          <p class="text-muted">No testimonials yet.</p>
          {{end}}
        </div>
        {{if gt (len .Testimonials) 1}}
        <div class="dot-nav">
          {{range $i, $t := .Testimonials}}
          <button class="testimonial-dot{{if eq $i 0}} active{{end}}" data-index="{{$i}}"></button>
          {{end}}
        </div>
        {{end}}
      </div>
    </main>
    <footer class="love-footer">
        <a href="/docs/what-is-exe">About</a>
        <span>&bull;</span>
        <a href="https://blog.exe.dev">Blog</a>
        <span>&bull;</span>
        <a href="https://discord.gg/jc9WQUfaxf">Discord</a>
    </footer>
    {{if .Testimonials}}
    <script>
      const testimonials = [
        {{range .Testimonials}}{
          quote: `{{.Quote}}`,
          author: `{{.Author}}`,
          link: `{{.Link}}`
        },
        {{end}}
      ];

      const linkIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.25 5.5a.75.75 0 0 0-.75.75v8.5c0 .414.336.75.75.75h8.5a.75.75 0 0 0 .75-.75v-4a.75.75 0 0 1 1.5 0v4A2.25 2.25 0 0 1 12.75 17h-8.5A2.25 2.25 0 0 1 2 14.75v-8.5A2.25 2.25 0 0 1 4.25 4h5a.75.75 0 0 1 0 1.5h-5Z" clip-rule="evenodd" /><path fill-rule="evenodd" d="M6.194 12.753a.75.75 0 0 0 1.06.053L16.5 4.44v2.81a.75.75 0 0 0 1.5 0v-4.5a.75.75 0 0 0-.75-.75h-4.5a.75.75 0 0 0 0 1.5h2.553l-9.056 8.194a.75.75 0 0 0-.053 1.06Z" clip-rule="evenodd" /></svg>';

      let currentIndex = 0;
      const container = document.getElementById('testimonial-container');
      const dots = document.querySelectorAll('.testimonial-dot');

      function renderTestimonial(t) {
        const quoteHtml = t.quote.replace(/\n\n/g, '<br><br>');
        let html = quoteHtml + '<div class="attribution">&mdash; ' + t.author;
        if (t.link) {
          html += ' <a href="' + t.link + '" class="source-link" target="_blank">' + linkIcon + '</a>';
        }
        html += '</div>';
        return html;
      }

      function showTestimonial(index, immediate) {
        if (index === currentIndex && !immediate) return;
        if (immediate) {
          currentIndex = index;
          container.innerHTML = renderTestimonial(testimonials[currentIndex]);
          return;
        }
        container.classList.add('fading');
        setTimeout(() => {
          currentIndex = index;
          container.innerHTML = renderTestimonial(testimonials[currentIndex]);
          container.classList.remove('fading');
          dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
          });
        }, 500);
      }

      // Show first testimonial immediately
      showTestimonial(0, true);

      dots.forEach((dot, i) => {
        dot.addEventListener('click', () => showTestimonial(i));
      });

      // Auto-cycle every 8 seconds
      setInterval(() => {
        showTestimonial((currentIndex + 1) % testimonials.length);
      }, 8000);
    </script>
    {{end}}
  </body>
</html>
