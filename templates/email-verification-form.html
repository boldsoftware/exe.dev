<!DOCTYPE html>
<html>
<head>
    <title>Confirm Email - exe.dev</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin: 20px 0;
        }
        .button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .button:hover {
            background: #1d4ed8;
        }
        .warning {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 6px;
            padding: 12px;
            margin: 20px 0;
            color: #92400e;
        }
        form {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Confirm Your Email Address</h1>
        <p>You're about to verify your email address for exe.dev.</p>

        <div class="warning">
            ⚠️ Only click confirm if you initiated this request
        </div>

        <p>This will complete your email verification and allow you to proceed with your exe.dev account setup.</p>

        <form method="POST" action="/verify-email">{{if .RedirectURL}}
            <input type="hidden" name="redirect" value="{{.RedirectURL}}">{{end}}{{if .ReturnHost}}
            <input type="hidden" name="return_host" value="{{.ReturnHost}}">{{end}}
            <input type="hidden" name="token" value="{{.Token}}">
            <button type="submit" class="button">Confirm Email Verification</button>
        </form>
    </div>
</body>
</html>
