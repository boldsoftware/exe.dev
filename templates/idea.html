<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas - {{.WebHost}}</title>
    <link rel="stylesheet" href="/static/exe.css">
    {{template "topbar_style" .}}
    <link rel="stylesheet" href="/static/form.css">
    <link rel="stylesheet" href="/static/idea.css?v=4">
</head>
<body>
    {{template "topbar" .}}
    <div class="idea-page">
        <div class="idea-hero">
            <div class="idea-hero-row">
                <h1 class="idea-hero-title">Some ideas to get you started</h1>
                <button type="button" id="idea-search-toggle" class="idea-search-toggle" aria-label="Search ideas">
                    <svg class="idea-search-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                <div id="idea-search-wrap" class="idea-search-wrap" hidden>
                    <svg class="idea-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="idea-search" class="idea-search" placeholder="Search ideas..." autocomplete="off" />
                </div>
            </div>
        </div>
        <div id="idea-grid" class="idea-grid"></div>
        <div id="idea-empty" class="idea-empty" style="display:none">
            No ideas match your search.
        </div>
        <div class="idea-footer">
            <button type="button" class="idea-submit-link" id="idea-submit-link">Submit an idea →</button>
        </div>
    </div>

    <!-- Submit idea modal -->
    <div id="idea-submit-modal" class="idea-modal">
        <div class="idea-modal-backdrop"></div>
        <div class="idea-modal-panel">
            <button type="button" class="idea-modal-close idea-submit-close" aria-label="Close">← Back</button>
            <h2 class="idea-modal-title">Submit an idea</h2>
            <p class="idea-modal-desc">Share an idea for others to try. It’ll be reviewed before going live.</p>
            <form id="idea-submit-form" class="idea-submit-form">
                <label class="idea-submit-label" for="submit-title">Title</label>
                <input type="text" id="submit-title" class="idea-submit-input" required maxlength="100" placeholder="e.g. Self-hosted Gitea">

                <label class="idea-submit-label" for="submit-desc">Short description</label>
                <input type="text" id="submit-desc" class="idea-submit-input" maxlength="300" placeholder="A quick summary of the idea">

                <label class="idea-submit-label" for="submit-category">Category</label>
                <select id="submit-category" class="idea-submit-input">
                    <option value="dev-tools">Dev Tools</option>
                    <option value="web-apps">Web Apps</option>
                    <option value="ai-ml">AI &amp; ML</option>
                    <option value="databases">Databases</option>
                    <option value="games">Games &amp; Fun</option>
                    <option value="self-hosted">Self-Hosted</option>
                    <option value="other" selected>Other</option>
                </select>

                <label class="idea-submit-label" for="submit-prompt">Prompt</label>
                <textarea id="submit-prompt" class="idea-submit-textarea" required maxlength="5000" rows="6" placeholder="What should Shelley build?"></textarea>

                <div id="submit-error" class="idea-submit-error" hidden></div>
                <div id="submit-success" class="idea-submit-success" hidden>Submitted! We’ll review it soon.</div>
                <button type="submit" id="submit-btn" class="idea-modal-use-btn">Submit</button>
            </form>
        </div>
    </div>

    <!-- Idea detail modal -->
    <div id="idea-modal" class="idea-modal">
        <div class="idea-modal-backdrop"></div>
        <div class="idea-modal-panel">
            <button type="button" class="idea-modal-close" aria-label="Close">← Back</button>
            <div class="idea-modal-icon" id="modal-icon"></div>
            <h2 class="idea-modal-title" id="modal-title"></h2>
            <p class="idea-modal-desc" id="modal-desc"></p>
            <div class="idea-modal-category" id="modal-category"></div>
            <div id="modal-prompt-section">
                <label class="idea-modal-prompt-label">Prompt</label>
                <textarea class="idea-modal-prompt" id="modal-prompt" readonly></textarea>
            </div>
            <div id="modal-image-section" style="display:none">
                <label class="idea-modal-prompt-label">Image</label>
                <div class="idea-modal-image-tag" id="modal-image"></div>
            </div>
            <div id="modal-rating-section" class="idea-modal-rating" style="display:none">
                <label class="idea-modal-prompt-label" id="modal-rating-label">Rate this idea</label>
                <div class="idea-modal-stars" id="modal-stars"></div>
            </div>
            <a id="modal-use-btn" href="/new" class="idea-modal-use-btn">Use this idea</a>
        </div>
    </div>

    <script>
        window.__IDEA_CONFIG__ = {
            canRate: {{.CanRate}},
            isLoggedIn: {{.IsLoggedIn}},
        };
    </script>
    <script src="/static/idea.js?v=5"></script>
</body>
</html>
