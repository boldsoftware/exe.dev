<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="/favicon.ico">
  <meta name="color-scheme" content="light dark">
  <title>Access required</title>
  <link rel="stylesheet" href="/static/common.css">
  <link rel="stylesheet" href="/static/simple.css">
  <meta name="robots" content="noindex">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body class="page">
  <main class="page-content">
    <p class="text-secondary text-lg mb-3">{{.Email}}</p>
    <h1 class="heading-lg mb-4">You need access</h1>
    <p class="text-secondary text-lg mb-8">Ask the owner to let you in.</p>
    <form method="POST" action="/__exe.dev/request-access">
      <textarea name="message" placeholder="Message (optional)" rows="3"
        class="input w-full" style="font-size: 1.125rem; resize: none; border-width: 2px;"></textarea>
      <button type="submit" class="btn-primary mt-6" style="font-size: 1.125rem;">Request access</button>
    </form>
  </main>
</body>
</html>
