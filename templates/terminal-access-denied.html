<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Access Denied</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.2.1" integrity="sha384-NIEnmBZDJa6zQwZWLtsVZJlPYu8tc0CNul8EMJ0WMxf4ZpsKsOfKjtEToHNCoIOH" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
  <meta name="robots" content="noindex">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body class="font-mono text-zinc-900 dark:text-zinc-100 bg-white dark:bg-zinc-950 min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    <h1 class="text-4xl font-semibold mb-6">Unauthorized</h1>
    <p class="text-zinc-500 mb-8">You don't have access to <strong>{{.BoxName}}</strong>.</p>
    <a href="{{.DashboardURL}}" class="text-blue-600 dark:text-blue-400 hover:underline">Return to your VMs</a>
  </main>
</body>
</html>
