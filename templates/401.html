<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access required</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
        },
      },
    }
  </script>
  <meta name="robots" content="noindex">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body class="font-mono text-zinc-900 bg-white min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    {{if .Email}}
    <p class="text-zinc-500 text-lg mb-3">{{.Email}}</p>
    <h1 class="text-4xl font-semibold mb-8">Access Denied.</h1>
    <p class="text-zinc-500">(find someone you know that can let you in)</p>
    {{else}}
    {{if .InvalidSecret}}
    <h1 class="text-4xl font-semibold mb-8">Invalid secret.</h1>
    <p class="text-zinc-500 text-lg mb-3">(request another)</p>
    {{else if .InvalidToken}}
    <h1 class="text-4xl font-semibold mb-8">Invalid token.</h1>
    <p class="text-zinc-500 text-lg mb-3">(request another)</p>
    {{else}}
    <h1 class="text-4xl font-semibold mb-6">Access required.</h1>
    {{end}}
    <form method="POST" action="{{.AuthURL}}">
      <input type="hidden" name="redirect" value="{{.RedirectURL}}">
      <input type="hidden" name="return_host" value="{{.ReturnHost}}">
      <input type="email" name="email" placeholder="you@example.com" required autofocus
        autocomplete="email" autocorrect="on" autocapitalize="none" spellcheck="false"
        class="w-full text-xl border-b-2 border-zinc-300 py-3 bg-transparent focus:outline-none focus:border-zinc-900 placeholder:text-zinc-400">
      <p class="text-zinc-400 text-sm mt-4">Press enter to request access</p>
    </form>
    {{end}}
  </main>
</body>
</html>
