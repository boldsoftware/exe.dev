<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.ReplHost}} - shell</title>
    <link rel="stylesheet" href="/static/topbar.css">
    <link rel="stylesheet" href="/static/xterm.css">
    <link rel="stylesheet" href="/static/terminal-common.css">
</head>
<body>
    {{template "topbar" .}}
    <div class="terminal-frame">
        <div class="terminal-header">
            <div class="terminal-title">{{.ReplHost}} shell</div>
            <div class="terminal-info">
                <div class="theme-toggle-row" id="theme-toggle">
                    <button class="theme-toggle-btn" data-mode="system" title="System">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                    </button>
                    <button class="theme-toggle-btn" data-mode="light" title="Light">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </button>
                    <button class="theme-toggle-btn" data-mode="dark" title="Dark">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="control-bar" class="control-bar" role="toolbar" aria-label="Terminal controls">
            <button class="control-btn modifier" id="ctrl-mod" title="Ctrl modifier" aria-pressed="false" aria-label="Control modifier key">Ctrl</button>
            <button class="control-btn modifier" id="alt-mod" title="Alt modifier" aria-pressed="false" aria-label="Alt modifier key">Alt</button>
            <div class="control-separator" role="separator"></div>
            <button class="control-btn" data-key="Escape" title="Escape" aria-label="Escape key">Esc</button>
            <button class="control-btn" data-key="Tab" title="Tab" aria-label="Tab key">Tab</button>
            <div class="control-separator" role="separator"></div>
            <button class="control-btn" data-ctrl="c" title="Ctrl-C (interrupt)" aria-label="Control C, interrupt">^C</button>
            <button class="control-btn" data-ctrl="d" title="Ctrl-D (EOF)" aria-label="Control D, end of file">^D</button>
            <button class="control-btn" data-ctrl="z" title="Ctrl-Z (suspend)" aria-label="Control Z, suspend">^Z</button>
            <div class="control-separator" role="separator"></div>
            <span class="control-group" role="group" aria-label="Arrow keys">
                <button class="control-btn small" data-key="ArrowUp" title="Up" aria-label="Arrow up">↑</button>
                <button class="control-btn small" data-key="ArrowDown" title="Down" aria-label="Arrow down">↓</button>
                <button class="control-btn small" data-key="ArrowLeft" title="Left" aria-label="Arrow left">←</button>
                <button class="control-btn small" data-key="ArrowRight" title="Right" aria-label="Arrow right">→</button>
            </span>
            <div class="control-separator" role="separator"></div>
            <button class="control-btn" id="paste-btn" title="Paste from clipboard" aria-label="Paste from clipboard">📋</button>
            <div class="control-separator" role="separator"></div>
            <button class="control-btn" id="kb-toggle" title="Toggle keyboard space" aria-pressed="false" aria-label="Toggle on-screen keyboard space">⌨</button>
        </div>
        <div id="connection-status" class="connection-status">
            <div class="status-icon"></div>
            <span class="status-text">Connecting...</span>
        </div>
        <div id="terminal"></div>
    </div>

    <script src="/static/xterm.js"></script>
    <script src="/static/xterm-addon-web-links.js"></script>
    <script src="/static/terminal-common.js"></script>
    <script>
        class ShellClient {
            constructor() {
                this.terminal = null;
                this.ws = null;
                this.themeManager = new ThemeManager();
                this.connected = false;
            }

            init() {
                // Modifier state for control bar
                this.ctrlActive = false;
                this.altActive = false;

                this.terminal = new Terminal({
                    cursorBlink: true,
                    fontSize: 14,
                    fontFamily: 'Consolas, "Liberation Mono", Menlo, Courier, monospace',
                    theme: this.themeManager.getTerminalTheme()
                });

                this.terminal.open(document.getElementById('terminal'));

                // Enable clickable links
                const webLinksAddon = new WebLinksAddon.WebLinksAddon();
                this.terminal.loadAddon(webLinksAddon);

                this.setupEventHandlers();
                this.setupThemeToggle();
                this.setupControlBar();
                this.connect();
                this.fitTerminal();

                window.addEventListener('resize', () => this.fitTerminal());
            }

            setupThemeToggle() {
                const toggleRow = document.getElementById('theme-toggle');
                if (toggleRow) {
                    const buttons = toggleRow.querySelectorAll('.theme-toggle-btn');
                    const updateSelection = () => {
                        const currentMode = this.themeManager.getMode();
                        buttons.forEach(btn => {
                            btn.classList.toggle('selected', btn.dataset.mode === currentMode);
                        });
                    };
                    buttons.forEach(btn => {
                        btn.addEventListener('click', () => {
                            this.themeManager.setMode(btn.dataset.mode);
                            this.terminal.options.theme = this.themeManager.getTerminalTheme();
                            updateSelection();
                        });
                    });
                    updateSelection();
                }

                // Update terminal when system theme changes (only affects 'system' mode)
                this.themeManager.onSystemThemeChange(() => {
                    this.terminal.options.theme = this.themeManager.getTerminalTheme();
                });
            }

            setupControlBar() {
                const ctrlBtn = document.getElementById('ctrl-mod');
                const altBtn = document.getElementById('alt-mod');
                const kbToggle = document.getElementById('kb-toggle');

                // Handle modifier toggle
                if (ctrlBtn) {
                    ctrlBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.ctrlActive = !this.ctrlActive;
                        ctrlBtn.classList.toggle('active', this.ctrlActive);
                        ctrlBtn.setAttribute('aria-pressed', this.ctrlActive ? 'true' : 'false');
                        this.terminal.focus();
                    });
                }

                if (altBtn) {
                    altBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.altActive = !this.altActive;
                        altBtn.classList.toggle('active', this.altActive);
                        altBtn.setAttribute('aria-pressed', this.altActive ? 'true' : 'false');
                        this.terminal.focus();
                    });
                }

                // Handle paste button
                const pasteBtn = document.getElementById('paste-btn');
                if (pasteBtn) {
                    pasteBtn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        try {
                            const text = await navigator.clipboard.readText();
                            if (text && this.connected && this.ws && this.ws.readyState === WebSocket.OPEN) {
                                this.ws.send(JSON.stringify({
                                    type: 'input',
                                    data: text
                                }));
                            }
                        } catch (err) {
                            console.error('Failed to read clipboard:', err);
                        }
                        this.terminal.focus();
                    });
                }

                // Handle keyboard space toggle
                this.keyboardMode = false;
                if (kbToggle) {
                    kbToggle.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.keyboardMode = !this.keyboardMode;
                        kbToggle.classList.toggle('active', this.keyboardMode);
                        kbToggle.setAttribute('aria-pressed', this.keyboardMode ? 'true' : 'false');
                        document.querySelector('.terminal-frame').classList.toggle('keyboard-mode', this.keyboardMode);
                        // Small delay to let CSS transition complete before resizing
                        setTimeout(() => {
                            this.fitTerminal();
                            this.terminal.focus();
                        }, 50);
                    });
                }

                // Handle control buttons
                const controlBar = document.getElementById('control-bar');
                if (controlBar) {
                    controlBar.querySelectorAll('.control-btn:not(.modifier):not(#kb-toggle):not(#paste-btn)').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            this.handleControlButton(btn);
                        });
                    });
                }
            }

            handleControlButton(btn) {
                let data = '';
                const key = btn.dataset.key;
                const ctrl = btn.dataset.ctrl;

                if (ctrl) {
                    // Ctrl+letter - send the control character
                    const charCode = ctrl.toLowerCase().charCodeAt(0) - 96;
                    data = String.fromCharCode(charCode);
                } else if (key) {
                    // Special keys - apply modifiers if active
                    const seq = this.getKeySequence(key, this.ctrlActive, this.altActive);
                    data = seq;
                }

                if (data && this.connected && this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({
                        type: 'input',
                        data: data
                    }));
                }

                // Reset modifiers after use (one-shot behavior)
                this.resetModifiers();
                this.terminal.focus();
            }

            getKeySequence(key, ctrl, alt) {
                // ANSI escape sequences for special keys
                const sequences = {
                    'Escape': '\x1b',
                    'Tab': '\t',
                    'ArrowUp': '\x1b[A',
                    'ArrowDown': '\x1b[B',
                    'ArrowRight': '\x1b[C',
                    'ArrowLeft': '\x1b[D',
                    'Home': '\x1b[H',
                    'End': '\x1b[F',
                    'PageUp': '\x1b[5~',
                    'PageDown': '\x1b[6~',
                    'Delete': '\x1b[3~',
                };

                let seq = sequences[key] || '';

                // Modify sequences for ctrl/alt if needed
                if (seq && (ctrl || alt)) {
                    // For arrow keys with modifiers, use CSI u format
                    // Format: CSI code ; modifier ~
                    // Modifier: 1 + (shift ? 1 : 0) + (alt ? 2 : 0) + (ctrl ? 4 : 0)
                    const modifier = 1 + (alt ? 2 : 0) + (ctrl ? 4 : 0);
                    if (key.startsWith('Arrow')) {
                        const codes = { 'ArrowUp': 'A', 'ArrowDown': 'B', 'ArrowRight': 'C', 'ArrowLeft': 'D' };
                        seq = `\x1b[1;${modifier}${codes[key]}`;
                    }
                }

                return seq;
            }

            resetModifiers() {
                this.ctrlActive = false;
                this.altActive = false;
                const ctrlBtn = document.getElementById('ctrl-mod');
                const altBtn = document.getElementById('alt-mod');
                if (ctrlBtn) {
                    ctrlBtn.classList.remove('active');
                    ctrlBtn.setAttribute('aria-pressed', 'false');
                }
                if (altBtn) {
                    altBtn.classList.remove('active');
                    altBtn.setAttribute('aria-pressed', 'false');
                }
            }

            setupEventHandlers() {
                // Intercept keyboard events when modifiers are active
                this.terminal.attachCustomKeyEventHandler((event) => {
                    // Only handle keydown for printable characters when modifiers are active
                    if (event.type !== 'keydown') return true;
                    if (!this.ctrlActive && !this.altActive) return true;

                    // Check if it's a printable character (a-z)
                    if (event.key.length === 1 && event.key.match(/[a-z]/i)) {
                        event.preventDefault();
                        event.stopPropagation();

                        let data;
                        if (this.ctrlActive) {
                            // Convert to control character (Ctrl+A = 0x01, etc.)
                            data = String.fromCharCode(event.key.toLowerCase().charCodeAt(0) - 96);
                        } else if (this.altActive) {
                            // Alt sends ESC + character
                            data = '\x1b' + event.key;
                        }

                        if (data && this.connected && this.ws && this.ws.readyState === WebSocket.OPEN) {
                            this.ws.send(JSON.stringify({
                                type: 'input',
                                data: data
                            }));
                        }
                        this.resetModifiers();
                        return false; // Prevent default handling
                    }
                    return true;
                });

                this.terminal.onData(data => {
                    if (this.connected && this.ws && this.ws.readyState === WebSocket.OPEN) {
                        this.ws.send(JSON.stringify({
                            type: 'input',
                            data: data
                        }));
                    }
                });
            }

            connect() {
                this.setStatus('connecting', 'Connecting to shell...');
                
                // Determine websocket URL
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/shell/ws`;
                
                this.ws = new WebSocket(wsUrl);

                this.ws.onopen = () => {
                    this.connected = true;
                    this.setStatus('connected', 'Connected');
                    setTimeout(() => this.hideStatus(), 2000);
                    
                    // Send initial terminal size
                    this.ws.send(JSON.stringify({
                        type: 'init',
                        cols: this.terminal.cols,
                        rows: this.terminal.rows
                    }));
                };

                this.ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'output' && msg.data) {
                            this.terminal.write(msg.data);
                        }
                    } catch (e) {
                        console.error('Error processing message:', e);
                    }
                };

                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.setStatus('error', 'Connection error');
                };

                this.ws.onclose = () => {
                    this.connected = false;
                    this.setStatus('error', 'Connection closed. Attempting to reconnect...');
                    
                    // Attempt to reconnect after a delay
                    setTimeout(() => this.connect(), 2000);
                };
            }

            setStatus(type, message) {
                const statusEl = document.getElementById('connection-status');
                const textEl = statusEl.querySelector('.status-text');
                statusEl.className = `connection-status ${type}`;
                textEl.textContent = message;
            }

            hideStatus() {
                const statusEl = document.getElementById('connection-status');
                statusEl.style.display = 'none';
            }

            fitTerminal() {
                if (!this.terminal) return;

                const terminalContainer = document.getElementById('terminal');
                const rect = terminalContainer.getBoundingClientRect();

                // Check if we're on mobile (control bar visible)
                const controlBar = document.getElementById('control-bar');
                const isMobile = controlBar && window.getComputedStyle(controlBar).display !== 'none';

                // Calculate available space
                const width = rect.width - (isMobile ? 8 : 20);
                let height;

                if (isMobile) {
                    // On mobile, terminal-frame has explicit height, use its bounds
                    const terminalFrame = document.querySelector('.terminal-frame');
                    const frameRect = terminalFrame.getBoundingClientRect();
                    height = frameRect.height - (rect.top - frameRect.top) - 10;
                } else {
                    // On desktop, calculate from viewport height
                    height = window.innerHeight - terminalContainer.offsetTop - 40;
                }

                // Calculate character dimensions (approximate)
                const charWidth = 9;
                const lineHeight = 18;

                const cols = Math.floor(width / charWidth);
                const rows = Math.floor(height / lineHeight);

                if (cols > 0 && rows > 0) {
                    this.terminal.resize(cols, rows);

                    // Send resize to server
                    if (this.connected && this.ws && this.ws.readyState === WebSocket.OPEN) {
                        this.ws.send(JSON.stringify({
                            type: 'resize',
                            cols: cols,
                            rows: rows
                        }));
                    }
                }
            }
        }

        // Initialize shell when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const client = new ShellClient();
            client.init();
        });
    </script>
</body>
</html>
