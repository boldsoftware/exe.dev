<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.ReplHost}} - shell</title>
    <link rel="stylesheet" href="/static/topbar.css">
    <link rel="stylesheet" href="/static/xterm.css">
    <link rel="stylesheet" href="/static/terminal-common.css">
</head>
<body>
    {{template "topbar" .}}
    <div class="terminal-frame">
        <div class="terminal-header">
            <div class="terminal-title">{{.ReplHost}} shell</div>
            <div class="terminal-info">
                <div class="theme-toggle-row" id="theme-toggle">
                    <button class="theme-toggle-btn" data-mode="system" title="System">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                    </button>
                    <button class="theme-toggle-btn" data-mode="light" title="Light">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </button>
                    <button class="theme-toggle-btn" data-mode="dark" title="Dark">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="connection-status" class="connection-status">
            <div class="status-icon"></div>
            <span class="status-text">Connecting...</span>
        </div>
        <div id="terminal"></div>
    </div>

    <script src="/static/xterm.js"></script>
    <script src="/static/xterm-addon-web-links.js"></script>
    <script src="/static/terminal-common.js"></script>
    <script>
        class ShellClient {
            constructor() {
                this.terminal = null;
                this.ws = null;
                this.themeManager = new ThemeManager();
                this.connected = false;
            }

            init() {
                this.terminal = new Terminal({
                    cursorBlink: true,
                    fontSize: 14,
                    fontFamily: 'Consolas, "Liberation Mono", Menlo, Courier, monospace',
                    theme: this.themeManager.getTerminalTheme()
                });

                this.terminal.open(document.getElementById('terminal'));
                
                // Enable clickable links
                const webLinksAddon = new WebLinksAddon.WebLinksAddon();
                this.terminal.loadAddon(webLinksAddon);
                
                this.setupEventHandlers();
                this.setupThemeToggle();
                this.connect();
                this.fitTerminal();
                
                window.addEventListener('resize', () => this.fitTerminal());
            }

            setupThemeToggle() {
                const toggleRow = document.getElementById('theme-toggle');
                if (toggleRow) {
                    const buttons = toggleRow.querySelectorAll('.theme-toggle-btn');
                    const updateSelection = () => {
                        const currentMode = this.themeManager.getMode();
                        buttons.forEach(btn => {
                            btn.classList.toggle('selected', btn.dataset.mode === currentMode);
                        });
                    };
                    buttons.forEach(btn => {
                        btn.addEventListener('click', () => {
                            this.themeManager.setMode(btn.dataset.mode);
                            this.terminal.options.theme = this.themeManager.getTerminalTheme();
                            updateSelection();
                        });
                    });
                    updateSelection();
                }

                // Update terminal when system theme changes (only affects 'system' mode)
                this.themeManager.onSystemThemeChange(() => {
                    this.terminal.options.theme = this.themeManager.getTerminalTheme();
                });
            }

            setupEventHandlers() {
                this.terminal.onData(data => {
                    if (this.connected && this.ws && this.ws.readyState === WebSocket.OPEN) {
                        this.ws.send(JSON.stringify({
                            type: 'input',
                            data: data
                        }));
                    }
                });
            }

            connect() {
                this.setStatus('connecting', 'Connecting to shell...');
                
                // Determine websocket URL
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/shell/ws`;
                
                this.ws = new WebSocket(wsUrl);

                this.ws.onopen = () => {
                    this.connected = true;
                    this.setStatus('connected', 'Connected');
                    setTimeout(() => this.hideStatus(), 2000);
                    
                    // Send initial terminal size
                    this.ws.send(JSON.stringify({
                        type: 'init',
                        cols: this.terminal.cols,
                        rows: this.terminal.rows
                    }));
                };

                this.ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'output' && msg.data) {
                            this.terminal.write(msg.data);
                        }
                    } catch (e) {
                        console.error('Error processing message:', e);
                    }
                };

                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.setStatus('error', 'Connection error');
                };

                this.ws.onclose = () => {
                    this.connected = false;
                    this.setStatus('error', 'Connection closed. Attempting to reconnect...');
                    
                    // Attempt to reconnect after a delay
                    setTimeout(() => this.connect(), 2000);
                };
            }

            setStatus(type, message) {
                const statusEl = document.getElementById('connection-status');
                const textEl = statusEl.querySelector('.status-text');
                statusEl.className = `connection-status ${type}`;
                textEl.textContent = message;
            }

            hideStatus() {
                const statusEl = document.getElementById('connection-status');
                statusEl.style.display = 'none';
            }

            fitTerminal() {
                if (!this.terminal) return;

                const terminalContainer = document.getElementById('terminal');
                const rect = terminalContainer.getBoundingClientRect();
                
                // Calculate available space
                const width = rect.width - 20; // Account for padding
                const height = window.innerHeight - terminalContainer.offsetTop - 40;
                
                // Calculate character dimensions (approximate)
                const charWidth = 9;
                const lineHeight = 18;
                
                const cols = Math.floor(width / charWidth);
                const rows = Math.floor(height / lineHeight);
                
                this.terminal.resize(cols, rows);
                
                // Send resize to server
                if (this.connected && this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({
                        type: 'resize',
                        cols: cols,
                        rows: rows
                    }));
                }
            }
        }

        // Initialize shell when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const client = new ShellClient();
            client.init();
        });
    </script>
</body>
</html>
