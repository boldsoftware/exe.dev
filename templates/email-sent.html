<!doctype html>
<html>
  <head>
    <title>Check Your Email - exe.dev</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 500px;
        margin: 100px auto;
        padding: 40px;
        background: #f5f5f5;
      }
      .container {
        background: white;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .exy {
        display: block;
        width: 72px;
        margin: 0 auto 24px;
      }
      h1 {
        color: #0f172a;
        margin-bottom: 16px;
        font-size: 28px;
      }
      p {
        color: #475569;
        line-height: 1.6;
        margin: 16px 0;
      }
      .highlight {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 16px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-weight: 600;
        margin-top: 8px;
      }
      .notice {
        background: #f0fdf4;
        border: 1px solid #22c55e;
        border-radius: 8px;
        padding: 20px;
        color: #166534;
        margin-top: 24px;
      }
      .dev-box {
        background: #f8fafc;
        border: 1px solid #cbd5f5;
        border-radius: 8px;
        padding: 20px;
        text-align: left;
        margin-top: 24px;
      }
      .dev-box h2 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #1e293b;
        margin: 0 0 12px 0;
      }
      .dev-box p {
        margin: 0 0 12px 0;
        color: #475569;
        font-size: 14px;
      }
      .code-box {
        background: #f1f5f9;
        border-radius: 8px;
        padding: 12px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        color: #0f172a;
        word-break: break-all;
      }
      a {
        color: #0284c7;
        text-decoration: none;
        font-weight: 500;
      }
      a:hover {
        text-decoration: underline;
      }
      .retry {
        margin-top: 24px;
        font-size: 14px;
      }
      @media (max-width: 600px) {
        body {
          margin: 48px auto;
          padding: 24px;
        }
        .container {
          padding: 32px 24px;
        }
        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/static/exy.png" alt="exy the fish" class="exy" />
      <h1>Check Your Email</h1>
      <p>We sent a sign-in link to:</p>
      <div class="highlight">{{.Email}}</div>
      {{if .DevURL}}
      <div class="dev-box">
        <h2>Development Shortcut</h2>
        <p>Use this link while testing locally:</p>
        <a class="code-box" href="{{.DevURL}}">{{.DevURL}}</a>
      </div>
      {{end}}
      <p class="retry">
        The link expires in 24 hours. Didn't receive it?
        <a href="/auth?{{.QueryString}}">Try again</a>
      </p>
    </div>
  </body>
</html>
