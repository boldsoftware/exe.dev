<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Check Your Email - {{.WebHost}}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
</head>
<body class="font-mono text-zinc-900 bg-white min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    <h1 class="text-4xl font-semibold mb-6">Check your email</h1>
    <p class="text-zinc-500">(quickly)</p>
    {{if .DevURL}}
    <p class="mt-8 text-zinc-400 text-sm">(dev mode)</p>
    <a href="{{.DevURL}}" class="text-blue-600 hover:underline break-all">{{.DevURL}}</a>
    {{end}}
  </main>
</body>
</html>
