<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXE.DEV - Invite Request Sent</title>
    <link rel="stylesheet" href="/static/topbar.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            min-height: 100vh;
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #d97706;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .message {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .back-link {
            display: inline-block;
            color: #666;
            text-decoration: none;
            font-size: 13px;
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: #fff;
        }

        .back-link:hover {
            color: #333;
            border-color: #d0d0d0;
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    {{template "topbar" .}}

    <div class="main-container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1 class="title">Request Sent</h1>

        <p class="message">
            We've received your request for more invite codes.<br>
            We'll review it and get back to you soon.
        </p>

        <a href="/" class="back-link">&larr; Back to My VMs</a>
    </div>
</body>
</html>
