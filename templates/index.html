<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>exe.dev</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
          keyframes: {
            cursor: {
              '0%, 49%': { opacity: '1' },
              '50%, 100%': { opacity: '0' },
            },
          },
          animation: {
            cursor: 'cursor 1s infinite',
          },
        },
      },
    }
  </script>
</head>
<body class="font-mono text-zinc-900 bg-white min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    <p class="text-6xl font-semibold tracking-widest">{{.SSHCommand}} <span class="animate-cursor select-none">_</span></p>
    <p class="text-zinc-500 mt-8">(run this in your terminal)</p>
  </main>
</body>
</html>
