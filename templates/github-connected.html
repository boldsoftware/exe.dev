<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="/favicon.ico">
  <meta name="color-scheme" content="light dark">
  <title>GitHub Connected</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.2.1" integrity="sha384-NIEnmBZDJa6zQwZWLtsVZJlPYu8tc0CNul8EMJ0WMxf4ZpsKsOfKjtEToHNCoIOH" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
  <link rel="stylesheet" href="/github-connected.css">
</head>
<body class="font-mono text-zinc-900 dark:text-zinc-100 bg-white dark:bg-zinc-950 min-h-screen flex flex-col items-center justify-center p-12 overflow-hidden">
  <div class="swim-container">
    <img src="/github-mark.svg" alt="GitHub" class="swimmer github-mark dark:hidden">
    <img src="/github-mark-white.svg" alt="GitHub" class="swimmer github-mark hidden dark:block">
    <img src="/exy.png" alt="Exy" class="swimmer exy">
  </div>
  <main class="w-full max-w-2xl text-center mt-8">
    <p class="text-4xl sm:text-6xl font-semibold tracking-widest mb-6">CONNECTED</p>
    <p class="text-zinc-500">{{.GitHubLogin}} · return to your terminal</p>
  </main>
</body>
</html>
