<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Check Your Email - exe.dev</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container {
        background: white;
        width: 100%;
        max-width: 360px;
        padding: 32px 24px;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.08);
        text-align: center;
      }
      .exy {
        display: block;
        width: 64px;
        margin: 0 auto 20px;
      }
      h1 {
        margin: 0 0 12px;
        color: #0f172a;
        font-size: 24px;
      }
      p {
        margin: 12px 0;
        color: #475569;
        line-height: 1.6;
        font-size: 16px;
      }
      .highlight {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 16px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-weight: 600;
        margin-top: 8px;
      }
      .dev-box {
        background: #f8fafc;
        border: 1px solid #cbd5f5;
        border-radius: 10px;
        padding: 16px;
        text-align: left;
        margin-top: 24px;
      }
      .dev-box h2 {
        margin: 0 0 8px;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #1e293b;
      }
      .dev-box a {
        display: inline-block;
        margin-top: 4px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #e2e8f0;
        color: #0f172a;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        word-break: break-all;
        text-decoration: none;
      }
      form {
        margin-top: 28px;
        text-align: left;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 10px;
      }
      input[type="text"] {
        width: 100%;
        padding: 14px;
        border: 1px solid #cbd5f5;
        border-radius: 10px;
        font-size: 20px;
        letter-spacing: 4px;
        text-align: center;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        color: #0f172a;
        background: #f8fafc;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
        background: white;
      }
      button {
        width: 100%;
        margin-top: 16px;
        padding: 14px 18px;
        border: none;
        border-radius: 999px;
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
      .divider {
        margin: 28px 0 4px;
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
      }
      .retry {
        margin-top: 24px;
        font-size: 14px;
        color: #64748b;
        text-align: center;
      }
      a {
        color: #0284c7;
        text-decoration: none;
        font-weight: 500;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/static/exy.png" alt="exy the fish" class="exy" />
      <h1>Check Your Email</h1>
      <p>We sent a sign-in link to:</p>
      <div class="highlight">{{.Email}}</div>
      {{if .DevURL}}
      <div class="dev-box">
        <h2>Development shortcut</h2>
        <a href="{{.DevURL}}">{{.DevURL}}</a>
      </div>
      {{end}}
      <div class="divider">Prefer to enter the token?</div>
      <form method="POST" action="/m/verify-token">
        <label for="token">Token</label>
        <input type="text" id="token" name="token" required />
        <button type="submit">Verify</button>
      </form>
      <p class="retry">
        Didn't get the email?
        <a href="/m">Send it again</a>
      </p>
    </div>
  </body>
</html>
