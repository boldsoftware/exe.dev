<!doctype html>
<html>
  <head>
    <title>Authentication Error - exe.dev</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 500px;
        margin: 100px auto;
        padding: 40px;
        background: #f5f5f5;
      }
      .container {
        background: white;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .exy {
        display: block;
        width: 72px;
        margin: 0 auto 24px;
      }
      h1 {
        color: #0f172a;
        margin-bottom: 16px;
        font-size: 28px;
      }
      p {
        color: #475569;
        line-height: 1.6;
        margin: 16px 0;
      }
      .error-box {
        background: #fef2f2;
        border: 1px solid #f87171;
        border-radius: 8px;
        padding: 20px;
        color: #b91c1c;
        text-align: left;
      }
      .error-box p {
        margin: 0;
        font-weight: 500;
      }
      .command-box {
        background: #f0f9ff;
        border: 1px solid #0ea5e9;
        border-radius: 8px;
        padding: 16px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        color: #0f172a;
        letter-spacing: 0.08em;
        display: inline-block;
        margin-top: 16px;
      }
      .retry {
        margin-top: 24px;
      }
      a {
        color: #0284c7;
        text-decoration: none;
        font-weight: 500;
      }
      a:hover {
        text-decoration: underline;
      }
      @media (max-width: 600px) {
        body {
          margin: 48px auto;
          padding: 24px;
        }
        .container {
          padding: 32px 24px;
        }
        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/static/exy.png" alt="exy the fish" class="exy" />
      <h1>Authentication Error</h1>
      <div class="error-box">
        <p>{{.Message}}</p>
        {{if .Command}}
        <div class="command-box">{{.Command}}</div>
        {{end}}
      </div>
      <p class="retry"><a href="/auth?{{.QueryString}}">← Try again</a></p>
    </div>
  </body>
</html>
