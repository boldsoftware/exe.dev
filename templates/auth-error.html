<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.WebHost}} - Error</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
</head>
<body class="font-mono text-zinc-900 bg-white min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    <h1 class="text-4xl font-semibold mb-6 text-red-600">Error</h1>
    <p class="text-xl text-zinc-700 mb-6">{{.Message}}</p>
    {{if .Command}}
    <p class="text-zinc-500 mb-6">Command: <code class="bg-zinc-100 px-2 py-1">{{.Command}}</code></p>
    {{end}}
    <a href="/auth{{if .QueryString}}?{{.QueryString}}{{end}}" class="text-zinc-500 hover:text-zinc-900 underline underline-offset-2 transition-colors">
      Try again
    </a>
    {{if .TraceID}}
    <p class="text-zinc-400 text-sm mt-8">trace: {{.TraceID}}</p>
    {{end}}
  </main>
</body>
</html>
