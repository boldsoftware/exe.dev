<!doctype html>
<html>
  <head>
    <title>Confirm Login - exe.dev</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/exe.css" />
    <style>
      .auth-page {
        padding: 100px 40px;
      }
      .auth-box {
        text-align: center;
      }
      .info-grid {
        display: grid;
        gap: 16px;
        margin: 24px 0;
        text-align: left;
      }
      .info-card {
        background: #f8fafc;
        border: 1px solid #cbd5f5;
        border-radius: 12px;
        padding: 24px;
        text-align: center;
      }
      .site-value {
        display: block;
        font-size: 22px;
        font-weight: 600;
        color: #0f172a;
        word-break: break-word;
      }
      .button-row {
        display: flex;
        gap: 12px;
        margin-top: 32px;
      }
      .button {
        flex: 1;
        padding: 14px 18px;
        border-radius: 999px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.1s ease,
          box-shadow 0.1s ease;
      }
      .button:hover {
        text-decoration: none;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
      }
      .button:active {
        transform: translateY(0);
        box-shadow: none;
      }
      .button.primary {
        background: linear-gradient(135deg, #2563eb, #1e40af);
        color: white;
      }
      .button.secondary {
        background: #e2e8f0;
        color: #0f172a;
      }
      .note {
        font-size: 14px;
        color: #64748b;
        margin-top: 24px;
      }
      @media (max-width: 600px) {
        .auth-page {
          padding: 48px 24px;
        }
      }
    </style>
  </head>
  <body class="auth-page gray">
    <main>
      <div class="auth-box simple">
        <img src="/static/exy.png" alt="exy the fish" class="exy" />
      <h1>Confirm Login</h1>
      <p>Do you want to log in as <strong>{{.UserEmail}}</strong> to:</p>

      <div class="info-grid">
        <div class="info-card">
          <span class="site-value">{{.SiteDomain}}</span>
        </div>
      </div>

      <p class="note">The site will be able to see your email address.</p>

      <div class="button-row">
        <a href="{{.CancelURL}}" class="button secondary">Cancel</a>
        <a href="{{.ConfirmURL}}" class="button primary">Continue</a>
      </div>
      </div>
    </main>
  </body>
</html>
