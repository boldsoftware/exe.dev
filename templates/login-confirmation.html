<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>CONFIRM LOGIN - {{.WebHost}}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
</head>
<body class="font-mono text-zinc-900 dark:text-zinc-100 bg-white dark:bg-zinc-950 min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    <p class="text-zinc-500 text-lg mb-3">{{.UserEmail}}</p>
    <h1 class="text-4xl font-semibold mb-8">CONFIRM LOGIN</h1>
    <div class="bg-zinc-100 dark:bg-zinc-800 rounded mb-6 inline-block">
      <p class="text-xs text-zinc-400 pt-3 px-4">SITE</p>
      <p class="p-4 pt-2 text-xl font-semibold">{{.SiteDomain}}</p>
    </div>
    <p class="text-zinc-500 mb-8">The site will be able to see your email address.</p>
    <div class="flex gap-4">
      <a href="{{.CancelURL}}" class="px-6 py-3 bg-zinc-200 dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 rounded text-sm font-semibold hover:bg-zinc-300 dark:hover:bg-zinc-600 transition-colors">Cancel</a>
      <a href="{{.ConfirmURL}}" class="px-6 py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded text-sm font-semibold hover:bg-black dark:hover:bg-zinc-300 transition-colors">Continue</a>
    </div>
  </main>
</body>
</html>
