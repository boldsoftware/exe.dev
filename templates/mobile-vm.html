<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exe.dev - {{.Box.Name}}</title>
    <style>
        body { background:#fffff8; font-family: Georgia, 'Times New Roman', serif; padding:20px; }
        .container { max-width:560px; margin:0 auto; }
        .logo { font-size:32px; font-weight:bold; color:#333; margin-bottom:8px; text-align:center; }
        .host { font-family:'Courier New', monospace; text-align:center; color:#333; margin-bottom:14px; }
        .card { background:rgba(255,255,255,0.85); border:1px solid #ddd; border-radius:8px; padding:18px; }
        .action { display:block; margin:10px 0; padding:14px; background:#4CAF50; color:#fff; text-decoration:none; text-align:center; border-radius:8px; font-size:18px; }
        .term { background:#333; }
        .meta { margin-top:12px; color:#666; font-size:12px; text-align:center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">exe.dev</div>
        <div class="host">{{.HostLabel}}</div>
        <div class="card">
            <a class="action" href="{{.HTTPURL}}">Open App</a>
            <a class="action term" href="{{.TermURL}}">Open Terminal</a>
            <div class="meta">Image: {{.Box.Image}} · Status: {{.Box.Status}}</div>
        </div>
    </div>
</body>
</html>
