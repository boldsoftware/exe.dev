<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.WebHost}} - Sign in</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
</head>
<body class="font-mono text-zinc-900 bg-white min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    <h1 class="text-4xl font-semibold mb-6">Request a link</h1>
    <form method="POST" action="{{if .BoxName}}/m/email-auth{{else}}/auth{{end}}">
      {{if .RedirectURL}}
      <input type="hidden" name="redirect" value="{{.RedirectURL}}">
      {{end}}
      {{if .ReturnHost}}
      <input type="hidden" name="return_host" value="{{.ReturnHost}}">
      {{end}}
      {{if .BoxName}}
      <input type="hidden" name="hostname" value="{{.BoxName}}">
      {{end}}
      {{if .Prompt}}
      <input type="hidden" name="prompt" value="{{.Prompt}}">
      {{end}}
      <input type="email" name="email" placeholder="you@example.com" required autofocus
        autocomplete="email" autocorrect="on" autocapitalize="none" spellcheck="false"
        class="w-full text-xl border-b-2 border-zinc-300 py-3 bg-transparent focus:outline-none focus:border-zinc-900 placeholder:text-zinc-400">
      <p class="text-zinc-400 text-sm mt-4">Press enter</p>
    </form>
  </main>
</body>
</html>
