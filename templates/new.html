{{define "new_content"}}
<div class="new-view">
    <div class="form-container">
        <div class="form-card">
            <h1 class="form-title">Create a New VM</h1>
            
            <form id="create-vm-form" method="POST" action="/create-vm">
                <div class="form-group">
                    <div class="form-input-group">
                        <input
                            type="text"
                            id="hostname"
                            name="hostname"
                            class="form-input form-input-large"
                            placeholder="{{.HostnameSuggestion}}"
                            value="{{.HostnameSuggestion}}"
                            required
                            autocomplete="off"
                            autocapitalize="none"
                        />
                        <span class="form-input-suffix form-input-suffix-large">.{{.BoxHost}}</span>
                    </div>
                    <div id="hostname-hint" class="form-hint"></div>
                </div>
                
                <div class="form-group">
                    <label for="prompt" class="form-label">What do you want to build? <span style="color: #999; font-weight: 400;">(optional)</span></label>
                    <textarea
                        id="prompt"
                        name="prompt"
                        class="form-input form-textarea"
                        placeholder="Build a blog..."
                        rows="4"
                    >{{.Prompt}}</textarea>
                </div>
                
                <button type="submit" class="form-button" id="create-button" disabled>
                    Create VM
                </button>
            </form>
        </div>
    </div>
</div>
{{end}}



{{define "new_script"}}
<script>
    // Placeholder text rotation
    const placeholders = [
        'Run a Jupyter notebook...',
        'Deploy a web app...',
        'Create an API...',
        'Launch a game server...',
        'Build a chatbot...',
        'Set up CI/CD...',
        'Set up a database...',
        'Build a blog...'
    ];
    
    let currentPlaceholderIndex = 0;
    const promptInput = document.getElementById('prompt');
    
    function rotatePlaceholder() {
        if (promptInput.value === '' && document.activeElement !== promptInput) {
            currentPlaceholderIndex = (currentPlaceholderIndex + 1) % placeholders.length;
            promptInput.placeholder = placeholders[currentPlaceholderIndex];
        }
    }
    
    setInterval(rotatePlaceholder, 5000);
    
    // Hostname availability checking
    const hostnameInput = document.getElementById('hostname');
    const hostnameHint = document.getElementById('hostname-hint');
    const createButton = document.getElementById('create-button');
    
    let checkTimeout;
    
    function setHint(html) {
        // Display toggle forces Safari to repaint after removing animated spinner
        hostnameHint.style.display = 'none';
        hostnameHint.innerHTML = html;
        hostnameHint.className = html ? 'form-hint error' : 'form-hint';
        hostnameHint.offsetHeight;
        hostnameHint.style.display = '';
    }

    function checkHostnameAvailability() {
        const hostname = hostnameInput.value.trim();
        
        if (!hostname) {
            hostnameHint.innerHTML = '';
            hostnameHint.className = 'form-hint';
            createButton.disabled = true;
            return;
        }
        
        // Show spinner
        hostnameHint.innerHTML = '<span class="spinner"></span>Checking availability...';
        hostnameHint.className = 'form-hint';
        
        fetch('/check-hostname', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ hostname: hostname }),
        })
        .then(response => response.json())
        .then(data => {
            if (data.valid && data.available) {
                setHint('');
                createButton.disabled = false;
            } else {
                setHint('✗ ' + data.message);
                createButton.disabled = true;
            }
        })
        .catch(error => {
            setHint('✗ Error checking availability');
            createButton.disabled = true;
        });
    }
    
    hostnameInput.addEventListener('input', function() {
        clearTimeout(checkTimeout);
        checkTimeout = setTimeout(checkHostnameAvailability, 500);
    });
    
    // Check initial hostname
    checkHostnameAvailability();
</script>
{{end}}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a New VM - {{.WebHost}}</title>
    <link rel="stylesheet" href="/static/exe.css">
    {{template "topbar_style" .}}
    <link rel="stylesheet" href="/static/form.css">
    <link rel="stylesheet" href="/static/new.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            align-items: stretch;
            background: #fff;
        }
    </style>
</head>
<body>
    {{template "topbar" .}}
    {{template "new_content" .}}
    {{template "new_script" .}}
</body>
</html>
