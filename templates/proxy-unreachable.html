<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service unavailable</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
  <meta name="robots" content="noindex">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body class="font-mono text-zinc-900 bg-white min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    {{if .IsShelleyPort}}
    <p class="text-xs text-zinc-400 mb-3">SHELLEY AGENT</p>
    <h1 class="text-4xl font-semibold mb-6">Shelley isn't running on {{.BoxName}}</h1>
    <p class="text-zinc-500 mb-8">The Shelley coding agent isn't currently running on this VM.</p>
    {{else}}
    <h1 class="text-4xl font-semibold mb-6">Port {{.Port}} unbound.</h1>
    <div class="bg-zinc-100 rounded p-4">
      <code class="text-sm">ssh {{.BoxName | call .BoxDest}} sudo systemctl enable --now nginx</code>
    </div>
    {{end}}
  </main>
</body>
</html>
