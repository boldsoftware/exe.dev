<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service unavailable</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 40px auto; max-width: 700px; color: #222; }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
    p { line-height: 1.5; margin: 0.6rem 0; }
    a { color: inherit; text-decoration: underline; }
    code { background: #f4f4f4; padding: 0 4px; border-radius: 3px; }
    .muted { color: #666; }
  </style>
  <meta name="robots" content="noindex">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="format-detection" content="telephone=no">
  <meta name="color-scheme" content="light dark">
  <style>
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #ddd; }
      code { background: #1d1d1d; }
      .muted { color: #aaa; }
    }
  </style>
  
</head>
<body>
  <h1>Can’t reach your box on port {{.Port}}</h1>
  <p>exe.dev’s proxy couldn’t connect to <strong>{{.BoxName}}</strong> on port <code>{{.Port}}</code>.</p>
  <p>Log into your box (via SSH or the <a href="{{.TerminalURL}}">web terminal</a>) and start your server.</p>
</body>
</html>
