<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="/favicon.ico">
  <meta name="color-scheme" content="light dark">
  <title>Service unavailable</title>
  <link rel="stylesheet" href="/static/common.css">
  <link rel="stylesheet" href="/static/simple.css">
  <meta name="robots" content="noindex">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body class="page">
  <main class="page-content">
    {{if .IsShelleyPort}}
    <p class="text-muted mb-3" style="font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.5px;">SHELLEY AGENT</p>
    <h1 class="heading-lg mb-6">Shelley isn't running on {{.BoxName}}</h1>
    <p class="text-secondary mb-8">The Shelley coding agent isn't currently running on this VM.</p>
    {{else}}
    <h1 class="heading-lg mb-6">Port {{.Port}} unbound.</h1>
    <div class="code-block" style="padding: 16px;">
      <code>ssh {{.BoxName | call .BoxDest}} sudo systemctl enable --now nginx</code>
    </div>
    {{end}}
    {{if .TraceID}}<p class="text-muted mt-6" style="font-size: var(--text-sm);">trace: {{.TraceID}}</p>{{end}}
  </main>
</body>
</html>
