<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirm Device - {{.WebHost}}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
  </style>
</head>
<body class="font-mono text-zinc-900 bg-white min-h-screen flex items-center justify-center p-12">
  <main class="w-full max-w-2xl">
    <p class="text-zinc-500 text-lg mb-3">{{.Email}}</p>
    <h1 class="text-3xl font-semibold mb-6">Authorize SSH key</h1>
    <div class="bg-zinc-100 rounded mb-6 inline-block">
      <p class="text-xs text-zinc-400 pt-3 px-4">SSH KEY</p>
      <pre class="p-4 pt-2 text-sm whitespace-pre-wrap break-words"><code>{{.PublicKey}}</code></pre>
    </div>
    {{/* {{if .PairingCode}}
    <div class="bg-zinc-100 rounded mb-6 inline-block">
      <p class="text-xs text-zinc-400 pt-3 px-4">PAIRING CODE</p>
      <p class="p-4 pt-2 text-2xl font-semibold tracking-widest">{{.PairingCode}}</p>
    </div>
    {{end}} */}}
    <form method="POST" action="/verify-device">
      <input type="hidden" name="token" value="{{.Token}}">
      <button type="submit" class="bg-zinc-900 text-white px-6 py-3 text-sm hover:bg-black transition-colors rounded">Authorize</button>
    </form>
  </main>
</body>
</html>
