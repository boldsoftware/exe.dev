<!DOCTYPE html>
<html>
<head>
    <title>Confirm Device - exe.dev</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin: 20px 0;
        }
        .info-box {
            background: #f0f9ff;
            border: 1px solid #0ea5e9;
            border-radius: 6px;
            padding: 16px;
            margin: 20px 0;
        }
        .info-box strong {
            color: #0c4a6e;
        }
        .fingerprint {
            font-family: monospace;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 8px;
        }
        .button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .button:hover {
            background: #1d4ed8;
        }
        .warning {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 6px;
            padding: 12px;
            margin: 20px 0;
            color: #92400e;
        }
        form {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authorize New Device</h1>
        <p>A new device is requesting access to your exe.dev account.</p>

        <div class="info-box">
            <strong>Account:</strong> {{.Email}}<br>
            <strong>Device Fingerprint:</strong>
            <div class="fingerprint">{{.Fingerprint}}...</div>
        </div>

        <div class="warning">
            ⚠️ Only confirm if you just tried to connect from a new device
        </div>

        <p>This will allow the device to access your exe.dev containers using SSH.</p>

        <form method="POST" action="/verify-device">
            <input type="hidden" name="token" value="{{.Token}}">
            <button type="submit" class="button">Authorize Device</button>
        </form>
    </div>
</body>
</html>
