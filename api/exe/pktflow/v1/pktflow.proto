syntax = "proto3";

package exe.pktflow.v1;

option go_package = "exe.dev/api/pktflow/v1";

service PktFlowService {
  rpc StreamFlowStats(StreamFlowStatsRequest) returns (stream FlowStatsReport);
}

message StreamFlowStatsRequest {}

message FlowStatsReport {
  string host_id = 1;
  int64 ts_unix_ms = 2;
  int64 interval_ms = 3;
  uint32 sample_rate = 4;
  repeated VMFlowStats vms = 5;
}

message VMFlowStats {
  string vm_id = 1;
  string user_id = 2;
  string tap = 3;
  uint64 tx_bytes = 4;
  uint64 tx_packets = 5;
  uint64 tx_dropped = 6;
  uint64 tx_errors = 7;
  uint64 rx_bytes = 8;
  uint64 rx_packets = 9;
  uint64 rx_dropped = 10;
  uint64 rx_errors = 11;
  repeated FlowRecord flows = 12;
}

message FlowRecord {
  string dst_ip = 1;
  uint32 ip_version = 2;
  uint32 ip_proto = 3;
  uint32 src_port = 4;
  uint32 dst_port = 5;
  uint32 icmp_type = 6;
  uint32 tcp_flags = 7;
  bool fragment = 8;
  uint64 packets = 9;
  uint64 bytes = 10;
}
