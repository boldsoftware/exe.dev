syntax = "proto3";

package exe.resource.v1;

option go_package = "exe.dev/api/resource/v1";

service ResourceManagerService {
  // GetNodeStatus returns current node capacity and allocation summary
  rpc GetNodeStatus(GetNodeStatusRequest) returns (GetNodeStatusResponse);

  // GetVMUsage returns usage information for a specific VM
  rpc GetVMUsage(GetVMUsageRequest) returns (GetVMUsageResponse);

  // ListVMUsage streams usage information for all VMs
  rpc ListVMUsage(ListVMUsageRequest) returns (stream ListVMUsageResponse);

  // SetVMPriority manually sets priority for a VM
  rpc SetVMPriority(SetVMPriorityRequest) returns (SetVMPriorityResponse);

  // GetMachineUsage returns current usage stats for host machine
  rpc GetMachineUsage(GetMachineUsageRequest) returns (GetMachineUsageResponse);

  // SetMachineUsage sets the reported usage, for testing.
  rpc SetMachineUsage(SetMachineUsageRequest) returns (SetMachineUsageResponse);

  // ThrottleVM applies resource throttling to a VM via cgroup v2 controls.
  rpc ThrottleVM(ThrottleVMRequest) returns (ThrottleVMResponse);
}

message GetNodeStatusRequest {}

message GetNodeStatusResponse {
  NodeCapacity capacity = 1;
  NodeAllocation allocation = 2;
}

message GetVMUsageRequest {
  string vm_id = 1;
  // collect_filesystem_usage requests that the exelet probe the
  // guest's ext4 superblock and populate fs_*_bytes on the response.
  // Defaults to false (no probe; fs_*_bytes left at zero). The probe
  // is read-only and unconditionally allowed when requested.
  bool collect_filesystem_usage = 2;
}

message GetVMUsageResponse {
  VMUsage usage = 1;
}

message ListVMUsageRequest {
  // Same semantics as GetVMUsageRequest.collect_filesystem_usage,
  // applied to every VM in the response stream.
  bool collect_filesystem_usage = 1;
}

message ListVMUsageResponse {
  VMUsage usage = 1;
}

message NodeCapacity {
  uint64 cpus = 1;           // Total CPU cores
  uint64 memory_bytes = 2;   // Total RAM in bytes
  uint64 disk_bytes = 3;     // Total disk in bytes (ZFS pool)
}

message NodeAllocation {
  uint64 cpus = 1;           // Sum of allocated vCPUs
  uint64 memory_bytes = 2;   // Sum of allocated memory
  uint64 disk_bytes = 3;     // Sum of allocated disk quotas
}

message VMUsage {
  string id = 1;
  string name = 2;
  double cpu_seconds = 3;    // Total CPU time consumed
  double cpu_percent = 10;   // CPU usage percentage from last poll interval (100% = 1 core)
  uint64 memory_bytes = 4;   // Current RSS memory usage
  uint64 disk_bytes = 5;             // Current disk usage (compressed on-disk bytes)
  uint64 disk_logical_bytes = 13;    // Current disk usage (uncompressed logical bytes, matches df -h)
  uint64 mem_capacity_bytes = 14;    // Allocated memory from VM config
  uint64 cpus = 15;                  // Allocated vCPUs from VM config
  uint64 net_rx_bytes = 6;   // Total network received
  uint64 net_tx_bytes = 7;   // Total network transmitted
  int64 last_activity = 8;   // Unix nano timestamp of last detected activity
  VMPriority priority = 9;
  uint64 swap_bytes = 11;           // Current swap usage
  uint64 disk_capacity_bytes = 12;  // Provisioned disk capacity (ZFS volsize)

  // Detailed cgroup memory.stat breakdown. memory_bytes above is the
  // cgroup's total memory.current (sum of charges: anon + file + kernel +
  // ...; cgroup v2 'kernel' already includes slab). For a hugepage-backed
  // VM, the guest RAM does not show up in memory.current at all, while
  // host page cache from the VM's disk I/O does — so memory_bytes is
  // typically dominated by reclaimable cache. memory_anon_bytes is the
  // closest proxy to the VM guest's non-reclaimable working set, and
  // memory_file_bytes is reclaimable host page cache.
  uint64 memory_anon_bytes = 16;
  uint64 memory_file_bytes = 17;
  uint64 memory_kernel_bytes = 18;
  uint64 memory_shmem_bytes = 19;
  uint64 memory_slab_bytes = 20;
  uint64 memory_inactive_file_bytes = 21;

  // Guest filesystem (ext4) usage, read directly from the zvol's primary
  // superblock without involving the guest. Zero when unavailable
  // (volume not yet formatted, not ext4, transient I/O error). These
  // numbers reflect the guest's view. fs_total_bytes is the raw ext4
  // block_count * block_size (typically a few percent larger than
  // statvfs f_blocks, which subtracts metadata overhead). fs_free_bytes
  // matches statvfs f_bfree (free blocks including the root-reserved
  // pool); fs_available_bytes matches statvfs f_bavail (free blocks
  // minus the root reservation, i.e. what `df` shows in the "Avail"
  // column for a non-root user). fs_used_bytes is the obvious
  // complement of fs_free_bytes: block_size * (blocks_count -
  // free_blocks_count).
  uint64 fs_total_bytes = 22;
  uint64 fs_free_bytes = 23;
  uint64 fs_available_bytes = 24;
  uint64 fs_used_bytes = 25;

  // Guest-side memory stats scraped from memd inside the VM (v0). Optional;
  // absent when memwatch has no fresh sample for this VM.
  GuestMemoryStats guest_memory = 26;
}

// GuestMemoryStats is a host-normalised view of one /proc scrape from
// memd. All sizes are bytes; PSI averages are percent (0..100).
message GuestMemoryStats {
  // Wall-clock instant the sample was captured inside the guest.
  int64 captured_at_unix_nano = 1;
  // Wall-clock instant the host received the sample.
  int64 fetched_at_unix_nano = 2;
  double uptime_sec = 3;

  uint64 mem_total_bytes = 4;
  uint64 mem_available_bytes = 5;
  uint64 cached_bytes = 6;
  uint64 active_file_bytes = 7;
  uint64 inactive_file_bytes = 8;
  uint64 mlocked_bytes = 9;
  uint64 dirty_bytes = 10;
  uint64 swap_total_bytes = 11;
  uint64 swap_free_bytes = 12;
  uint64 sreclaimable_bytes = 13;
  // Reclaimable estimate for drop_caches=1 (host policy):
  // Active(file)+Inactive(file)−Mlocked−Dirty.
  uint64 reclaimable_bytes = 14;

  uint64 workingset_refault_file = 15;
  uint64 workingset_refault_anon = 16;
  uint64 pgmajfault = 17;

  bool psi_available = 18;
  double psi_some_avg10 = 19;
  double psi_some_avg60 = 20;
  double psi_some_avg300 = 21;
  double psi_full_avg10 = 22;
  double psi_full_avg60 = 23;
  double psi_full_avg300 = 24;

  // Refaults/sec computed over the most recent ~60s of samples.
  double refault_rate = 25;
}

enum VMPriority {
  PRIORITY_NORMAL = 0;
  PRIORITY_LOW = 1;
  PRIORITY_AUTO = 2;    // Use automatic detection based on activity
}

message SetVMPriorityRequest {
  string vm_id = 1;
  VMPriority priority = 2;
}

message SetVMPriorityResponse {}

message GetMachineUsageRequest {}

message GetMachineUsageResponse {
  bool available = 1; // set manually, for testing and perhaps for decommissioning.
  MachineUsage usage = 2;
}

message SetMachineUsageRequest {
  bool available = 1;
  MachineUsage usage = 2; // ignored if missing
}

message SetMachineUsageResponse {}

message MachineUsage {
  // From /proc/loadavg:
  float load_average = 1;   // 15 minute load average

  // From /proc/meminfo:
  int64 mem_total = 2;     // total memory in KiB
  int64 mem_free = 3;      // free memory in KiB
  int64 mem_available = 4; // available memory in KiB
  int64 swap_total = 5;    // total swap space in KiB
  int64 swap_free = 6;     // free swap space in KiB

  // From statfs(2):
  int64 disk_total = 7;      // total disk space in KiB
  int64 disk_free = 8;       // free disk space in KiB

  // From sar -n:
  float rx_bytes_rate = 9;  // bytes received per second ten minutes
  float tx_bytes_rate = 10; // bytes transmitted per second ten minutes
}

message ThrottleVMRequest {
  string vm_id = 1;
  bool clear = 2;                      // Remove all throttling
  optional uint32 cpu_percent = 3;     // CPU limit (5 = 5% of CPU time)
  optional uint32 memory_percent = 4;  // memory.high as % of allocated (50 = push to swap at 50%)
  optional uint64 io_read_bps = 5;     // Read bandwidth limit in bytes/sec (0 = unlimited)
  optional uint64 io_write_bps = 6;    // Write bandwidth limit in bytes/sec (0 = unlimited)
}

message ThrottleVMResponse {}
