syntax = "proto3";

package exe.resource.v1;

option go_package = "exe.dev/api/resource/v1";

service ResourceManagerService {
  // GetNodeStatus returns current node capacity and allocation summary
  rpc GetNodeStatus(GetNodeStatusRequest) returns (GetNodeStatusResponse);

  // GetVMUsage returns usage information for a specific VM
  rpc GetVMUsage(GetVMUsageRequest) returns (GetVMUsageResponse);

  // ListVMUsage streams usage information for all VMs
  rpc ListVMUsage(ListVMUsageRequest) returns (stream ListVMUsageResponse);

  // SetVMPriority manually sets priority for a VM
  rpc SetVMPriority(SetVMPriorityRequest) returns (SetVMPriorityResponse);

  // GetMachineUsage returns current usage stats for host machine
  rpc GetMachineUsage(GetMachineUsageRequest) returns (GetMachineUsageResponse);

  // SetMachineUsage sets the reported usage, for testing.
  rpc SetMachineUsage(SetMachineUsageRequest) returns (SetMachineUsageResponse);

  // ThrottleVM applies resource throttling to a VM via cgroup v2 controls.
  rpc ThrottleVM(ThrottleVMRequest) returns (ThrottleVMResponse);
}

message GetNodeStatusRequest {}

message GetNodeStatusResponse {
  NodeCapacity capacity = 1;
  NodeAllocation allocation = 2;
}

message GetVMUsageRequest {
  string vm_id = 1;
}

message GetVMUsageResponse {
  VMUsage usage = 1;
}

message ListVMUsageRequest {}

message ListVMUsageResponse {
  VMUsage usage = 1;
}

message NodeCapacity {
  uint64 cpus = 1;           // Total CPU cores
  uint64 memory_bytes = 2;   // Total RAM in bytes
  uint64 disk_bytes = 3;     // Total disk in bytes (ZFS pool)
}

message NodeAllocation {
  uint64 cpus = 1;           // Sum of allocated vCPUs
  uint64 memory_bytes = 2;   // Sum of allocated memory
  uint64 disk_bytes = 3;     // Sum of allocated disk quotas
}

message VMUsage {
  string id = 1;
  string name = 2;
  double cpu_seconds = 3;    // Total CPU time consumed
  double cpu_percent = 10;   // CPU usage percentage from last poll interval
  uint64 memory_bytes = 4;   // Current memory usage
  uint64 disk_bytes = 5;     // Current disk usage
  uint64 net_rx_bytes = 6;   // Total network received
  uint64 net_tx_bytes = 7;   // Total network transmitted
  int64 last_activity = 8;   // Unix nano timestamp of last detected activity
  VMPriority priority = 9;
}

enum VMPriority {
  PRIORITY_NORMAL = 0;
  PRIORITY_LOW = 1;
  PRIORITY_AUTO = 2;    // Use automatic detection based on activity
}

message SetVMPriorityRequest {
  string vm_id = 1;
  VMPriority priority = 2;
}

message SetVMPriorityResponse {}

message GetMachineUsageRequest {}

message GetMachineUsageResponse {
  bool available = 1; // set manually, for testing and perhaps for decommissioning.
  MachineUsage usage = 2;
}

message SetMachineUsageRequest {
  bool available = 1;
  MachineUsage usage = 2; // ignored if missing
}

message SetMachineUsageResponse {}

message MachineUsage {
  // From /proc/loadavg:
  float load_average = 1;   // 15 minute load average

  // From /proc/meminfo:
  int64 mem_total = 2;     // total memory in KiB
  int64 mem_free = 3;      // free memory in KiB
  int64 mem_available = 4; // available memory in KiB
  int64 swap_total = 5;    // total swap space in KiB
  int64 swap_free = 6;     // free swap space in KiB

  // From statfs(2):
  int64 disk_total = 7;      // total disk space in KiB
  int64 disk_free = 8;       // free disk space in KiB

  // From sar -n:
  float rx_bytes_rate = 9;  // bytes received per second ten minutes
  float tx_bytes_rate = 10; // bytes transmitted per second ten minutes
}

message ThrottleVMRequest {
  string vm_id = 1;
  bool clear = 2;                      // Remove all throttling
  optional uint32 cpu_percent = 3;     // CPU limit (5 = 5% of CPU time)
  optional uint32 memory_percent = 4;  // memory.high as % of allocated (50 = push to swap at 50%)
  optional uint64 io_read_bps = 5;     // Read bandwidth limit in bytes/sec (0 = unlimited)
  optional uint64 io_write_bps = 6;    // Write bandwidth limit in bytes/sec (0 = unlimited)
}

message ThrottleVMResponse {}
