syntax = "proto3";

package exe.compute.v1;

option go_package = "exe.dev/api/compute/v1";

service ComputeService {
  rpc CreateInstance(CreateInstanceRequest) returns (stream CreateInstanceResponse);
  rpc ListInstances(ListInstancesRequest) returns (stream ListInstancesResponse);
  rpc CountInstances(CountInstancesRequest) returns (CountInstancesResponse);
  rpc GetInstance(GetInstanceRequest) returns (GetInstanceResponse);
  rpc GetInstanceLogs(GetInstanceLogsRequest) returns (stream GetInstanceLogsResponse);
  rpc StartInstance(StartInstanceRequest) returns (StartInstanceResponse);
  rpc StopInstance(StopInstanceRequest) returns (StopInstanceResponse);
  rpc UpdateInstance(UpdateInstanceRequest) returns (UpdateInstanceResponse);
  rpc DeleteInstance(DeleteInstanceRequest) returns (DeleteInstanceResponse);
  rpc SetInstanceGroup(SetInstanceGroupRequest) returns (SetInstanceGroupResponse);
  rpc RenameInstance(RenameInstanceRequest) returns (RenameInstanceResponse);
  rpc GetSystemInfo(GetSystemInfoRequest) returns (GetSystemInfoResponse);

  // InitSendVM starts a migration on the source exelet and returns immediately with a session ID.
  rpc InitSendVM(InitSendVMRequest) returns (InitSendVMResponse);
  // PollSendVM long-polls for migration events.
  rpc PollSendVM(PollSendVMRequest) returns (PollSendVMResponse);
  // SubmitSendVMControl sends a control signal to the migration goroutine.
  rpc SubmitSendVMControl(SubmitSendVMControlRequest) returns (SubmitSendVMControlResponse);
  // AbortSendVM cancels a migration session and releases resources.
  rpc AbortSendVM(AbortSendVMRequest) returns (AbortSendVMResponse);

  // InitReceiveVM creates a migration session on the target exelet.
  rpc InitReceiveVM(InitReceiveVMRequest) returns (InitReceiveVMResponse);
  // GetReceiveVMResumeToken returns the ZFS resume token for a broken sideband.
  rpc GetReceiveVMResumeToken(GetReceiveVMResumeTokenRequest) returns (GetReceiveVMResumeTokenResponse);
  // AdvanceReceiveVMPhase signals that a sideband phase completed.
  rpc AdvanceReceiveVMPhase(AdvanceReceiveVMPhaseRequest) returns (AdvanceReceiveVMPhaseResponse);
  // UploadReceiveVMSnapshot sends CH snapshot file chunks.
  rpc UploadReceiveVMSnapshot(UploadReceiveVMSnapshotRequest) returns (UploadReceiveVMSnapshotResponse);
  // CompleteReceiveVM sends the checksum and triggers instance finalization.
  rpc CompleteReceiveVM(CompleteReceiveVMRequest) returns (CompleteReceiveVMResponse);
  // AbortReceiveVM cancels a receive session and triggers rollback.
  rpc AbortReceiveVM(AbortReceiveVMRequest) returns (AbortReceiveVMResponse);

  // GrowDisk grows the disk of a running VM
  rpc GrowDisk(GrowDiskRequest) returns (GrowDiskResponse);
  // ResizeVM resizes the memory and/or CPU allocation of a VM (requires restart)
  rpc ResizeVM(ResizeVMRequest) returns (ResizeVMResponse);
  // CloneInstance clones an existing VM using ZFS copy-on-write snapshots
  rpc CloneInstance(CloneInstanceRequest) returns (stream CloneInstanceResponse);
  // MigrateStorageTier migrates a VM's storage between local ZFS pools (async)
  rpc MigrateStorageTier(MigrateStorageTierRequest) returns (MigrateStorageTierResponse);
  // GetTierMigrationStatus returns in-progress tier migration operations
  rpc GetTierMigrationStatus(GetTierMigrationStatusRequest) returns (GetTierMigrationStatusResponse);
  // ListStorageTiers returns all configured storage tiers and their capacity
  rpc ListStorageTiers(ListStorageTiersRequest) returns (ListStorageTiersResponse);
  // ClearTierMigrations removes completed and failed tier migration operations
  rpc ClearTierMigrations(ClearTierMigrationsRequest) returns (ClearTierMigrationsResponse);
  // CancelTierMigration cancels a pending or in-progress tier migration
  rpc CancelTierMigration(CancelTierMigrationRequest) returns (CancelTierMigrationResponse);
  // LiveMigrateLocal performs an in-place migration of a VM to a new
  // cloud-hypervisor process on the same host via snapshot/restore.
  // Used for CH binary upgrades. Downtime scales with VM RAM size.
  rpc LiveMigrateLocal(LiveMigrateLocalRequest) returns (LiveMigrateLocalResponse);
}

message CreateInstanceRequest {
  string id = 1;
  string name = 2;
  string image = 3;
  uint64 cpus = 4;
  uint64 memory = 5;
  uint64 disk = 6;
  repeated string env = 7;
  repeated string ssh_keys = 8;
  Placement placement = 9;
  string kernel_image = 10;
  repeated string boot_args = 11;
  repeated Volume volumes = 12;
  repeated Config configs = 13;
  string group_id = 14;  // Group ID for per-account cgroup grouping
}

message Config {
  string destination = 1;
  uint64 mode = 2;
  oneof source {
    FileConfig file = 3;
  }
}

message FileConfig {
  bytes data = 1;
}

message Volume {
  string type = 1;
  string source = 2;
  string mountpoint = 3;
}

message ExposedPort {
  string protocol = 1;
  uint32 port = 2;
}

message Placement {
  string region = 1;
  string zone = 2;
}

message Log {
  enum Type {
    STDOUT = 0;
    STDERR = 1;
  }
  Type type = 1;
  string message = 2;
}

message CreateInstanceStatus {
  string id = 1;
  enum State {
    UNKNOWN = 0;
    INIT = 1;
    NETWORK = 2;
    PULLING = 3;
    CONFIG = 4;
    BOOT = 5;
    COMPLETE = 6;
  }
  State state = 2;
  string message = 3;
}

message CreateInstanceResponse {
  oneof Type {
    CreateInstanceStatus status = 1;
    Instance instance = 2;
  }
}

message ListInstancesRequest {}

message ListInstancesResponse {
  Instance instance = 1;
}

message CountInstancesRequest {}

message CountInstancesResponse {
  int32 count = 1;
}

message GetInstanceRequest {
  string id = 1;
}

message GetInstanceResponse {
  Instance instance = 1;
}

message GetInstanceLogsRequest {
  string id = 1;
}

message GetInstanceLogsResponse {
  Log log = 1;
}

message StartInstanceRequest {
  string id = 1;
}

message StartInstanceResponse {}

message StopInstanceRequest {
  string id = 1;
}

message StopInstanceResponse {}

message DeleteInstanceRequest {
  string id = 1;
  bool force = 2;
}

message DeleteInstanceResponse {}

message SetInstanceGroupRequest {
  string id = 1;
  string group_id = 2;
}

message SetInstanceGroupResponse {}

message RenameInstanceRequest {
  string id = 1;
  string name = 2;
}

message RenameInstanceResponse {}

message UpdateInstanceRequest {
  string id = 1;
  // fields 2-3 reserved (previously kernel_image, init_image strings)
  bool kernel = 4;
}

message UpdateInstanceResponse {}

message GetSystemInfoRequest {}

message GetSystemInfoResponse {
  string version = 1;
  string arch = 2;
  MigrationCapabilities migration_capabilities = 3;
  // CPU feature flags from /proc/cpuinfo (e.g., "sse4_2", "avx2", "avx512f").
  // Used to pre-check CPU compatibility before live migration.
  repeated string cpu_flags = 4;
}

message MigrationCapabilities {
  bool unary_send_vm = 1;
  bool unary_receive_vm = 2;
}

message Instance {
  string id = 1;
  string name = 2;
  string image = 3;
  VMConfig vm_config = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
  VMState state = 7;
  string node = 8;
  Placement placement = 9;
  int32 ssh_port = 10;
  repeated ExposedPort exposed_ports = 11;
  string group_id = 12;  // Group ID for per-account cgroup grouping
  string login_user = 13; // Login user from image label (exe.dev/login-user)
}

message VMConfig {
  string id = 1;
  string name = 2;
  uint64 cpus = 3;
  uint64 memory = 4;
  uint64 disk = 5;
  string kernel_path = 6;
  string initramfs_path = 7;
  string root_disk_path = 8;
  repeated string args = 9;
  repeated DirectoryShare shares = 10;
  NetworkInterface network_interface = 11;
}

enum VMState {
  UNKNOWN = 0;
  CREATED = 1;
  STARTING = 2;
  RUNNING = 3;
  PAUSED = 4;
  STOPPING = 5;
  STOPPED = 6;
  DELETED = 7;
  UPDATING = 8;
  ERROR = 9;
  CREATING = 10;
}

message DirectoryShare {
  string tag = 1;
  string host_path = 2;
  bool read_only = 3;
}

message IPAddress {
  string ip_v4 = 1;
  string gateway_v4 = 2;
}

message NetworkInterface {
  string name = 1;
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_TAP = 1;
  }
  Type type = 2;
  string device_name = 3;
  string mac_address = 4;
  IPAddress ip = 5;
  repeated string nameservers = 6;
  string ntp_server = 7;
  string network = 8;
  string router = 9;
}

message Server {
  string name = 1;
  string address = 2;
  int64 updated_at = 3;
  string runtime_address = 4;
  string network_manager_address = 5;
  ServerLocality locality = 6;
  string version = 7;
  enum ServerState {
    UNKNOWN = 0;
    ERROR = 1;
    INIT = 2;
    STARTING = 3;
    READY = 4;
    MAINTENANCE = 5;
    PAUSED = 6;
    STOPPING = 7;
    STOPPED = 8;
  }
  ServerState state = 8;
}

message ServerLocality {
  string region = 1;
  string zone = 2;
}

message SendVMStartRequest {
  string instance_id = 1;
  // If true, send full stream of instance only (target already has base image).
  // If false, send base image snapshot first, then incremental instance stream.
  // Note: "true" results in a larger transfer but works reliably regardless of
  // target's snapshot state. "false" is more efficient but requires the target
  // to not have the base image (zfs recv will fail if it exists with snapshots).
  bool target_has_base_image = 2;
  // Enable two-phase migration: snapshot while VM is running (phase 1),
  // then stop VM and send only the incremental diff (phase 2).
  bool two_phase = 3;
  // Enable live migration: pause + CH snapshot/restore instead of stop + cold boot.
  // The VM's process state is preserved across the migration.
  bool live = 4;
  // When true, the source may send SendVMStatus messages before metadata.
  // Clients that don't set this will only receive metadata as the first response.
  bool accept_status = 5;
  // Direct migration: source connects to target directly for data transfer.
  // When set, source dials target_address and initializes a receive session there.
  string target_address = 6;
  string target_group_id = 7;
}

message SendVMControl {
  enum Action {
    PROCEED_WITH_PAUSE = 0;
  }
  Action action = 1;
}

message SendVMStatus {
  string message = 1; // Human-readable status message (e.g., "waiting for storage replication to complete")
}

message SendVMTargetReady {
  bool has_base_image = 1;
  NetworkInterface target_network = 2;
  bool skip_ip_reconfig = 3;          // Target handles IP isolation (e.g. netns); orchestrator should skip SSH IP reconfiguration
}

message SendVMProgress {
  int64 bytes_sent = 1;
}

message SendVMResult {
  Instance instance = 1;
  string error = 2;
  bool cold_booted = 3;
}

message SendVMAwaitControl {
  enum Reason {
    NEED_IP_RECONFIG = 0;
    NEED_GUEST_SYNC = 1;
  }
  Reason reason = 1;
  NetworkInterface source_network = 2;
}

message SendVMMetadata {
  Instance instance = 1;             // Full instance config
  string base_image_id = 2;          // e.g., "sha256:abc123..."
  uint64 total_size_estimate = 3;    // Estimated bytes for progress display
  bool encrypted = 4;                // Whether disk is encrypted
  bytes encryption_key = 5;          // Encryption key (if encrypted). Nil in direct mode; key sent directly to target via InitReceiveVMRequest.
}

message InitSendVMRequest {
  string instance_id = 1;
  bool target_has_base_image = 2;
  bool two_phase = 3;
  bool live = 4;
  string target_address = 5;
  string target_group_id = 6;
  string client_request_id = 7;
}

message InitSendVMResponse {
  string session_id = 1;
}

message PollSendVMRequest {
  string session_id = 1;
  uint64 after_seq = 2;
  uint32 max_wait_ms = 3;
}

message PollSendVMResponse {
  repeated SendVMEvent events = 1;
  bool completed = 2;
}

message SendVMEvent {
  uint64 seq = 1;
  oneof type {
    SendVMMetadata metadata = 2;
    SendVMTargetReady target_ready = 3;
    SendVMStatus status = 4;
    SendVMProgress progress = 5;
    SendVMAwaitControl await_control = 6;
    SendVMResult result = 7;
  }
}

message SubmitSendVMControlRequest {
  string session_id = 1;
  uint64 await_seq = 2;
  SendVMControl control = 3;
}

message SubmitSendVMControlResponse {}

message AbortSendVMRequest {
  string session_id = 1;
  string reason = 2;
}

message AbortSendVMResponse {}

message InitReceiveVMRequest {
  string instance_id = 1;
  Instance source_instance = 2;
  string base_image_id = 3;
  bool encrypted = 4;
  bytes encryption_key = 5;
  string group_id = 6;
  bool live = 7;
  bool discard_orphan = 8;
  string client_request_id = 9;
}

message InitReceiveVMResponse {
  string session_id = 1;
  bool has_base_image = 2;
  NetworkInterface target_network = 3;
  string sideband_addr = 4;
  bool resumable = 5;
  string resume_token = 6;
  bool skip_ip_reconfig = 7;
}

message GetReceiveVMResumeTokenRequest {
  string session_id = 1;
}

message GetReceiveVMResumeTokenResponse {
  string token = 1;
  string sideband_addr = 2;
}

message AdvanceReceiveVMPhaseRequest {
  string session_id = 1;
  bool last = 2;
}

message AdvanceReceiveVMPhaseResponse {
  string sideband_addr = 1;
}

message UploadReceiveVMSnapshotRequest {
  string session_id = 1;
  string filename = 2;
  bytes data = 3;
  bool compressed = 4;
  bool is_last_chunk = 5;
}

message UploadReceiveVMSnapshotResponse {}

message CompleteReceiveVMRequest {
  string session_id = 1;
  string checksum = 2;
}

message CompleteReceiveVMResponse {
  Instance instance = 1;
  string error = 2;
  bool cold_booted = 3;
}

message AbortReceiveVMRequest {
  string session_id = 1;
  string reason = 2;
}

message AbortReceiveVMResponse {}

message GrowDiskRequest {
  string id = 1;                    // Instance ID
  uint64 additional_bytes = 2;      // Additional bytes to add to the disk
}

message GrowDiskResponse {
  uint64 old_size = 1;              // Previous disk size in bytes
  uint64 new_size = 2;              // New disk size in bytes
}

// CloneInstance messages
message CloneInstanceRequest {
  string source_instance_id = 1;    // ID of the source instance to clone
  string new_instance_id = 2;       // ID for the new cloned instance
  string new_name = 3;              // Name for the new cloned instance
  string group_id = 4;              // Group ID for per-account cgroup grouping
  repeated string ssh_keys = 5;     // SSH keys for the new instance
  repeated Config configs = 6;      // Config files to write to the new instance
  // Resource overrides - if set, use these values instead of source instance values
  optional uint64 memory = 7;       // Memory in bytes (0 or unset = use source)
  optional uint64 disk = 8;         // Disk size in bytes (0 or unset = use source)
  optional uint64 cpus = 9;         // Number of CPUs (0 or unset = use source)
}

message CloneInstanceStatus {
  string id = 1;
  enum State {
    UNKNOWN = 0;
    INIT = 1;
    SNAPSHOT = 2;
    CLONE = 3;
    NETWORK = 4;
    CONFIG = 5;
    BOOT = 6;
    COMPLETE = 7;
  }
  State state = 2;
  string message = 3;
}

message CloneInstanceResponse {
  oneof Type {
    CloneInstanceStatus status = 1;
    Instance instance = 2;
  }
}

message ResizeVMRequest {
  string id = 1;                    // Instance ID
  optional uint64 memory = 2;       // New memory size in bytes (if set)
  optional uint64 cpus = 3;         // New CPU count (if set)
}

message ResizeVMResponse {
  uint64 old_memory = 1;            // Previous memory size in bytes
  uint64 new_memory = 2;            // New memory size in bytes
  uint64 old_cpus = 3;              // Previous CPU count
  uint64 new_cpus = 4;              // New CPU count
}

// Storage tier migration messages
message MigrateStorageTierRequest {
  string instance_id = 1;           // Instance to migrate
  string target_pool = 2;           // Target storage pool name
  bool live = 3;                    // Live migration (near-zero downtime for running VMs)
}

message MigrateStorageTierResponse {
  string operation_id = 1;          // Unique ID for tracking the async operation
  string instance_id = 2;
  string source_pool = 3;
  string target_pool = 4;
}

message GetTierMigrationStatusRequest {}

message TierMigrationOperation {
  string operation_id = 1;
  string instance_id = 2;
  string source_pool = 3;
  string target_pool = 4;
  string state = 5;                 // "pending", "migrating", "completed", "failed"
  float progress = 6;               // 0.0 to 1.0
  string error = 7;                 // Empty if no error
  int64 started_at = 8;             // Unix timestamp
  int64 completed_at = 9;           // Unix timestamp (0 if not completed)
}

message GetTierMigrationStatusResponse {
  repeated TierMigrationOperation operations = 1;
}

// Storage tiers listing
message ListStorageTiersRequest {}

message StorageTier {
  string name = 1;                  // Pool name (e.g., "tank", "nvme")
  bool primary = 2;                 // True if this is the primary pool
  uint64 size_bytes = 3;            // Total pool size in bytes
  uint64 used_bytes = 4;            // Used bytes
  uint64 available_bytes = 5;       // Available bytes
  uint32 instance_count = 6;        // Number of instances on this pool
  map<string, string> metadata = 7; // Operator-defined metadata (e.g., type=nvme, tier=hot)
}

message ListStorageTiersResponse {
  repeated StorageTier tiers = 1;
}

message ClearTierMigrationsRequest {}

message ClearTierMigrationsResponse {
  uint32 cleared = 1;              // Number of operations cleared
}

message CancelTierMigrationRequest {
  string operation_id = 1;         // Operation ID to cancel
}

message CancelTierMigrationResponse {
  string operation_id = 1;
  string state = 2;                // State after cancellation attempt ("cancelled", "completed", "failed")
}

message LiveMigrateLocalRequest {
  string instance_id = 1;
}

message LiveMigrateLocalResponse {
  enum Outcome {
    UNKNOWN = 0;
    LIVE_MIGRATED = 1;               // VM was live-migrated to a new CH process
    COLD_RESTARTED = 2;              // Live migrate failed; VM was cold-restarted
  }
  Outcome outcome = 1;
  int64 downtime_ms = 2;             // Time VM was unavailable (paused or stopped)
  string migration_error = 3;        // Set when outcome == COLD_RESTARTED
}
