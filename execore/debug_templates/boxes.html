<!doctype html>
<html><head><title>VMs</title>
{{template "base-head"}}
{{template "base-datatables"}}
<style>
h1 { margin-bottom: 10px; }
#boxesTable { width: 100%; }
#boxesTable td, #boxesTable th { font-size: 13px; }
#boxesTable thead tr.filters th { padding: 4px; }
#boxesTable thead tr.filters input { width: 100%; box-sizing: border-box; font-size: 11px; padding: 4px; }
.migrate-btn { display: inline-block; background: #007bff; color: white; padding: 4px 8px; border-radius: 3px; font-size: 12px; margin-right: 4px; text-decoration: none; }
.migrate-btn:hover { background: #0056b3; text-decoration: none; }
.stop-btn { background: #fd7e14; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 12px; margin-right: 4px; }
.stop-btn:hover { background: #e8590c; }
.start-btn { background: #28a745; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 12px; margin-right: 4px; }
.start-btn:hover { background: #218838; }
</style>
</head><body>
<h1>VMs</h1>
<div><a href="/debug">/debug</a> &gt; <a href="/debug/vms">VMs</a> | <a href="/debug/vms?format=json&source={{.Source}}">json</a></div>
<p>Source: {{.SourceNav}}</p>

<table id="boxesTable" class="display stripe hover">
<thead>
<tr>
<th>Name</th>
<th>Exelet</th>
<th>Region</th>
<th>Status</th>
<th>Owner</th>
<th>Support</th>
<th>Actions</th>
</tr>
<tr class="filters">
<th>Name</th>
<th>Exelet</th>
<th>Region</th>
<th>Status</th>
<th>Owner</th>
<th>Support</th>
<th></th>
</tr>
</thead>
</table>

<dialog id="deleteDialog">
<form method="post" action="/debug/vms/delete">
<p>To delete this box, type its name to confirm:</p>
<p><strong id="boxNameDisplay"></strong></p>
<input type="hidden" name="box_name" id="boxNameInput">
<input type="text" name="confirm_name" id="confirmInput" autocomplete="off" placeholder="Type box name to confirm">
<p>
<button type="submit" class="confirm-btn-danger" id="confirmBtn" disabled>Delete</button>
<button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
</p>
</form>
</dialog>

<script>
$(document).ready(function() {
    // Add column filter inputs to header filter row (except Actions column)
    $('#boxesTable thead tr.filters th').each(function(idx) {
        var title = $(this).text();
        if (title) {
            $(this).html('<input type="text" placeholder="' + title + '">');
        }
    });

    var table = $('#boxesTable').DataTable({
        ajax: {
            url: '/debug/vms?format=json&source={{.Source}}',
            dataSrc: ''
        },
        pageLength: 100,
        lengthMenu: [[25, 50, 100, 250, -1], [25, 50, 100, 250, "All"]],
        order: [[0, 'asc']],
        orderCellsTop: true,
        columns: [
            { data: 'name', render: function(d) {
                return '<a href="/debug/vms/' + d + '">' + d + '</a>';
            }},
            { data: 'host' },
            { data: 'region' },
            { data: 'status' },
            { data: null, defaultContent: '', render: function(d) {
                if (!d.owner_email) return '';
                if (d.owner_user_id) {
                    return '<a href="/debug/user?userId=' + encodeURIComponent(d.owner_user_id) + '">' + d.owner_email + '</a>';
                }
                return d.owner_email;
            }},
            { data: 'support_access_allowed', render: function(d) {
                return d ? 'Yes' : 'No';
            }},
            { data: null, orderable: false, render: function(d) {
                var actions = '<a href="/debug/vms/migrate?box_name=' + encodeURIComponent(d.name) + '" class="migrate-btn">Migrate</a> ';
                if (d.status === 'running') {
                    actions += '<button class="stop-btn" data-box="' + d.name + '">Stop</button> ';
                } else if (d.status === 'stopped') {
                    actions += '<button class="start-btn" data-box="' + d.name + '">Start</button> ';
                }
                actions += '<button class="delete-btn" data-box="' + d.name + '">Delete</button>';
                return actions;
            }}
        ],
        initComplete: function() {
            this.api().columns().every(function(idx) {
                var column = this;
                $('input', $('#boxesTable thead tr.filters th').eq(idx)).on('keyup change clear', function() {
                    if (column.search() !== this.value) {
                        column.search(this.value).draw();
                    }
                });
            });
        }
    });
});

// Stop/Start handlers (no confirmation needed - these are reversible)
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('stop-btn') || e.target.classList.contains('start-btn')) {
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = e.target.classList.contains('stop-btn') ? '/debug/vms/stop' : '/debug/vms/start';
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'box_name';
        input.value = e.target.dataset.box;
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
    }
});

// Delete dialog
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('delete-btn')) {
        var boxName = e.target.dataset.box;
        document.getElementById('boxNameDisplay').textContent = boxName;
        document.getElementById('boxNameInput').value = boxName;
        document.getElementById('confirmInput').value = '';
        document.getElementById('confirmBtn').disabled = true;
        document.getElementById('deleteDialog').showModal();
    }
});
document.getElementById('cancelBtn').addEventListener('click', function() {
    document.getElementById('deleteDialog').close();
});
document.getElementById('confirmInput').addEventListener('input', function() {
    var expected = document.getElementById('boxNameInput').value;
    document.getElementById('confirmBtn').disabled = (this.value !== expected);
});

</script>
</body></html>
