<!doctype html>
<html><head><title>Invite Tree</title></head><body>
<p><a href="/debug">&larr; /debug</a></p>
{{define "node"}}
<li>{{.Email}}{{if .TotalCount}} ({{.DirectCount}} - {{.TotalCount}}){{end}}
{{- if .Children}}
<ul>
{{- range .Children}}
{{template "node" .}}
{{- end}}
</ul>
{{- end}}
</li>
{{end}}
<ul>
{{range .}}
{{template "node" .}}
{{end}}
</ul>
</body></html>
