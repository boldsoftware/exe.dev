<!doctype html>
<html><head><title>Invite Tree</title>
{{template "base-head"}}
</head><body>
<p><a href="/debug">/debug</a> &gt; <a href="/debug/invite-tree">invite-tree</a></p>
{{define "node"}}
<li>{{.Email}}{{if .TotalCount}} ({{.DirectCount}} - {{.TotalCount}}){{end}}
{{- if .Children}}
<ul>
{{- range .Children}}
{{template "node" .}}
{{- end}}
</ul>
{{- end}}
</li>
{{end}}
<ul>
{{range .}}
{{template "node" .}}
{{end}}
</ul>
</body></html>
