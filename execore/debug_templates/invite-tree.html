<!doctype html>
<html><head><title>Invite Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    overflow: hidden;
}
#controls {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 100;
    background: #161b22;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #30363d;
}
#controls h1 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #58a6ff;
}
#controls a {
    color: #58a6ff;
    text-decoration: none;
}
#controls a:hover {
    text-decoration: underline;
}
#stats {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid #30363d;
    font-size: 12px;
}
#stats div {
    margin: 4px 0;
}
#stats span {
    color: #58a6ff;
    font-weight: bold;
}
#tree-container {
    width: 100vw;
    height: 100vh;
}
.node {
    cursor: pointer;
}
.node circle {
    stroke-width: 2px;
}
.node text {
    font-size: 12px;
    fill: #c9d1d9;
}
.node a {
    fill: #c9d1d9;
    text-decoration: none;
}
.node a:hover {
    fill: #58a6ff;
    text-decoration: underline;
}
.link {
    fill: none;
    stroke: #238636;
    stroke-width: 2px;
}
.node.root circle {
    fill: #6e7681;
    stroke: #8b949e;
}
.node.user circle {
    fill: #1f6feb;
    stroke: #58a6ff;
}
.node.collapsed circle {
    fill: #9e6a03;
    stroke: #d29922;
}
.tooltip {
    position: absolute;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 350px;
}
.tooltip.visible {
    opacity: 1;
}
.tooltip strong {
    color: #58a6ff;
}
.legend {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: #161b22;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #30363d;
    font-size: 12px;
}
.legend-item {
    display: flex;
    align-items: center;
    margin: 5px 0;
}
.legend-circle {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
}
.legend-circle.user {
    background: #1f6feb;
    border: 2px solid #58a6ff;
}
.legend-circle.collapsed {
    background: #9e6a03;
    border: 2px solid #d29922;
}
.child-count {
    font-size: 10px;
    fill: #fff;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
}
</style>
</head><body>
<div id="controls">
    <h1>Invite Tree</h1>
    <p><a href="/debug">&larr; /debug</a> | <a href="/debug/all-invite-codes">all codes</a> | <a href="/debug/invite-tree?format=json">json</a></p>
    <div id="stats">
        <div>Users: <span>{{.NodeCount}}</span></div>
        <div>Invite links: <span>{{.LinkCount}}</span></div>
    </div>
</div>
<div class="legend">
    <div class="legend-item"><div class="legend-circle user"></div> User (click to collapse)</div>
    <div class="legend-item"><div class="legend-circle collapsed"></div> Collapsed (has children)</div>
</div>
<div id="tree-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
var treeData = {{.TreeDataJSON}};

// Convert flat data with id/parent to hierarchical structure
function buildHierarchy(nodes) {
    const nodeMap = new Map();
    nodes.forEach(n => {
        nodeMap.set(n.id, { 
            name: n.email, 
            userId: n.id,
            children: [] 
        });
    });
    
    let root = null;
    nodes.forEach(n => {
        const node = nodeMap.get(n.id);
        if (n.parent === null || n.parent === undefined) {
            root = node;
        } else {
            const parent = nodeMap.get(n.parent);
            if (parent) {
                parent.children.push(node);
            }
        }
    });
    
    // Clean up empty children arrays
    function cleanChildren(node) {
        if (node.children.length === 0) {
            node.children = null;
        } else {
            node.children.forEach(cleanChildren);
        }
        return node;
    }
    
    return root ? cleanChildren(root) : { name: 'exe.dev', userId: 'system', children: null };
}

function renderTree(hierarchyData) {
    d3.select('#tree-container').selectAll('*').remove();
    
    const width = window.innerWidth;
    const height = window.innerHeight;
    
    const svg = d3.select('#tree-container')
        .append('svg')
        .attr('width', width)
        .attr('height', height);
    
    const g = svg.append('g');
    
    const zoom = d3.zoom()
        .scaleExtent([0.1, 4])
        .on('zoom', (event) => g.attr('transform', event.transform));
    
    svg.call(zoom);
    
    const root = d3.hierarchy(hierarchyData);
    root.x0 = height / 2;
    root.y0 = 0;
    
    const treeLayout = d3.tree().nodeSize([40, 250]);
    
    const tooltip = d3.select('#tooltip');
    
    function update(source) {
        const duration = 300;
        
        treeLayout(root);
        
        const nodes = root.descendants();
        const links = root.links();
        
        nodes.forEach(d => { d.y = d.depth * 250; });
        
        const node = g.selectAll('.node')
            .data(nodes, d => d.data.userId || d.data.name);
        
        const nodeEnter = node.enter()
            .append('g')
            .attr('class', d => {
                let cls = 'node';
                if (d.depth === 0) cls += ' root';
                else cls += ' user';
                if (d._children) cls += ' collapsed';
                return cls;
            })
            .attr('transform', d => `translate(${source.y0 || 0},${source.x0 || 0})`)
            .on('click', (event, d) => {
                // Don't collapse if clicking on link
                if (event.target.tagName === 'a' || event.target.closest('a')) return;
                if (d.children) {
                    d._children = d.children;
                    d.children = null;
                } else if (d._children) {
                    d.children = d._children;
                    d._children = null;
                }
                update(d);
            })
            .on('mouseover', (event, d) => {
                const count = countDescendants(d);
                let html = `<strong>${d.data.name}</strong>`;
                if (d.data.userId && d.data.userId !== 'system') {
                    html += `<br>ID: ${d.data.userId}`;
                }
                if (count > 0) {
                    html += `<br>Invited ${count} user${count > 1 ? 's' : ''} (direct + indirect)`;
                }
                tooltip.html(html)
                    .style('left', (event.pageX + 10) + 'px')
                    .style('top', (event.pageY - 10) + 'px')
                    .classed('visible', true);
            })
            .on('mouseout', () => {
                tooltip.classed('visible', false);
            });
        
        nodeEnter.append('circle')
            .attr('r', d => d.depth === 0 ? 12 : 10);
        
        nodeEnter.append('text')
            .attr('class', 'child-count')
            .attr('dy', 0);
        
        // Add linked text for users with IDs
        nodeEnter.each(function(d) {
            const g = d3.select(this);
            const userId = d.data.userId;
            const email = d.data.name;
            const displayText = email.length > 30 ? email.substring(0, 27) + '...' : email;
            
            if (userId && userId !== 'system') {
                g.append('a')
                    .attr('href', '/debug/users?search=' + encodeURIComponent(email))
                    .append('text')
                    .attr('class', 'label')
                    .attr('dy', 4)
                    .attr('x', -15)
                    .attr('text-anchor', 'end')
                    .text(displayText);
            } else {
                g.append('text')
                    .attr('class', 'label')
                    .attr('dy', 4)
                    .attr('x', -15)
                    .attr('text-anchor', 'end')
                    .text(displayText);
            }
        });
        
        const nodeUpdate = nodeEnter.merge(node);
        
        nodeUpdate.transition()
            .duration(duration)
            .attr('transform', d => `translate(${d.y},${d.x})`)
            .attr('class', d => {
                let cls = 'node';
                if (d.depth === 0) cls += ' root';
                else cls += ' user';
                if (d._children) cls += ' collapsed';
                return cls;
            });
        
        nodeUpdate.select('text.child-count')
            .text(d => {
                if (d._children) {
                    return countAllChildren(d);
                }
                return '';
            });
        
        const nodeExit = node.exit()
            .transition()
            .duration(duration)
            .attr('transform', d => `translate(${source.y},${source.x})`)
            .remove();
        
        const link = g.selectAll('.link')
            .data(links, d => d.target.data.userId || d.target.data.name);
        
        const linkEnter = link.enter()
            .insert('path', 'g')
            .attr('class', 'link')
            .attr('d', d => {
                const o = {x: source.x0 || 0, y: source.y0 || 0};
                return diagonal(o, o);
            });
        
        linkEnter.merge(link)
            .transition()
            .duration(duration)
            .attr('d', d => diagonal(d.source, d.target));
        
        link.exit()
            .transition()
            .duration(duration)
            .attr('d', d => {
                const o = {x: source.x, y: source.y};
                return diagonal(o, o);
            })
            .remove();
        
        nodes.forEach(d => {
            d.x0 = d.x;
            d.y0 = d.y;
        });
    }
    
    function diagonal(s, d) {
        return `M ${s.y} ${s.x}
                C ${(s.y + d.y) / 2} ${s.x},
                  ${(s.y + d.y) / 2} ${d.x},
                  ${d.y} ${d.x}`;
    }
    
    function countAllChildren(d) {
        if (!d._children) return 0;
        let count = d._children.length;
        d._children.forEach(c => {
            count += countAllChildren(c) + (c.children ? countChildrenRecursive(c.children) : 0);
        });
        return count;
    }
    
    function countChildrenRecursive(children) {
        let count = children.length;
        children.forEach(c => {
            if (c.children) count += countChildrenRecursive(c.children);
            if (c._children) count += countAllChildren(c);
        });
        return count;
    }
    
    function countDescendants(d) {
        let count = 0;
        const children = d.children || d._children;
        if (children) {
            count = children.length;
            children.forEach(c => {
                count += countDescendants(c);
            });
        }
        return count;
    }
    
    update(root);
    
    const initialTransform = d3.zoomIdentity.translate(150, height / 2);
    svg.call(zoom.transform, initialTransform);
}

const hierarchy = buildHierarchy(treeData);
renderTree(hierarchy);
</script>
</body></html>
