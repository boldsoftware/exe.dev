<!doctype html>
<html><head><title>Bulk Invite Codes</title>
{{template "base-head"}}
<style>
.create-btn { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 14px; }
.create-btn:hover { background: #218838; }
select, input[type="number"] { padding: 8px; margin: 5px; }
input[type="text"] { padding: 8px; }
.result-box { position: relative; margin: 20px 0; }
.result-box pre {
    background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 6px;
    font-size: 13px; line-height: 1.6; overflow-x: auto; margin: 0;
    max-height: 600px; overflow-y: auto;
}
.copy-btn {
    position: absolute; top: 8px; right: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; padding: 0;
    background: #444; color: #fff; border: none;
    border-radius: 4px; cursor: pointer;
    transition: all 0.15s;
}
.copy-btn:hover { background: #666; }
.copy-btn.copied { color: #22c55e; }
.summary { color: #555; margin: 10px 0; }
</style>
</head><body>
<h1>Bulk Invite Codes</h1>
<p><a href="/debug/invite">&larr; invite codes</a></p>

{{if .Codes}}
<div class="section">
<h2>Generated Codes</h2>
<p class="summary">{{len .Codes}} {{.PlanType}} codes &mdash; {{.AssignedFor}}</p>
<div class="result-box">
<button class="copy-btn" onclick="copyToClipboard(this)" title="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
<pre id="codes">{{range .Codes}}{{.}}
{{end}}</pre>
</div>
</div>
<script>
var checkSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="20 6 9 17 4 12"></polyline></svg>';
function copyToClipboard(btn) {
    var text = document.getElementById('codes').textContent.trim();
    var orig = btn.innerHTML;
    navigator.clipboard.writeText(text).then(function() {
        btn.innerHTML = checkSVG;
        btn.classList.add('copied');
        setTimeout(function() { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1500);
    });
}
</script>
{{end}}
</body></html>
