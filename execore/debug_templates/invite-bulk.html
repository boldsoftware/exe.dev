<!doctype html>
<html><head><title>Bulk Invite Codes</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; }
.section { margin: 20px 0; }
h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; }
.create-btn { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 14px; }
.create-btn:hover { background: #218838; }
select, input[type="number"] { padding: 8px; margin: 5px; }
input[type="text"] { padding: 8px; }
a { color: #007bff; text-decoration: none; }
a:hover { text-decoration: underline; }
.result-box { position: relative; margin: 20px 0; }
.result-box pre {
    background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 6px;
    font-size: 13px; line-height: 1.6; overflow-x: auto; margin: 0;
    max-height: 600px; overflow-y: auto;
}
.copy-btn {
    position: absolute; top: 8px; right: 8px;
    background: #444; color: #fff; border: none; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
}
.copy-btn:hover { background: #666; }
.copy-btn.copied { background: #28a745; }
.summary { color: #555; margin: 10px 0; }
</style>
</head><body>
<h1>Bulk Invite Codes</h1>
<p><a href="/debug">/debug</a> | <a href="/debug/invite">invite codes</a></p>

<div class="section">
<h2>Generate Batch</h2>
<form method="post" action="/debug/invite/bulk">
<p>
<label>Plan type:
<select name="plan_type">
<option value="trial">Trial (1 month free)</option>
<option value="free">Free forever</option>
</select>
</label>
</p>
<p>
<label>Count:
<input type="number" name="count" value="100" min="1" max="1000" required>
</label>
</p>
<p>
<label>What's it for (required):
<input type="text" name="assigned_for" placeholder="e.g. HN launch Feb 2026" required size="50">
</label>
</p>
<p><button type="submit" class="create-btn">Generate</button></p>
</form>
</div>

{{if .Codes}}
<div class="section">
<h2>Generated Codes</h2>
<p class="summary">{{len .Codes}} {{.PlanType}} codes &mdash; {{.AssignedFor}}</p>
<div class="result-box">
<button class="copy-btn" onclick="copyToClipboard(this)">Copy</button>
<pre id="codes">{{range .Codes}}{{.}}
{{end}}</pre>
</div>
</div>
<script>
function copyToClipboard(btn) {
    var text = document.getElementById('codes').textContent.trim();
    navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
}
</script>
{{end}}
</body></html>
