<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Terminal</title>
    <link rel="stylesheet" href="/static/xterm.css">
    <link rel="stylesheet" href="/static/terminal-common.css">
</head>
<body>
    <div class="terminal-frame">
        <div class="terminal-header">
            <div class="terminal-title" id="terminal-title">Terminal</div>
            <div class="terminal-info">
                <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
                    <span class="theme-icon">◐</span>
                </button>
            </div>
        </div>
        <div id="control-bar" class="control-bar">
            <button class="control-btn modifier" id="ctrl-mod" title="Ctrl modifier">Ctrl</button>
            <button class="control-btn modifier" id="alt-mod" title="Alt modifier">Alt</button>
            <div class="control-separator"></div>
            <button class="control-btn" data-key="Escape" title="Escape">Esc</button>
            <button class="control-btn" data-key="Tab" title="Tab">Tab</button>
            <div class="control-separator"></div>
            <button class="control-btn" data-ctrl="c" title="Ctrl-C (interrupt)">^C</button>
            <button class="control-btn" data-ctrl="d" title="Ctrl-D (EOF)">^D</button>
            <button class="control-btn" data-ctrl="z" title="Ctrl-Z (suspend)">^Z</button>
            <div class="control-separator"></div>
            <span class="control-group">
                <button class="control-btn small" data-key="ArrowUp" title="Up">↑</button>
                <button class="control-btn small" data-key="ArrowDown" title="Down">↓</button>
                <button class="control-btn small" data-key="ArrowLeft" title="Left">←</button>
                <button class="control-btn small" data-key="ArrowRight" title="Right">→</button>
            </span>
            <div class="control-separator"></div>
            <button class="control-btn" id="kb-toggle" title="Toggle keyboard space">⌨</button>
        </div>
        <div id="connection-status" class="connection-status">
            <div class="status-icon"></div>
            <span class="status-text">Connecting...</span>
        </div>
        <div id="terminal"></div>
    </div>

    <script src="/static/xterm.js"></script>
    <script src="/static/xterm-addon-web-links.js"></script>
    <script src="/static/terminal-common.js"></script>
    <script src="/static/terminal.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const client = new TerminalClient();
            client.init();
        });
    </script>
</body>
</html>
