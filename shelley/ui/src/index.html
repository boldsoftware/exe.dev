<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelley</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        'primary-dark': '#1d4ed8',
                        'gray-850': '#1f2937',
                        'gray-750': '#374151'
                    }
                }
            }
        }
    </script>
    <style>
        /* Default mobile-first styles - full viewport */
        #app-container {
            height: 100vh;
            width: 100%;
        }
        #root {
            height: 100vh;
            width: 100%;
        }
        .log-panel {
            display: none !important;
        }
        
        /* Desktop layout with mobile simulator and log panel */
        @media (min-width: 768px) {
            body {
                background: #f3f4f6;
                padding: 10px;
                margin: 0;
                height: 100vh;
                box-sizing: border-box;
            }
            .dark body {
                background: #111827;
            }
            
            /* Desktop layout container */
            .desktop-container {
                display: flex;
                gap: 16px;
                max-width: 1400px;
                margin: 0 auto;
                height: calc(100vh - 20px);
            }
            
            /* Mobile simulator frame */
            #root {
                width: 414px !important;
                height: 100% !important;
                border: 1px solid #d1d5db;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                background: white;
                flex-shrink: 0;
            }
            .dark #root {
                border-color: #374151;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
                background: #1f2937;
            }
            
            /* Log panel */
            .log-panel {
                display: flex !important;
                flex: 1;
                min-width: 400px;
                border: 1px solid #d1d5db;
                border-radius: 12px;
                background: white;
                color: #1f2937;
                font-family: 'Consolas', 'Monaco', 'Lucida Console', monospace;
                flex-direction: column;
                overflow: hidden;
            }
            .dark .log-panel {
                border-color: #374151;
                background: #f9fafb;
                color: #374151;
            }
            
            /* Force mobile behavior inside container */
            #root .lg\:hidden {
                display: block !important;
            }
            /* Fix drawer positioning - make it absolute within container, not fixed to viewport */
            #root .lg\:relative {
                position: absolute !important;
            }
            /* Make sure root container has relative positioning for absolute children */
            #root {
                position: relative !important;
            }
            /* Override viewport-based heights to use container height instead */
            #root .h-screen {
                height: 100% !important;
            }
            #root .h-full {
                height: 100% !important;
            }
            /* Only override drawer translation when it's supposed to be hidden */
            #root [class*="-translate-x-full"].lg\:translate-x-0:not(.translate-x-0) {
                transform: translateX(-100%) !important;
            }
        }
        
        /* Custom scrollbar styles */
        .scrollbar-thin {
            scrollbar-width: thin;
        }
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 3px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background-color: rgba(156, 163, 175, 0.8);
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div id="app-container" class="desktop-container">
        <div id="root"></div>
        <div id="log-panel" class="log-panel">
            <div id="log-content"></div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
