name: Sync Commits Pushed Directly to exe.dev

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  sync-oss-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: 2710433
          private-key: ${{ secrets.EXE_COMMIT_QUEUE_APP_PRIVATE_KEY }}
          owner: boldsoftware
          repositories: exe,exe.dev

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for the sync script
          token: ${{ steps.app-token.outputs.token }}

      - name: Run sync script
        id: sync
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url oss "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/exe.dev.git" 2>/dev/null || \
            git remote add oss "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/exe.dev.git"
          ./bin/retry.sh git fetch oss
          if ./bin/sync-commits-from-oss.sh oss/main; then
            if git tag -l | grep -q "^new-exe-commit-oss$"; then
              git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/exe.git"
              ./bin/retry.sh --retry-on 128 git push origin new-exe-commit-oss:main
              git tag -d new-exe-commit-oss || true
            fi
          else
            echo Sync script failed
            exit 1
          fi
