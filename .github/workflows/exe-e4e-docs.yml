name: exe e4e documentation sweep

on:
  workflow_dispatch:
  schedule:
    # Run weekly at 7:45 AM UTC on Mondays.
    # Keep this cron in sync with BOT_EXPECTATIONS inside scripts/slack/check_ci_bot_liveness.py.
    - cron: "45 7 * * 1"

concurrency:
  group: exe-e4e-docs
  cancel-in-progress: false

jobs:
  docs-review:
    environment: ai-testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E4E_OUTPUT_PATH: /tmp/e4e-docs-output.txt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"

      - name: Install codex CLI
        run: |
          set -euo pipefail
          CODEX_ARCH="x86_64-unknown-linux-musl"
          RELEASE_JSON=$(curl -fsSL https://api.github.com/repos/openai/codex/releases/latest)
          CODEX_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          CODEX_VERSION="${CODEX_TAG#rust-v}"
          if command -v codex >/dev/null 2>&1; then
            INSTALLED_VERSION=$(codex --version | awk '{print $2}')
            if [ "$INSTALLED_VERSION" = "$CODEX_VERSION" ]; then
              echo "codex $INSTALLED_VERSION already installed"
              exit 0
            fi
          fi
          TMP_DIR=$(mktemp -d)
          curl -fsSL "https://github.com/openai/codex/releases/download/${CODEX_TAG}/codex-${CODEX_ARCH}.tar.gz" -o "${TMP_DIR}/codex.tar.gz"
          tar -xzf "${TMP_DIR}/codex.tar.gz" -C "${TMP_DIR}"
          sudo mv "${TMP_DIR}/codex-${CODEX_ARCH}" /usr/local/bin/codex
          sudo chmod +x /usr/local/bin/codex
          rm -rf "$TMP_DIR"

      - name: Mask secrets
        env:
          CODEX: ${{ secrets.E4E_OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -n "$CODEX" ]; then
            echo "::add-mask::$CODEX"
          fi

      - name: Build e4e documentation sweep
        run: |
          set -euo pipefail
          go build -o /tmp/e4e-docs ./cmd/e4e

      - name: Run e4e documentation sweep
        id: run-e4e
        continue-on-error: true
        env:
          E4E_OPENAI_API_KEY: ${{ secrets.E4E_OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          /tmp/e4e-docs 2>&1 | tee "$E4E_OUTPUT_PATH"

      - name: Install uv
        if: always()
        uses: astral-sh/setup-uv@v3

      - name: Post failure to Slack #oops
        if: steps.run-e4e.outcome == 'failure'
        env:
          OUTPUT_PATH: ${{ env.E4E_OUTPUT_PATH }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MESSAGE_PATH: /tmp/e4e-oops.txt
          EXE_SLACK_BOT_TOKEN: ${{ secrets.EXE_SLACK_BOT_TOKEN }}
        run: |
          set -euo pipefail
          cp "$OUTPUT_PATH" "$MESSAGE_PATH"
          printf "\n<%s|CI logs>\n" "$RUN_URL" >> "$MESSAGE_PATH"
          uv run scripts/slack/post_message.py \
            --channel oops \
            --markdown \
            --message-file "$MESSAGE_PATH"

      - name: Update Slack bot ledger
        if: always()
        env:
          EXE_SLACK_BOT_TOKEN: ${{ secrets.EXE_SLACK_BOT_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ steps.run-e4e.outcome }}
        run: |
          set -euo pipefail
          uv run scripts/slack/update_bot_status.py \
            e4e-docs \
            --status "$JOB_STATUS" \
            --run-url "$RUN_URL"
