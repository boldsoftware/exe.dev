name: exe e2e ai tests

on:
  workflow_dispatch:
  schedule:
    # Run weekly at 6:45 AM UTC on Mondays
    - cron: "45 6 * * 1"

jobs:
  ai-test:
    runs-on: [self-hosted, linux, x64, libvirt]
    environment: ai-testing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "./go.mod"
          cache: true

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Start container host
        id: vm
        run: |
          set -euo pipefail
          ./ops/ci-vm-start.sh | tee ci-vm-start.log
          ENVFILE=$(tail -n1 ci-vm-start.log)
          echo "envfile=$ENVFILE" >> "$GITHUB_OUTPUT"
          # shellcheck disable=SC1090
          source "$ENVFILE"
          echo "CTR_HOST=ssh://$VM_USER@$VM_IP" >> "$GITHUB_ENV"

      - name: Download latest sketch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use gh CLI to download the latest sketch binary (gh is pre-installed in GitHub Actions)
          gh release download -p 'sketch*linux*amd64' --repo boldsoftware/sketch

          # Find and rename the downloaded binary
          SKETCH_BINARY=$(find . -name 'sketch*linux*amd64' -type f | head -1)
          if [ -z "$SKETCH_BINARY" ]; then
            echo "No sketch linux amd64 binary found after download"
            exit 1
          fi

          mv "$SKETCH_BINARY" sketch
          chmod +x sketch

          # Add to PATH
          echo "$PWD" >> $GITHUB_PATH

          # Verify the binary works
          ./sketch --version || echo "sketch binary downloaded successfully"

      - name: Setup headless-shell
        run: |
          docker run --rm --entrypoint "bash" chromedp/headless-shell -c "tar -cvf - /headless-shell/" | tar -xf-
          echo "$PWD/headless-shell" >> $GITHUB_PATH

      - name: Run e2e AI tests via e1e framework
        id: run-e2e
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_AI_AGENT_TEST: "1"
          E1E_LOG_DIR: ${{ github.workspace }}/e1e-logs
        run: |
          set -euo pipefail
          mkdir -p "$E1E_LOG_DIR"

          # Run the AI agent test via the e1e framework
          go test -v -count=1 -timeout=60m -run=TestAIAgent ./e1e/... 2>&1 | tee /tmp/e2e-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          echo "test_exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $TEST_EXIT_CODE

      - name: Generate report
        id: report
        if: always()
        env:
          REPO_URL: https://github.com/${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          cd e2e

          RESULT="UNKNOWN"
          REPORT_URL=""
          REPORT_COMMIT=""

          # Check for result file
          if [ -f "result.txt" ]; then
            RESULT=$(cat result.txt)
          fi

          # Create a commit with the report and push to a ref
          if [ -d "report" ] || [ -f "result.txt" ]; then
            TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
            REF_NAME="e2e-report-$TIMESTAMP-run-$RUN_ID"

            # Build tree entries for git mktree
            TREE_ENTRIES=""

            # Add result.txt if exists
            if [ -f "result.txt" ]; then
              BLOB_SHA=$(git hash-object -w result.txt)
              TREE_ENTRIES="${TREE_ENTRIES}100644 blob ${BLOB_SHA}\tresult.txt\n"
            fi

            # Add report directory if exists
            if [ -d "report" ]; then
              # Build subtree for report directory
              REPORT_ENTRIES=""
              for f in report/*; do
                if [ -f "$f" ]; then
                  FNAME=$(basename "$f")
                  BLOB_SHA=$(git hash-object -w "$f")
                  REPORT_ENTRIES="${REPORT_ENTRIES}100644 blob ${BLOB_SHA}\t${FNAME}\n"
                fi
              done
              if [ -n "$REPORT_ENTRIES" ]; then
                REPORT_TREE=$(printf "$REPORT_ENTRIES" | git mktree)
                TREE_ENTRIES="${TREE_ENTRIES}040000 tree ${REPORT_TREE}\treport\n"
              fi
            fi

            # Create tree and commit
            TREE_SHA=$(printf "$TREE_ENTRIES" | git mktree)
            COMMIT_MSG=$(printf "E2E AI test report - %s\n\nWorkflow run: %s\nResult: %s" "$TIMESTAMP" "$RUN_URL" "$RESULT")
            REPORT_COMMIT=$(git commit-tree "$TREE_SHA" -m "$COMMIT_MSG")

            # Push to refs/e2e-reports/
            git push origin "$REPORT_COMMIT:refs/e2e-reports/$REF_NAME"

            REPORT_URL="$REPO_URL/tree/$REPORT_COMMIT/report/report.md"
            echo "📋 Report pushed to refs/e2e-reports/$REF_NAME"
            echo "📋 Report URL: $REPORT_URL"
          fi

          # Export for other steps
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "report_url=$REPORT_URL" >> "$GITHUB_OUTPUT"
          echo "report_commit=$REPORT_COMMIT" >> "$GITHUB_OUTPUT"

          # Write to job summary
          echo "## E2E AI Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Result:** $RESULT" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run:** [#$RUN_ID]($RUN_URL)" >> $GITHUB_STEP_SUMMARY
          if [ -n "$REPORT_URL" ]; then
            echo "**Report:** [$REF_NAME]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "report/report.md" ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat report/report.md >> $GITHUB_STEP_SUMMARY || true
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exe-e2e-test-logs
          path: |
            e2e/*.log
            e2e/*.txt
            e2e/report/**/*
            e1e-logs/**/*
            *.log
            *.txt
            /tmp/e2e-output.txt
          retention-days: 7

      - name: Destroy container host
        if: always()
        run: |
          if [ -n "${{ steps.vm.outputs.envfile }}" ]; then
            ./ops/ci-vm-destroy.sh "${{ steps.vm.outputs.envfile }}" || true
          fi

      - name: Install uv
        if: always()
        uses: astral-sh/setup-uv@v3

      - name: Post to Slack
        if: always()
        env:
          EXE_SLACK_BOT_TOKEN: ${{ secrets.EXE_SLACK_BOT_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TEST_RESULT: ${{ steps.report.outputs.result }}
          REPORT_URL: ${{ steps.report.outputs.report_url }}
          JOB_STATUS: ${{ steps.run-e2e.outcome }}
        run: |
          set -euo pipefail

          # Determine emoji and status text based on TEST_RESULT (from result.txt)
          if [ "$TEST_RESULT" = "SUCCESS" ]; then
            EMOJI="✅"
            STATUS="passed"
          else
            EMOJI="❌"
            STATUS="failed"
          fi

          # Build a concise message
          MSG="$EMOJI *E2E AI Test $STATUS*"
          MSG="$MSG\n• <$RUN_URL|CI Logs>"
          if [ -n "$REPORT_URL" ]; then
            MSG="$MSG\n• <$REPORT_URL|Test Report>"
          fi

          # Post to Slack
          echo -e "$MSG" > /tmp/slack-msg.txt
          uv run scripts/slack/post_message.py \
            --channel oops \
            --markdown \
            --message-file /tmp/slack-msg.txt

      - name: Update Slack bot ledger
        if: always()
        env:
          EXE_SLACK_BOT_TOKEN: ${{ secrets.EXE_SLACK_BOT_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ steps.run-e2e.outcome }}
        run: |
          set -euo pipefail
          uv run scripts/slack/update_bot_status.py \
            e2e-ai \
            --status "$JOB_STATUS" \
            --run-url "$RUN_URL"
