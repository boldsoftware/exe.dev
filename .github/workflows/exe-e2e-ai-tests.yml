name: exe e2e ai tests

on:
  workflow_dispatch:
  schedule:
    # Run weekly at 6:45 AM UTC on Mondays
    - cron: "45 6 * * 1"

jobs:
  ai-test:
    runs-on: [self-hosted, linux, x64, libvirt]
    environment: ai-testing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "./go.mod"
          cache: true

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup test environment
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # See if tmux is available
          if command -v tmux >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y tmux

      - name: Start container host
        id: vm
        run: |
          set -euo pipefail
          ./ops/ci-vm-start.sh | tee ci-vm-start.log
          ENVFILE=$(tail -n1 ci-vm-start.log)
          echo "envfile=$ENVFILE" >> "$GITHUB_OUTPUT"
          # shellcheck disable=SC1090
          source "$ENVFILE"
          echo "CTR_HOST=ssh://$VM_USER@$VM_IP" >> "$GITHUB_ENV"

      - name: Build exe.dev
        run: |
          go build -o exed ./cmd/exed

      - name: Download latest sketch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use gh CLI to download the latest sketch binary (gh is pre-installed in GitHub Actions)
          gh release download -p 'sketch*linux*amd64' --repo boldsoftware/sketch

          # Find and rename the downloaded binary
          SKETCH_BINARY=$(find . -name 'sketch*linux*amd64' -type f | head -1)
          if [ -z "$SKETCH_BINARY" ]; then
            echo "No sketch linux amd64 binary found after download"
            exit 1
          fi

          mv "$SKETCH_BINARY" sketch
          chmod +x sketch

          # Verify the binary works
          ./sketch --version || echo "sketch binary downloaded successfully"

      - name: Setup headless-shell
        run: |
          docker run --rm --entrypoint "bash" chromedp/headless-shell -c "tar -cvf - /headless-shell/" | tar -xf-
          echo "$PWD/headless-shell" >> $GITHUB_PATH

      - name: Run e2e AI tests
        id: run-e2e
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          cd e2e

          # Execute sketch with the test prompt
          ../sketch -one-shot -skaband-addr= -unsafe -prompt 'read test-prompt.md and follow instructions' 2>&1 | tee /tmp/e2e-output.txt

          # Create a branch with the test report and push to timestamped ref
          if [ -d "report" ] || [ -f "result.txt" ]; then
            # Generate timestamp for unique ref
            TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
            RUN_ID="${{ github.run_id }}"
            REF_NAME="test-report-$TIMESTAMP-run-$RUN_ID"
            export GIT_INDEX_FILE=".git/index-report"

            if [ -d "report" ]; then
              find report -type f -exec git update-index --add {} \;
            fi
            if [ -f "result.txt" ]; then
              git update-index --add result.txt
            fi

            # Create tree object from the index
            TREE_SHA=$(git write-tree)
            printf "E2E test report - %s\n\nWorkflow run: %s/%s/actions/runs/%s\nTriggered by: %s\nCommit: %s\nResult: %s\n" \
              "$TIMESTAMP" \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}" \
              "${{ github.event_name }}" "${{ github.sha }}" "$RESULT" \
              > commit-msg.txt

            COMMIT_SHA=$(git commit-tree $TREE_SHA < commit-msg.txt)
            # Push directly to workflow ref namespace
            git push origin "$COMMIT_SHA:refs/workflow/$REF_NAME"

            # Clean up
            rm -f ".git/index-report" commit-msg.txt
            unset GIT_INDEX_FILE

            # Output the link to the report
            REPO_URL="https://github.com/${{ github.repository }}"
            REPORT_URL="$REPO_URL/tree/$COMMIT_SHA/report/report.md"
            echo "📋 Test report available at: $REPORT_URL"

            # Also output as workflow summary
            echo "## E2E Test Report" >> $GITHUB_STEP_SUMMARY
            echo "**Result:** $RESULT" >> $GITHUB_STEP_SUMMARY
            echo "**Report:** [$REF_NAME]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
            echo "**Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -f "report/report.md" ]; then
              cat report/report.md >> $GITHUB_STEP_SUMMARY || true
            fi
          else
            echo "No report directory or result.txt found - skipping report branch creation"
          fi

          # Check if the test created a result file
          if [ ! -f "result.txt" ]; then
            echo "No result.txt file found - test may not have completed properly"
            exit 1
          fi

          RESULT=$(cat result.txt)
          if [ "$RESULT" != "SUCCESS" ]; then
            echo "E2E test failed with result: $RESULT"
            exit 1
          fi

          exit 0
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exe-e2e-test-logs
          path: |
            e2e/*.log
            e2e/*.txt
            e2e/report/**/*
            *.log
            *.txt
          retention-days: 7

      - name: Destroy container host
        if: always()
        run: |
          if [ -n "${{ steps.vm.outputs.envfile }}" ]; then
            ./ops/ci-vm-destroy.sh "${{ steps.vm.outputs.envfile }}" || true
          fi

      - name: Install uv
        if: always()
        uses: astral-sh/setup-uv@v3

      - name: Post failure to Slack #oops
        if: steps.run-e2e.outcome == 'failure'
        env:
          OUTPUT_PATH: /tmp/e2e-output.txt
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MESSAGE_PATH: /tmp/e2e-oops.txt
          EXE_SLACK_BOT_TOKEN: ${{ secrets.EXE_SLACK_BOT_TOKEN }}
        run: |
          set -euo pipefail
          cp "$OUTPUT_PATH" "$MESSAGE_PATH"
          printf "\n<%s|CI logs>\n" "$RUN_URL" >> "$MESSAGE_PATH"
          uv run scripts/slack/post_message.py \
            --channel oops \
            --markdown \
            --message-file "$MESSAGE_PATH"

      - name: Update Slack bot ledger
        if: always()
        env:
          EXE_SLACK_BOT_TOKEN: ${{ secrets.EXE_SLACK_BOT_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ steps.run-e2e.outcome }}
        run: |
          set -euo pipefail
          uv run scripts/slack/update_bot_status.py \
            e2e-ai \
            --status "$JOB_STATUS" \
            --run-url "$RUN_URL"
