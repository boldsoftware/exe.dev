name: Reusable Tests

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: false
        type: string

jobs:
  test:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Verify go generate output unchanged
        run: |
          set -euo pipefail
          echo "Running 'go generate ./...' to verify generated code is up-to-date..."
          go generate ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ 'go generate ./...' produced uncommitted changes. Commit generated code." >&2
            echo
            echo "Changed files:" >&2
            git status --porcelain >&2
            echo
            echo "Diff:" >&2
            git diff >&2
            exit 1
          fi

      - name: Ensure non-test code doesn't import tslog
        run: |
          set -euo pipefail
          if git grep -n -- 'exe.dev/tslog' -- '*.go' ':!*_test.go'; then
            echo "❌ production code should not import exe.dev/tslog" >&2
            exit 1
          else
            status=$?
            if [ "$status" -ne 1 ]; then
              echo "git grep failed with exit code $status" >&2
              exit "$status"
            fi
          fi

      - name: start ephemeral vm
        id: vm
        run: |
          set -euo pipefail
          ./ops/ci-vm-start.sh | tee ci-vm-start.log
          ENVFILE=$(tail -n1 ci-vm-start.log)
          echo "envfile=$ENVFILE" >> "$GITHUB_OUTPUT"
          # Export CTR_HOST for later steps
          # shellcheck disable=SC1090
          source "$ENVFILE"
          echo "CTR_HOST=ssh://$VM_USER@$VM_IP" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          # Create temp directory for e1e logs
          E1E_LOG_DIR=$(mktemp -d)
          export E1E_LOG_DIR
          echo "E1E_LOG_DIR=$E1E_LOG_DIR" >> "$GITHUB_ENV"

          PKGS=$(go list ./... | grep -v 'exe.dev/e1e/restarttest' | grep -v exe.dev/container)
          gotestsum --format testname -- -race $PKGS
          gotestsum --format testname -- -race exe.dev/container

      - name: Run restart tests
        run: |
          echo DISABLED
          # go test -timeout=5m ./e1e/restarttest

      - name: Check golden files unchanged
        run: |
          if [ -n "$(git status --porcelain e1e/golden/)" ]; then
            echo "❌ Golden files were modified by tests:"
            git status --porcelain e1e/golden/
            echo
            echo "Diff:"
            git diff e1e/golden/
            exit 1
          fi

      - name: Generate asciinema recordings artifact
        run: |
          go run ./cmd/asciinema-viewer e1e recordings.html

      - name: Upload test recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exe-dev-recordings-${{ github.sha }}
          path: recordings.html
          retention-days: 7
        continue-on-error: true

      - name: Upload e1e test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exe-dev-e1e-logs-${{ github.sha }}
          path: ${{ env.E1E_LOG_DIR }}
          retention-days: 7
        continue-on-error: true

      - name: destroy ephemeral vm
        if: always()
        run: |
          if [ -n "${{ steps.vm.outputs.envfile }}" ]; then
            ./ops/ci-vm-destroy.sh "${{ steps.vm.outputs.envfile }}" || true
          fi

      # Please don't delete this.
      # It is useful to uncomment it to test stuff in CI
      # without fear of accidentally merging it.
      # - name: Always fail
      #   run: exit 1
