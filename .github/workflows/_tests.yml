name: Reusable Tests

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: false
        type: string

jobs:
  test:
    runs-on: [self-hosted, linux, x64, libvirt]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Tools Version
        run: |
          go version
          go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen -version

      - name: Verify go generate output unchanged
        run: |
          set -euo pipefail
          echo "Running 'go generate ./...' to verify generated code is up-to-date..."
          go generate ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ 'go generate ./...' produced uncommitted changes. Commit generated code." >&2
            echo
            echo "Changed files:" >&2
            git status --porcelain >&2
            echo
            echo "Diff:" >&2
            git diff >&2
            exit 1
          fi

      - name: Ensure non-test code doesn't import tslog
        run: |
          set -euo pipefail
          if git grep -n -- 'exe.dev/tslog' -- '*.go' ':!*_test.go'; then
            echo "❌ production code should not import exe.dev/tslog" >&2
            exit 1
          else
            status=$?
            if [ "$status" -ne 1 ]; then
              echo "git grep failed with exit code $status" >&2
              exit "$status"
            fi
          fi

      - name: Verify slogcontext linter passes
        run: |
          go build -o /tmp/slogcontext ./tracing/linter/cmd/slogcontext
          go vet -vettool=/tmp/slogcontext ./...

      - name: start ephemeral vm
        id: vm
        run: |
          set -euo pipefail
          ./ops/ci-vm-start.sh | tee ci-vm-start.log
          ENVFILE=$(tail -n1 ci-vm-start.log)
          echo "envfile=$ENVFILE" >> "$GITHUB_OUTPUT"
          # Export CTR_HOST for later steps
          # shellcheck disable=SC1090
          source "$ENVFILE"
          echo "CTR_HOST=ssh://$VM_USER@$VM_IP" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          PKGS=$(go list ./... | grep -v -E '^exe\.dev/(e1e|experiments/imageunpack)$')
          gotestsum --format testname -- -race $PKGS

      - name: Run e1e tests
        run: |
          # This is a separate step from other tests because...
          # well, because there's useful logging in TestMain, particularly on failure.
          # But in its infinite wisdom, gotestsum silently swallows TestMain output, only in CI.
          # https://github.com/gotestyourself/gotestsum/issues/542
          # We can suppress that behavior by setting GITHUB_ACTIONS=false.
          # But then the output is less readable.
          # So we put it in its own step here,
          # so that at least this step can be show/hidden easily.
          # If/when gotestsum gets fixed, we can merge this back into the main test step.

          # Create temp directory for e1e logs
          E1E_LOG_DIR=$(mktemp -d)
          export E1E_LOG_DIR
          echo "E1E_LOG_DIR=$E1E_LOG_DIR" >> "$GITHUB_ENV"
          GITHUB_ACTIONS=false gotestsum --format testname -- -race -timeout=3m ./e1e

      - name: Check golden files unchanged
        run: |
          if [ -n "$(git status --porcelain e1e/golden/)" ]; then
            echo "❌ Golden files were modified by tests:"
            git status --porcelain e1e/golden/
            echo
            echo "Diff:"
            git diff e1e/golden/
            exit 1
          fi

      - name: Generate asciinema recordings artifact
        run: |
          go run ./cmd/asciinema-viewer e1e recordings.html

      - name: Upload test recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exe-dev-recordings-${{ github.sha }}
          path: recordings.html
          retention-days: 7
        continue-on-error: true

      - name: Upload e1e test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exe-dev-e1e-logs-${{ github.sha }}
          path: ${{ env.E1E_LOG_DIR }}
          retention-days: 7
        continue-on-error: true

      - name: destroy ephemeral vm
        if: always()
        run: |
          if [ -n "${{ steps.vm.outputs.envfile }}" ]; then
            ./ops/ci-vm-destroy.sh "${{ steps.vm.outputs.envfile }}" || true
          fi

      # Please don't delete this.
      # It is useful to uncomment it to test stuff in CI
      # without fear of accidentally merging it.
      # - name: Always fail
      #   run: exit 1
