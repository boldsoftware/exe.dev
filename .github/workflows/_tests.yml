name: Reusable Tests

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: false
        type: string

jobs:
  test-non-e1e:
    runs-on: linux-x64-ubuntu-latest-8-core
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod') }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod') }}-

      - name: Verify go generate output unchanged
        run: |
          set -euo pipefail
          echo "Running 'go generate ./...' to verify generated code is up-to-date..."
          go generate ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ 'go generate ./...' produced uncommitted changes. Commit generated code." >&2
            echo
            echo "Changed files:" >&2
            git status --porcelain >&2
            echo
            echo "Diff:" >&2
            git diff >&2
            exit 1
          fi

      - name: Ensure non-test code doesn't import tslog
        run: |
          set -euo pipefail
          if git grep -n -- 'exe.dev/tslog' -- '*.go' ':!*_test.go'; then
            echo "❌ production code should not import exe.dev/tslog" >&2
            exit 1
          else
            status=$?
            if [ "$status" -ne 1 ]; then
              echo "git grep failed with exit code $status" >&2
              exit "$status"
            fi
          fi

      - name: Ensure b2 CLI available
        run: |
          if ! command -v b2 >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            uv tool install b2
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi

      - name: Download exelet-fs
        run: make exelet-fs

      - name: Verify custom linters pass
        run: |
          go build -o /tmp/exelint ./cmd/exelint
          go vet -vettool=/tmp/exelint ./...

      - name: Run tests
        run: |
          PKGS=$(go list ./... | grep -v -E '^exe\.dev/(e1e|e1e/testinfra|e1e/exelets|experiments/imageunpack)$')
          go tool gotestsum --format testname -- -race $PKGS

  test-e1e:
    runs-on: [self-hosted, linux, x64, libvirt]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Ensure b2 CLI available
        run: |
          if ! command -v b2 >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            uv tool install b2
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi

      - name: Download exelet-fs
        run: make exelet-fs

      - name: ensure vm snapshot exists
        id: vm
        run: |
          set -euo pipefail
          ./ops/ci-vm-snapshot.sh | tee ci-vm-snapshot.log

      - name: Run e1e tests
        run: |
          # This is a separate step from other tests because...
          # well, because there's useful logging in TestMain, particularly on failure.
          # But in its infinite wisdom, gotestsum silently swallows TestMain output, only in CI.
          # https://github.com/gotestyourself/gotestsum/issues/542
          # We can suppress that behavior by setting GITHUB_ACTIONS=false.
          # But then the output is less readable.
          # So we put it in its own step here,
          # so that at least this step can be show/hidden easily.
          # If/when gotestsum gets fixed, we can merge this back into the main test step.

          # Remove existing golden files so stale ones don't accumulate.
          # Tests regenerate all needed golden files.
          rm -f e1e/golden/*.txt

          # Create temp directory for e1e logs
          E1E_LOG_DIR=$(mktemp -d)
          export E1E_LOG_DIR
          echo "E1E_LOG_DIR=$E1E_LOG_DIR" >> "$GITHUB_ENV"
          GITHUB_ACTIONS=false go tool gotestsum --format testname -- -race -timeout=3m -failfast ./e1e ./e1e/testinfra

      - name: Check golden files unchanged
        run: |
          if [ -n "$(git status --porcelain e1e/golden/)" ]; then
            echo "❌ Golden files were modified by tests:"
            git status --porcelain e1e/golden/
            echo
            echo "Diff:"
            git diff e1e/golden/

            # Push changes to a recovery branch
            BRANCH="golden-${{ github.run_id }}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add e1e/golden/
            git commit -m "Golden file updates from CI run ${{ github.run_id }}"
            git push origin "HEAD:refs/heads/$BRANCH"

            echo
            echo "📦 Golden file changes pushed to branch: $BRANCH"
            echo "To apply these changes locally:"
            echo "  git fetch origin $BRANCH"
            echo "  git checkout origin/$BRANCH -- e1e/golden/"
            exit 1
          fi

      - name: Generate asciinema recordings artifact
        run: |
          go run ./cmd/asciinema-viewer e1e recordings.html

      - name: Upload test recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exe-dev-recordings-${{ github.sha }}
          path: recordings.html
          retention-days: 7
        continue-on-error: true

      - name: Upload e1e test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exe-dev-e1e-logs-${{ github.sha }}
          path: ${{ env.E1E_LOG_DIR }}
          retention-days: 7
        continue-on-error: true

      - name: Run e1e/exelets tests
        run: |
          # Separate from e1e tests to avoid too many simultaneous VMs.
          GITHUB_ACTIONS=false go tool gotestsum --format testname -- -race -timeout=3m -failfast ./e1e/exelets

      # Please don't delete this.
      # It is useful to uncomment it to test stuff in CI
      # without fear of accidentally merging it.
      # - name: Always fail
      #   run: exit 1
