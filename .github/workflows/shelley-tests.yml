name: Shelley Tests

on:
  push:
    branches:
      - main
    paths:
      - 'shelley/**'
      - '.github/workflows/shelley-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shelley
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: shelley/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: Run TypeScript type check
        run: |
          cd ui
          npm run type-check

      - name: Run ESLint
        run: |
          cd ui
          npm run lint

      - name: Build UI
        run: |
          cd ui
          npm run build

      - name: Run Go tests
        run: go test -v ./...

      - name: Install Playwright browsers
        run: |
          cd ui
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          cd ui
          npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: shelley/ui/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: shelley/ui/test-results/
          retention-days: 7
