name: Shelley Tests

on:
  push:
    branches:
      - main
    paths:
      - "shelley/**"
      - ".github/workflows/shelley-tests.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        required: false
        type: string

concurrency:
  group: shelley-tests
  cancel-in-progress: false

jobs:
  test-go:
    name: Go Tests
    runs-on: [self-hosted, exe-ci]
    defaults:
      run:
        working-directory: shelley
    steps:
      - name: Check if self-hosted
        id: check-host
        working-directory: .
        run: |
          if hostname -f | grep -qE '\.(exe\.dev|exe\.xyz)$'; then
            echo "self_hosted=true" >> "$GITHUB_OUTPUT"
          else
            echo "self_hosted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: shelley/go.mod
          cache: false

      - name: Cache Go modules and build
        if: steps.check-host.outputs.self_hosted != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-shelley-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('shelley/go.mod') }}-${{ hashFiles('shelley/go.sum') }}
          restore-keys: |
            go-shelley-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('shelley/go.mod') }}-
            go-shelley-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install UI dependencies
        run: |
          cd ui
          pnpm install --frozen-lockfile # pnpm has built-in retry with exponential backoff

      - name: Run TypeScript type check
        run: |
          cd ui
          pnpm run type-check

      - name: Run ESLint
        run: |
          cd ui
          pnpm run lint

      - name: Run unit tests
        run: |
          cd ui
          pnpm test

      - name: Build UI
        run: |
          cd ui
          pnpm run build

      - name: Build template tarballs
        run: make templates

      - name: Verify go generate output unchanged
        run: |
          set -euo pipefail
          echo "Running 'go generate ./...' to verify generated code is up-to-date..."
          go generate ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ 'go generate ./...' produced uncommitted changes. Commit generated code." >&2
            echo
            echo "Changed files:" >&2
            git status --porcelain >&2
            echo
            echo "Diff:" >&2
            git diff >&2
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run Go tests
        run: go tool gotestsum --format testname -- -race ./...

  test-ui:
    name: Playwright E2E Tests
    runs-on: [self-hosted, exe-ci]
    defaults:
      run:
        working-directory: shelley
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: shelley/go.mod
          cache: false

      - name: Set up Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install UI dependencies
        run: |
          cd ui
          pnpm install --frozen-lockfile # pnpm has built-in retry with exponential backoff

      - name: Build UI
        run: |
          cd ui
          pnpm run build

      - name: Build template tarballs
        run: make templates

      - name: Build shelley binary
        run: go build -o bin/shelley ./cmd/shelley

      - name: Install Playwright browsers
        run: |
          cd ui
          $GITHUB_WORKSPACE/bin/retry.sh npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          cd ui
          npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: shelley/ui/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results (screenshots, videos, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: shelley/ui/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          echo '### Playwright E2E Results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
