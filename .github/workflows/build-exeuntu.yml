name: Build Exeuntu
run-name: ${{ inputs.commit_subject || format('Build exeuntu ({0})', github.sha) }}

on:
  workflow_dispatch:
    inputs:
      commit_subject:
        description: "Commit subject line"
        required: false
        type: string
      shelley_version:
        description: "Shelley version tag (e.g. v0.89.914374232). Leave empty to match shelley/ tree hash."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  BASE_IMAGE_NAME: boldsoftware/exeuntu

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            shelley_asset: shelley_linux_amd64
          - platform: linux/arm64
            runner: linux-arm64-ubuntu-2404-8-core
            shelley_asset: shelley_linux_arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
        env:
          platform: ${{ matrix.platform }}

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Docker and build tools (ARM64 runner)
        if: matrix.platform == 'linux/arm64'
        run: |
          ./bin/retry.sh sudo apt-get update
          ./bin/retry.sh sudo apt-get install -y ca-certificates curl make
          sudo install -m 0755 -d /etc/apt/keyrings
          # curl --retry instead of retry.sh: single download, curl handles retries natively
          sudo curl -fsSL --retry 5 --retry-all-errors https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          ./bin/retry.sh sudo apt-get update
          ./bin/retry.sh sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
          sudo systemctl start docker
          sudo chmod 666 /var/run/docker.sock

      - name: Find matching Shelley release
        id: find-release
        run: |
          if [ -n "${{ inputs.shelley_version }}" ]; then
            VERSION=$(./scripts/find-shelley-release.py --version="${{ inputs.shelley_version }}")
          else
            TREE_HASH=$(git rev-parse HEAD:shelley)
            VERSION=$(./scripts/find-shelley-release.py "$TREE_HASH")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Shelley
        run: |
          ./scripts/download-shelley.sh "${{ steps.find-release.outputs.version }}" "${{ matrix.shelley_asset }}" exeuntu/shelley
          echo "SHELLEY_VERSION=${{ steps.find-release.outputs.version }}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for base image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./exeuntu
          file: ./exeuntu/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.ref == 'refs/heads/main' }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:cache-${{ env.PLATFORM_PAIR }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:cache-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for versioned tag
        id: meta-versioned
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Create manifest list and push versioned tag
        working-directory: ${{ runner.temp }}/digests
        run: |
          $GITHUB_WORKSPACE/bin/retry.sh docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}@sha256:%s ' *)

      - name: Pull image on exe.dev and exe-staging.dev
        run: |
          TAG="main-$(echo ${{ github.sha }} | head -c 7)"
          echo "Pulling tag: $TAG"

          # Start both pulls in parallel
          curl -fsS --max-time 300 --retry 5 --retry-all-errors --retry-max-time 600 "https://exe.dev/pull-exeuntu-everywhere-517c8a904?tag=$TAG" &
          PROD_PID=$!

          curl -fsS --max-time 300 --retry 5 --retry-all-errors --retry-max-time 600 "https://exe-staging.dev/pull-exeuntu-everywhere-517c8a904?tag=$TAG" &
          STAGING_PID=$!

          # Wait for staging (don't fail if it errors)
          wait $STAGING_PID || echo "Staging pull failed (non-fatal)"

          # Wait for prod
          # TODO: make this fatal eventually
          wait $PROD_PID || echo "Prod failed"

      - name: Extract metadata for latest tag
        id: meta-latest
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Push latest tag
        working-directory: ${{ runner.temp }}/digests
        run: |
          $GITHUB_WORKSPACE/bin/retry.sh docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}@sha256:%s ' *)

      - name: Clear exeuntu:latest tag cache
        run: |
          curl -f --max-time 30 --retry 5 --retry-all-errors "https://exe.dev/clear-exeuntu-latest-cache-517c8a904"
          curl -f --max-time 30 --retry 5 --retry-all-errors "https://exe-staging.dev/clear-exeuntu-latest-cache-517c8a904" || true

      - name: Inspect image
        run: |
          $GITHUB_WORKSPACE/bin/retry.sh docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:latest
