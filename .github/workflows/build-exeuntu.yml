name: Build Exeuntu
run-name: ${{ inputs.commit_subject || github.event.head_commit.message || format('Build exeuntu ({0})', github.sha) }}

on:
  push:
    branches: [main]
    paths:
      - "exeuntu/**"
      - "shelley/**"
      - ".github/workflows/build-exeuntu.yml"
  workflow_dispatch:
    inputs:
      commit_subject:
        description: "Commit subject line"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  BASE_IMAGE_NAME: boldsoftware/exeuntu

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: linux-arm64-ubuntu-2404-8-core
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Install Docker and build tools (ARM64 runner)
        if: matrix.platform == 'linux/arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl make
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
          sudo systemctl start docker
          sudo chmod 666 /var/run/docker.sock

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: shelley/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build shelley for target platform
        run: |
          cd shelley
          platform=${{ matrix.platform }}
          case $platform in
            linux/amd64)
              make build-linux-x86
              cp bin/shelley-linux-x86 ../exeuntu/shelley
              ;;
            linux/arm64)
              make build-linux-aarch64
              cp bin/shelley-linux-aarch64 ../exeuntu/shelley
              ;;
          esac

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for base image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./exeuntu
          file: ./exeuntu/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.ref == 'refs/heads/main' }}
          cache-from: type=gha,scope=base-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=base-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for versioned tag
        id: meta-versioned
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Create manifest list and push versioned tag
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}@sha256:%s ' *)

      - name: Pull image on exe.dev and exe-staging.dev
        run: |
          TAG="main-$(echo ${{ github.sha }} | head -c 7)"
          echo "Pulling tag: $TAG"

          # Start both pulls in parallel
          curl -fsS --max-time 300 "https://exe.dev/pull-exeuntu-everywhere-517c8a904?tag=$TAG" &
          PROD_PID=$!

          curl -fsS --max-time 300 "https://exe-staging.dev/pull-exeuntu-everywhere-517c8a904?tag=$TAG" &
          STAGING_PID=$!

          # Wait for staging (don't fail if it errors)
          wait $STAGING_PID || echo "Staging pull failed (non-fatal)"

          # Wait for prod
          # TODO: make this fatal eventually
          wait $PROD_PID || echo "Prod failed"

      - name: Extract metadata for latest tag
        id: meta-latest
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Push latest tag
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}@sha256:%s ' *)

      - name: Clear exeuntu:latest tag cache
        run: |
          curl -f --max-time 30 "https://exe.dev/clear-exeuntu-latest-cache-517c8a904"
          curl -f --max-time 30 "https://exe-staging.dev/clear-exeuntu-latest-cache-517c8a904" || true

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:latest
