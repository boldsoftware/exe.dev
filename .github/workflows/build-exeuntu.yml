name: Build and Push Exeuntu Images
run-name: ${{ inputs.commit_subject || github.event.head_commit.message || format('Build exeuntu ({0})', github.sha) }}

on:
  push:
    branches: [main]
    paths:
      - "exeuntu/**"
      - "shelley/**"
      - ".github/workflows/build-exeuntu.yml"
  workflow_dispatch:
    inputs:
      commit_subject:
        description: "Commit subject line"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  BASE_IMAGE_NAME: boldsoftware/exeuntu

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for base image
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base Docker image
        id: build-base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./exeuntu/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-base.outputs.tags }}
          labels: ${{ steps.meta-base.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base
