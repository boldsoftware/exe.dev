name: Queue Ralph
run-name: "ralph: ${{ inputs.commit_subject }}"

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      branch:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      commit_subject:
        required: true
        type: string
      actor:
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  investigate-and-fix:
    runs-on: [self-hosted, exe-ci, edric]
    environment: ai-testing
    timeout-minutes: 35
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: 2710433
          private-key: ${{ secrets.EXE_COMMIT_QUEUE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install uv
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            ./bin/retry.sh bash -c 'set -o pipefail; curl -LsSf https://astral.sh/uv/install.sh | sh'
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi

      - name: Download exelet-fs
        run: make exelet-fs

      - name: Build exe-init
        run: make exe-init

      - name: Install Claude Code
        run: |
          CLAUDE_DIR="$HOME/.claude-code"
          ./bin/retry.sh npm install --prefix "$CLAUDE_DIR" @anthropic-ai/claude-code
          echo "$CLAUDE_DIR/node_modules/.bin" >> $GITHUB_PATH

      - name: Configure Claude Code for CI
        run: |
          echo '{"hasCompletedOnboarding": true}' > ~/.claude.json

      - name: Extract Slack user ID
        id: slack
        run: |
          set -euo pipefail
          ACTOR="${{ inputs.actor }}"
          # If the actor is a bot (e.g. autoformatter), resolve the real
          # human from the previous commit's author.
          if [[ "$ACTOR" == *"[bot]"* ]]; then
            ACTOR=$(git log --format='%an' -1 HEAD~1)
          fi
          SLACK_ID=$(python3 -c "
          import json, sys
          actor = '''$ACTOR'''
          team = json.load(open('.github/team.json'))
          for m in team:
              if m.get('github') == actor or actor in m.get('aliases', []) or m.get('name') == actor:
                  print(m['slack_member_id'])
                  sys.exit(0)
          print('')
          ")
          echo "slack_id=$SLACK_ID" >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"

      - name: Record pre-Claude state
        id: before
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Detect flake
        id: flake
        timeout-minutes: 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          COMMIT_SUBJECT: ${{ inputs.commit_subject }}
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"

          # Get CI logs and diff
          gh run view "$RUN_ID" --log 2>&1 | tail -500 > /tmp/ci-logs.txt
          git diff HEAD~1 HEAD > /tmp/commit-diff.txt

          cat > /tmp/flake-prompt.txt <<'PROMPT_EOF'
          You are analyzing a CI test failure. Answer ONLY with the single word YES or NO.

          Question: Are the test failures related to the changes in this commit?

          If the test failures look like they are caused by the commit's changes, answer YES.
          If the test failures look unrelated to the commit (e.g. flaky tests, infrastructure issues, timeouts, network errors, pre-existing failures), answer NO.

          Answer ONLY YES or NO.
          PROMPT_EOF

          echo "" >> /tmp/flake-prompt.txt
          echo "Commit subject: $COMMIT_SUBJECT" >> /tmp/flake-prompt.txt
          echo "" >> /tmp/flake-prompt.txt
          echo "=== COMMIT DIFF ===" >> /tmp/flake-prompt.txt
          cat /tmp/commit-diff.txt >> /tmp/flake-prompt.txt
          echo "" >> /tmp/flake-prompt.txt
          echo "=== CI LOGS (last 500 lines) ===" >> /tmp/flake-prompt.txt
          cat /tmp/ci-logs.txt >> /tmp/flake-prompt.txt

          ANSWER=$(claude --dangerously-skip-permissions -p "$(cat /tmp/flake-prompt.txt)" 2>/dev/null)
          echo "Claude raw answer: $ANSWER"

          # Claude likes to talk. Check whether the response contains NO but
          # not YES. If it contains both or neither, assume the failures are
          # commit-related (not a flake) so Ralph proceeds to fix.
          HAS_YES=$(echo "$ANSWER" | grep -ci '\bYES\b' || true)
          HAS_NO=$(echo "$ANSWER" | grep -ci '\bNO\b' || true)
          echo "YES count: $HAS_YES, NO count: $HAS_NO"
          if [ "$HAS_NO" -gt 0 ] && [ "$HAS_YES" -eq 0 ]; then
            echo "is_flake=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_flake=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Retry on flake
        if: steps.flake.outputs.is_flake == 'true'
        env:
          NTFY_SLACK_WEBHOOK_URL: ${{ secrets.NTFY_SLACK_WEBHOOK_URL }}
          COMMIT_SUBJECT: ${{ inputs.commit_subject }}
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.branch }}"
          RETRY_BRANCH="${BRANCH}-ralphretry"

          # Push to a new queue branch to re-enter the commit queue
          git push --force origin "HEAD:${RETRY_BRANCH}"

          # Notify Slack
          python3 bin/ralph-flake-retry.py "$NTFY_SLACK_WEBHOOK_URL" "$COMMIT_SUBJECT" "$RETRY_BRANCH"

      - name: Run Claude
        if: steps.flake.outputs.is_flake != 'true'
        timeout-minutes: 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          COMMIT_SUBJECT: ${{ inputs.commit_subject }}
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          BRANCH="${{ inputs.branch }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}"

          PROMPT="$(cat <<PROMPT_EOF
          A CI run has failed. Your job is to investigate the failure and fix it.

          Failed CI run: $RUN_URL
          Run ID: $RUN_ID
          Branch: $BRANCH
          Commit subject: $COMMIT_SUBJECT

          ## Step 1: Download and read the CI logs

          Run these commands to get the CI logs:
            gh run view $RUN_ID --log 2>&1 | tail -1000
            gh run download $RUN_ID

          Read the logs carefully to understand what failed.

          ## Step 2: Investigate the failure

          Read the relevant source files and tests to understand what went wrong.

          ## Step 3: Fix the issue

          Make the minimal change needed to fix the problem. Do not refactor or clean up unrelated code.

          ## Step 4: Run the relevant tests locally

          Run the specific tests that failed to verify your fix works. Do NOT run e1e tests (they require VMs).
          Use: go tool gotestsum --format testname -- -race -run TestName ./package/...

          ## Step 5: Commit

          Create a NEW commit (do not amend) with this message format:
            area: fix <description>

            Queue Ralph auto-fix for failed CI run $RUN_URL.

            <What failed>
            <What was fixed>

            Prompt: queue-ralph auto-fix

          Do NOT push or send any notifications; that is handled separately.
          PROMPT_EOF
          )"

          claude --dangerously-skip-permissions -p "$PROMPT"

      - name: Push and notify Slack
        if: always() && steps.flake.outputs.is_flake != 'true'
        env:
          NTFY_SLACK_WEBHOOK_URL: ${{ secrets.NTFY_SLACK_WEBHOOK_URL }}
          COMMIT_SUBJECT: ${{ inputs.commit_subject }}
        run: |
          python3 bin/ralph-notify.py \
            "${{ inputs.branch }}" \
            "$COMMIT_SUBJECT" \
            "${{ steps.slack.outputs.slack_id }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ inputs.run_id }}" \
            "${{ steps.before.outputs.sha }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${{ steps.slack.outputs.actor }}"
