name: Sync Commits Pushed Directly to from Shelley

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  sync-shelley-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: 2710433
          private-key: ${{ secrets.EXE_COMMIT_QUEUE_APP_PRIVATE_KEY }}
          owner: boldsoftware
          repositories: exe,shelley

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for the sync script
          token: ${{ steps.app-token.outputs.token }}

      - name: Run sync script
        id: sync
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url shelley "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/shelley.git" 2>/dev/null || \
            git remote add shelley "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/shelley.git"
          ./bin/retry.sh git fetch shelley
          if ./bin/sync-commits-from-shelley.sh shelley/main; then
            if git tag -l | grep -q "^new-exe-commit$"; then
              git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/exe.git"
              git push origin new-exe-commit:main
              git tag -d new-exe-commit || true
            fi
          else
            echo Sync script failed
            exit 1
          fi
