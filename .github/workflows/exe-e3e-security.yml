name: exe e3e security probe

on:
  workflow_dispatch:
  schedule:
    # Run weekly at 7:15 AM UTC on Mondays (late night pacific, after the e2e tests should have completed)
    # Keep this cron in sync with BOT_EXPECTATIONS inside scripts/slack/check_ci_bot_liveness.py.
    - cron: "15 7 * * 1"

concurrency:
  group: exe-e3e-security
  cancel-in-progress: false

jobs:
  security-probe:
    environment: ai-testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E3E_OUTPUT_PATH: /tmp/e3e-security-output.txt
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "./go.mod"

      - name: Mask secrets
        env:
          CODEX: ${{ secrets.E3E_OPENAI_API_KEY }}
          CLAUDE: ${{ secrets.E3E_ANTHROPIC_API_KEY }}
          SSH_KEY: ${{ secrets.E3E_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for value in "$CODEX" "$CLAUDE" "$SSH_KEY"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done

      - name: Prepare SSH key
        env:
          SSH_KEY: ${{ secrets.E3E_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SSH_KEY" ]; then
            echo "E3E_SSH_PRIVATE_KEY is not configured"
            exit 1
          fi
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/exe-e3e"
          chmod 600 "$HOME/.ssh/exe-e3e"

      - name: Build e3e security probe
        run: |
          set -euo pipefail
          go build -o /tmp/e3e-security ./cmd/e3e

      - name: Run e3e security probe
        id: run-e3e
        continue-on-error: true
        env:
          EXE_E3E_SSH_USER: ${{ secrets.E3E_SSH_USER }}
          EXE_E3E_OPENAI_API_KEY: ${{ secrets.E3E_OPENAI_API_KEY }}
          EXE_E3E_ANTHROPIC_API_KEY: ${{ secrets.E3E_ANTHROPIC_API_KEY }}
          E3E_OUTPUT_PATH: ${{ env.E3E_OUTPUT_PATH }}
        run: |
          set -euo pipefail
          export EXE_E3E_SSH_KEY_PATH="$HOME/.ssh/exe-e3e"
          /tmp/e3e-security 2>&1 | tee "$E3E_OUTPUT_PATH"

      - name: Install uv
        if: always()
        uses: astral-sh/setup-uv@v3

      - name: Post failure to Slack #oops
        if: steps.run-e3e.outcome == 'failure'
        env:
          OUTPUT_PATH: ${{ env.E3E_OUTPUT_PATH }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MESSAGE_PATH: /tmp/e3e-oops.txt
          EXE_SLACK_BOT_TOKEN: ${{ secrets.EXE_SLACK_BOT_TOKEN }}
        run: |
          set -euo pipefail
          cp "$OUTPUT_PATH" "$MESSAGE_PATH"
          printf "\n<%s|CI logs>\n" "$RUN_URL" >> "$MESSAGE_PATH"
          uv run scripts/slack/post_message.py \
            --channel oops \
            --markdown \
            --message-file "$MESSAGE_PATH"

      - name: Update Slack bot ledger
        if: always()
        env:
          EXE_SLACK_BOT_TOKEN: ${{ secrets.EXE_SLACK_BOT_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ steps.run-e3e.outcome }}
        run: |
          set -euo pipefail
          uv run scripts/slack/update_bot_status.py \
            e3e-security \
            --status "$JOB_STATUS" \
            --run-url "$RUN_URL"
