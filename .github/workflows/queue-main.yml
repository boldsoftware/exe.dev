# Simplified Commit Queue
#
# (Force) push to "queue-main-$USER" a potential change, and
# this job will push it main if it passes pre-commit and tests,
# which will run in parallel. The push may fail if the commit
# cannot be pushed cleanly because it needs to be rebased, which
# will happen especially if another developer pushes a change at
# roughly the same time.

name: Commit Queue
run-name: ${{ github.event.head_commit.message }}

on:
  push:
    branches:
      - "queue-*"

# Keep principle of least privilege, but allow cache writes
permissions:
  contents: read
  actions: write

jobs:
  commit-validation-and-formatting:
    name: Commit Validation and Formatting
    runs-on: [self-hosted, exe-ci, edric]
    permissions:
      contents: write # needed for git push
      actions: write # needed to save caches
    outputs:
      commit_sha: ${{ steps.get_commit.outputs.commit_sha }}
      shelley_changed: ${{ steps.changes.outputs.shelley_changed }}
      exe_changed: ${{ steps.changes.outputs.exe_changed }}
      ci_only: ${{ steps.ci_only.outputs.ci_only }}
    steps:
      - name: Check if self-hosted
        id: check-host
        run: |
          if hostname -f | grep -qE '\.(exe\.dev|exe\.xyz)$'; then
            echo "self_hosted=true" >> "$GITHUB_OUTPUT"
          elif test `hostname` = edric; then
            echo "self_hosted=true" >> "$GITHUB_OUTPUT"
          else
            echo "self_hosted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: 2710433
          private-key: ${{ secrets.EXE_COMMIT_QUEUE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch gate files from origin/main
        run: |
          # The gate files (.github/queue-gate-*) live on origin/main so that
          # updates take effect immediately for all queue pushes, even if the
          # pusher hasn't fetched. We need a fresh fetch to read the latest.
          ./bin/retry.sh git fetch origin main

      - name: Verify branch includes required ancestor
        run: |
          set -euo pipefail

          # Read required ancestor from origin/main's gate file.
          REQUIRED_ANCESTOR=$(git show origin/main:.github/queue-gate-ancestor | grep -v '^#' | grep -v '^$' | head -1)
          REQUIRED_ANCESTOR=$(printf '%s' "$REQUIRED_ANCESTOR" | tr -d '[:space:]')

          if ! git merge-base --is-ancestor "$REQUIRED_ANCESTOR" HEAD; then
            echo "❌ ERROR: Your branch does not include commit $REQUIRED_ANCESTOR."
            echo ""
            echo "This commit is required because it fixes a previously-landed bad commit."
            echo "Please fetch origin--be prepared for someone else having force-pushed!--and rebase"
            echo "your work on it."
            echo ""
            echo "********** Please BE CAREFUL NOT TO REINTRODUCE THE BAD COMMIT! **********"
            echo ""
            echo "See .github/queue-gate-ancestor on main for context."
            echo ""
            echo "Then push to the commit queue again."
            exit 1
          fi

          echo "✅ Branch includes required ancestor ($REQUIRED_ANCESTOR)"

      - name: Validate commits for WIP, DO NOT SUBMIT, and VIBES
        run: |
          set -e
          set -o pipefail

          # Read known-bad subjects from origin/main's gate file.
          # Already fetched in the "Fetch gate files" step above.
          mapfile -t KNOWN_BAD_SUBJECTS < <(git show origin/main:.github/queue-gate-bad-subjects | grep -v '^#' | grep -v '^$')

          base_ref="origin/main"
          end_ref="HEAD"

          echo "Validating commits in range ${base_ref}..${end_ref}"

          # Get list of commits to check
          commits=$(git rev-list --reverse "${base_ref}".."${end_ref}" || true)

          if [ -z "$commits" ]; then
              echo "No commits to validate"
              exit 0
          fi

          has_errors=0

          for commit in $commits; do
              echo "Checking commit $(git log --oneline -n 1 $commit)"

              # Get the commit message (subject + body)
              subject=$(git log --format="%s" -n 1 "$commit")
              full_message=$(git log --format="%B" -n 1 "$commit")

              # Check for known-bad commit subjects (reverted commits)
              trimmed_subject=$(printf '%s' "$subject" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              for bad in "${KNOWN_BAD_SUBJECTS[@]}"; do
                if [ "$trimmed_subject" = "$bad" ]; then
                  echo "❌ ERROR: Commit $commit has a known-bad subject (previously reverted): $subject"
                  has_errors=1
                fi
              done

              # Check for WIP in subject line (case insensitive)
              if echo "$subject" | grep -i "WIP" >/dev/null 2>&1; then
                  echo "❌ ERROR: Commit $commit has 'WIP' in subject line: $subject"
                  has_errors=1
              fi

              # Check for VIBES in subject line (case insensitive)
              if echo "$subject" | grep -i "VIBES" >/dev/null 2>&1; then
                  echo "❌ ERROR: Commit $commit has 'VIBES' in subject line: $subject"
                  has_errors=1
              fi

              # Check for "DO NOT SUBMIT" anywhere in the commit message (case insensitive)
              if echo "$full_message" | grep -i "DO NOT SUBMIT" >/dev/null 2>&1; then
                  echo "❌ ERROR: Commit $commit contains 'DO NOT SUBMIT' in commit message"
                  echo "Full message:"
                  echo "$full_message"
                  echo "---"
                  has_errors=1
              fi

              trimmed_message=$(printf '%s' "$full_message" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              if [ -n "$trimmed_message" ] && echo "$trimmed_message" | grep -qE '^[.]+$'; then
                  echo "❌ ERROR: Commit $commit has a message composed only of dots"
                  has_errors=1
              fi

              # Check if this is a merge commit (has more than one parent)
              parent_count=$(git rev-list --parents -n 1 "$commit" | awk '{print NF-1}')
              if [ "$parent_count" -gt 1 ]; then
                  echo "❌ ERROR: Commit $commit is a merge commit: $subject"
                  echo "We use a rebase workflow."
                  has_errors=1
              fi

              # Check for binary files
              binary_files=$(git diff-tree --no-commit-id --numstat -r "$commit" | awk '$1 == "-" && $2 == "-" { print $3 }')
              if [ -n "$binary_files" ]; then
                  if ! echo "$full_message" | grep -q "intentionally committing binary files"; then
                      echo "❌ ERROR: Commit $commit contains binary files: $subject"
                      echo "Binary files:"
                      echo "$binary_files"
                      echo ""
                      echo "If this is intentional, include \"intentionally committing binary files\" in the commit message."
                      has_errors=1
                  fi
              fi
          done

          if [ $has_errors -eq 1 ]; then
              echo ""
              echo "❌ Validation failed! Please fix the above issues and try again."
              echo "Commits with 'WIP' or 'VIBES' in the subject line, 'DO NOT SUBMIT' anywhere in the message, merge commits, or cross-domain changes are not allowed."
              exit 1
          fi

          # Check that each commit touches only one domain:
          # exeuntu/ only, shelley/ only, oss/ only, or neither.
          for commit in $commits; do
              files=$(git diff-tree --no-commit-id --name-only -r "$commit")
              if [ -z "$files" ]; then
                  continue
              fi

              has_exeuntu=false
              has_shelley=false
              has_oss=false
              has_other=false

              while IFS= read -r file; do
                  case "$file" in
                      exeuntu/*) has_exeuntu=true ;;
                      shelley/*) has_shelley=true ;;
                      oss/*)     has_oss=true ;;
                      *)         has_other=true ;;
                  esac
              done <<< "$files"

              count=0
              [ "$has_exeuntu" = true ] && count=$((count + 1))
              [ "$has_shelley" = true ] && count=$((count + 1))
              [ "$has_oss" = true ] && count=$((count + 1))
              [ "$has_other" = true ] && count=$((count + 1))

              if [ "$count" -gt 1 ]; then
                  echo "❌ ERROR: Commit $(git log --oneline -n 1 $commit) mixes files across domains."
                  echo "Each commit must touch only exeuntu/, only shelley/, only oss/, or only other files."
                  echo "Files in this commit:"
                  echo "$files"
                  has_errors=1
              fi
          done

          if [ $has_errors -eq 1 ]; then
              echo ""
              echo "❌ Validation failed! Please fix the above issues and try again."
              exit 1
          fi

          echo "✅ All commits passed validation"

      - name: Check for CI ONLY marker
        id: ci_only
        run: |
          set -euo pipefail
          base_ref="origin/main"
          end_ref="HEAD"
          commits=$(git rev-list --reverse "${base_ref}".."${end_ref}" || true)
          for commit in $commits; do
            subject=$(git log --format="%s" -n 1 "$commit")
            if echo "$subject" | grep -qi "CI ONLY"; then
              echo "🔬 CI ONLY marker found in: $subject"
              echo "   Tests will run but push to main, ralph, and slack notifications will be skipped."
              echo "ci_only=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "ci_only=false" >> "$GITHUB_OUTPUT"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Cache pnpm store
        if: steps.check-host.outputs.self_hosted != 'true'
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('shelley/ui/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install UI dependencies
        run: |
          cd shelley/ui
          pnpm install --frozen-lockfile

      - name: Check and fix formatting
        run: |
          # Run the formatters script
          ./bin/run_formatters.sh

          # Check if anything changed and commit if so
          if ! git diff --quiet; then
            git config --global user.name "Auto-formatter"
            git config --global user.email "bot@exe.dev"
            git add .
            git commit -m "all: fix formatting"
            git push
          else
            echo "No formatting changes needed"
          fi

      - name: Get commit SHA
        id: get_commit
        run: echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Detect changed paths
        id: changes
        run: |
          set -euo pipefail
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files changed"
            echo "shelley_changed=false" >> $GITHUB_OUTPUT
            echo "exe_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          SHELLEY_CHANGED=false
          EXE_CHANGED=false

          while IFS= read -r file; do
            if [[ "$file" == shelley/* ]]; then
              SHELLEY_CHANGED=true
            else
              EXE_CHANGED=true
            fi
          done <<< "$CHANGED_FILES"

          echo "shelley_changed=$SHELLEY_CHANGED" >> $GITHUB_OUTPUT
          echo "exe_changed=$EXE_CHANGED" >> $GITHUB_OUTPUT
          echo "Shelley changed: $SHELLEY_CHANGED, Exe changed: $EXE_CHANGED"

  test:
    needs: [commit-validation-and-formatting]
    if: needs.commit-validation-and-formatting.outputs.exe_changed == 'true'
    uses: ./.github/workflows/_tests.yml
    with:
      ref: ${{ needs.commit-validation-and-formatting.outputs.commit_sha }}
    permissions:
      contents: write # needed by test-e1e to push golden file changes to recovery branch

  shelley-test:
    needs: [commit-validation-and-formatting]
    if: needs.commit-validation-and-formatting.outputs.shelley_changed == 'true'
    uses: ./.github/workflows/shelley-tests.yml
    with:
      ref: ${{ needs.commit-validation-and-formatting.outputs.commit_sha }}

  push-to-main:
    runs-on: [self-hosted, exe-ci, edric]
    needs: [commit-validation-and-formatting, test, shelley-test]
    if: ${{ !cancelled() && !failure() && needs.commit-validation-and-formatting.outputs.ci_only != 'true' }}
    outputs:
      main_sha: ${{ steps.push.outputs.main_sha }}
      main_sha_before: ${{ steps.push.outputs.main_sha_before }}
      commit_log: ${{ steps.push.outputs.commit_log }}
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: 2710433
          private-key: ${{ secrets.EXE_COMMIT_QUEUE_APP_PRIVATE_KEY }}
          owner: boldsoftware
          repositories: exe,shelley,exeuntu,exe.dev

      - name: Abort stale rebase (pre-checkout)
        run: |
          # On self-hosted runners the workspace persists; clear any stale rebase state
          if [ -d .git ]; then
            git rebase --abort || true
            # Ensure no leftover rebase directories remain
            REBASE_MERGE=$(git rev-parse --git-path rebase-merge 2>/dev/null || true)
            REBASE_APPLY=$(git rev-parse --git-path rebase-apply 2>/dev/null || true)
            [ -n "$REBASE_MERGE" ] && rm -rf "$REBASE_MERGE" || true
            [ -n "$REBASE_APPLY" ] && rm -rf "$REBASE_APPLY" || true
          fi
        shell: bash
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.commit-validation-and-formatting.outputs.commit_sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Verify expected commit checked out
        run: |
          set -euo pipefail
          EXPECTED="${{ needs.commit-validation-and-formatting.outputs.commit_sha }}"
          ACTUAL="$(git rev-parse HEAD)"
          echo "Expected commit: $EXPECTED"
          echo "Actual commit:   $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Commit mismatch after checkout; failing push-to-main."
            exit 1
          fi
        shell: bash
      - name: Push to main
        id: push
        run: |
          # Configure git for rebase operations
          git config --global user.name "Auto-rebaser"
          git config --global user.email "bot@exe.dev"

          # Set up HTTPS remotes with app token for shelley and exeuntu
          git remote set-url shelley "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/shelley.git" 2>/dev/null || \
            git remote add shelley "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/shelley.git"
          git remote set-url exeuntu "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/exeuntu.git" 2>/dev/null || \
            git remote add exeuntu "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/exeuntu.git"
          git remote set-url oss "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/exe.dev.git" 2>/dev/null || \
            git remote add oss "https://x-access-token:${APP_TOKEN}@github.com/boldsoftware/exe.dev.git"

          # Try to rebase onto main and push
          ./bin/retry.sh git fetch origin main
          # For debugging, print the current commit and main's commit
          echo "Current HEAD: $(git rev-parse HEAD)"
          echo "Origin main: $(git rev-parse origin/main)"

          # Capture origin/main before the push so we can diff against it after
          ORIGIN_MAIN_BEFORE=$(git rev-parse origin/main)

          # Check if main can be fast-forwarded to HEAD
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "Fast-forward main to HEAD"
          elif git rebase origin/main; then
            echo "Successfully rebased onto main"
          else
            echo "Failed to rebase - conflicts detected"
            exit 1
          fi

          # Dry-run origin push first to fail fast
          git push --dry-run origin HEAD:main

          # Push to subrepos
          bin/push-to-subrepo.sh main shelley shelley
          bin/push-to-subrepo.sh main exeuntu exeuntu
          bin/push-to-subrepo.sh main oss oss

          # Push to origin
          git push origin HEAD:main

          echo "main_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "main_sha_before=$ORIGIN_MAIN_BEFORE" >> $GITHUB_OUTPUT

          {
            echo 'commit_log<<GHEOF'
            git log --format='%h %s' --reverse "$ORIGIN_MAIN_BEFORE"..HEAD | head -15
            echo 'GHEOF'
          } >> "$GITHUB_OUTPUT"

          # Check if exeuntu/, shelley/, or the build workflow were modified
          if git diff --name-only "$ORIGIN_MAIN_BEFORE" HEAD | grep -qE '^(exeuntu|shelley)/|^\.github/workflows/build-exeuntu\.yml$'; then
            echo "exeuntu_or_shelley_changed=true" >> $GITHUB_OUTPUT
          else
            echo "exeuntu_or_shelley_changed=false" >> $GITHUB_OUTPUT
          fi

        env:
          GITHUB_TOKEN: ${{ github.token }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Ensure GitHub CLI installed
        if: steps.push.outputs.exeuntu_or_shelley_changed == 'true'
        run: |
          set -euo pipefail
          if ! command -v gh >/dev/null 2>&1; then
            GH_VERSION="2.79.0"
            TMPDIR="$(mktemp -d)"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" -o "${TMPDIR}/gh.tar.gz"
            tar -xzf "${TMPDIR}/gh.tar.gz" -C "${TMPDIR}"
            sudo install "${TMPDIR}/gh_${GH_VERSION}_linux_amd64/bin/gh" /usr/local/bin/gh
          fi
      - name: Trigger exeuntu build
        if: steps.push.outputs.exeuntu_or_shelley_changed == 'true'
        run: |
          COMMIT_SUBJECT=$(git log -1 --pretty=%s)
          gh workflow run build-exeuntu.yml --ref main -f commit_subject="$COMMIT_SUBJECT"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Delete queue branch if merged
        continue-on-error: true
        run: |
          set -euo pipefail
          QUEUE_BRANCH="${{ github.ref_name }}"
          QUEUE_SHA=$(git ls-remote origin "$QUEUE_BRANCH" | awk '{print $1}')
          ./bin/retry.sh git fetch origin main
          if git merge-base --is-ancestor "$QUEUE_SHA" origin/main; then
            git push --force-with-lease="$QUEUE_BRANCH:$QUEUE_SHA" origin ":refs/heads/$QUEUE_BRANCH"
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

  trigger-ralph:
    runs-on: [self-hosted, exe-ci, edric]
    needs: [commit-validation-and-formatting, test, shelley-test, push-to-main]
    # Only trigger when tests/push failed, NOT when validation failed and NOT for CI ONLY runs.
    # The ci_only guard matters when tests fail during a CI ONLY run (failure() is already
    # false when push-to-main is merely skipped).
    if: ${{ failure() && needs.commit-validation-and-formatting.result == 'success' && needs.commit-validation-and-formatting.outputs.ci_only != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - name: Trigger queue-ralph
        run: |
          gh workflow run queue-ralph.yml \
            -f run_id="${{ github.run_id }}" \
            -f branch="${{ github.ref_name }}" \
            -f commit_subject="$(printf '%s' "$COMMIT_SUBJECT" | head -1)" \
            -f actor="${{ github.actor }}"
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SUBJECT: ${{ github.event.head_commit.message }}

  notify:
    runs-on: [self-hosted, exe-ci, edric]
    needs: [commit-validation-and-formatting, test, shelley-test, push-to-main, trigger-ralph]
    if: ${{ always() && needs.commit-validation-and-formatting.outputs.ci_only != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - name: Notify Slack
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            STATUS=failure
          else
            STATUS=success
          fi
          python3 bin/slack-notify-queue.py "$NTFY_SLACK_WEBHOOK_URL" "$STATUS" "$COMMIT_SUBJECT" "${{ github.actor }}" "$RUN_URL" "$COMMIT_URL" "${{ github.ref_name }}"
        env:
          NTFY_SLACK_WEBHOOK_URL: ${{ secrets.NTFY_SLACK_WEBHOOK_URL }}
          COMMIT_SUBJECT: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.push-to-main.outputs.main_sha }}
          COMMIT_LOG: ${{ needs.push-to-main.outputs.commit_log }}
