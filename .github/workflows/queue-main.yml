# Simplified Commit Queue
#
# (Force) push to "queue-main-$USER" a potential change, and
# this job will push it main if it passes pre-commit and tests,
# which will run in parallel. The push may fail if the commit
# cannot be pushed cleanly because it needs to be rebased, which
# will happen especially if another developer pushes a change at
# roughly the same time.

name: Commit Queue
run-name: ${{ github.event.head_commit.message }}

on:
  push:
    branches:
      - "queue-*"

# Keep principle of least privilege, but allow cache writes
permissions:
  contents: read
  actions: write

jobs:
  commit-validation:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commits for WIP and DO NOT SUBMIT
        run: |
          set -e
          set -o pipefail

          base_ref="origin/main"
          end_ref="HEAD"

          echo "Validating commits in range ${base_ref}..${end_ref}"

          # Get list of commits to check
          commits=$(git rev-list --reverse "${base_ref}".."${end_ref}" || true)

          if [ -z "$commits" ]; then
              echo "No commits to validate"
              exit 0
          fi

          has_errors=0

          for commit in $commits; do
              echo "Checking commit $(git log --oneline -n 1 $commit)"

              # Get the commit message (subject + body)
              subject=$(git log --format="%s" -n 1 "$commit")
              full_message=$(git log --format="%B" -n 1 "$commit")

              # Check for WIP in subject line (case insensitive)
              if echo "$subject" | grep -i "WIP" >/dev/null 2>&1; then
                  echo "❌ ERROR: Commit $commit has 'WIP' in subject line: $subject"
                  has_errors=1
              fi

              # Check for "DO NOT SUBMIT" anywhere in the commit message (case insensitive)
              if echo "$full_message" | grep -i "DO NOT SUBMIT" >/dev/null 2>&1; then
                  echo "❌ ERROR: Commit $commit contains 'DO NOT SUBMIT' in commit message"
                  echo "Full message:"
                  echo "$full_message"
                  echo "---"
                  has_errors=1
              fi
          done

          if [ $has_errors -eq 1 ]; then
              echo ""
              echo "❌ Validation failed! Please fix the above issues and try again."
              echo "Commits with 'WIP' in the subject line or 'DO NOT SUBMIT' anywhere in the message are not allowed."
              exit 1
          fi

          echo "✅ All commits passed validation"

  formatting:
    needs: commit-validation
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: write # needed for git push
      actions: write # needed to save caches
    outputs:
      commit_sha: ${{ steps.get_commit.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gofumpt v0.9.0
        run: |
          curl -L https://github.com/mvdan/gofumpt/releases/download/v0.9.0/gofumpt_v0.9.0_linux_amd64 -o /tmp/gofumpt
          chmod +x /tmp/gofumpt
          sudo mv /tmp/gofumpt /usr/local/bin/gofumpt

      - name: Check and fix formatting
        run: |
          # Apply gofumpt
          find . -name "*.go" -exec gofumpt -w {} +

          # Check if anything changed and commit if so
          if ! git diff --quiet; then
            git config --global user.name "Auto-formatter"
            git config --global user.email "bot@exe.dev"
            git add .
            git commit -m "all: fix formatting"
            git push
          else
            echo "No formatting changes needed"
          fi

      - name: Get commit SHA
        id: get_commit
        run: echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  test:
    needs: [commit-validation, formatting]
    uses: ./.github/workflows/_tests.yml
    with:
      ref: ${{ needs.formatting.outputs.commit_sha }}

  push-to-main:
    runs-on: [self-hosted, linux, x64]
    needs: [commit-validation, formatting, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.formatting.outputs.commit_sha }}
          fetch-depth: 0
      - name: Abort any pending rebase
        run: git rebase --abort || true # '|| true' prevents the step from failing if no rebase is in progress
        shell: bash
      - name: Push to main
        run: |
          # Configure git for rebase operations
          git config --global user.name "Auto-formatter"
          git config --global user.email "bot@exe.dev"

          # Try to rebase onto main and push
          git fetch origin main

          # Check if we can fast-forward
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "Already up to date with main"
            git push origin HEAD:main
          elif git rebase origin/main; then
            echo "Successfully rebased onto main"
            git push origin HEAD:main
          else
            echo "Failed to rebase - conflicts detected"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
