version: "2"
sql:
  - engine: "sqlite"
    queries: "query/"
    schema: "schema/"
    gen:
      go:
        package: "exedb"
        out: "."
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        json_tags_case_style: "snake"
        sql_package: "database/sql"
        emit_db_tags: true
        emit_prepared_queries: true
        overrides:
          - column: "boxes.id"
            go_type: "int"
          - column: "box_ip_shard.box_id"
            go_type: "int"
          - column: "users.created_for_login_with_exe"
            go_type: "bool"
          - column: "users.new_vm_creation_disabled"
            go_type: "bool"
          - column: "email_verifications.is_new_user"
            go_type: "bool"
          - column: "users.is_locked_out"
            go_type: "bool"
          - column: "users.newsletter_subscribed"
            go_type: "bool"
          - column: "vm_templates.featured"
            go_type: "bool"
          - column: "oauth_states.is_new_user"
            go_type: "bool"
          - column: "oauth_states.login_with_exe"
            go_type: "bool"
          - column: "invite_codes.is_batch"
            go_type: "bool"
        rename:
          box_ip_shard: "BoxIPShard"
          ip_shard: "IPShard"
          ssh_server_identity_key: "SSHServerIdentityKey"
          ssh_authorized_keys: "SSHAuthorizedKeys"
          ssh_ca_public_key: "SSHCAPublicKey"
          ssh_host_certificate: "SSHHostCertificate"
          ssh_client_private_key: "SSHClientPrivateKey"
          ssh_port: "SSHPort"
          ssh_user: "SSHUser"
          ssh_key: "SSHKey"
          pending_ssh_key: "PendingSSHKey"
          next_ssh_key_number: "NextSSHKeyNumber"
          new_vm_email: "NewVMEmail"
          aws_ip_shard: "AWSIPShard"
          latitude_ip_shard: "LatitudeIPShard"
          netactuate_ip_shard: "NetActuateIPShard"
          public_ip: "PublicIP"
          vm_name: "VMName"
          vm_prompt: "VMPrompt"
          vm_image: "VMImage"
          avg_rating: "AvgRating"
          rating_count: "RatingCount"
          vm_shortname: "VMShortname"
          anycast_network: "AnycastNetwork"
          global_load_balancer: "GlobalLoadBalancer"
          vm_templates: "VMTemplate"
          template_ratings: "TemplateRating"
          icon_url: "IconURL"
          screenshot_url: "ScreenshotURL"
          exe1_tokens: "Exe1Token"
          exe1: "Exe1"
          exe0: "Exe0"
          github_accounts: "GitHubAccount"
          github_login: "GitHubLogin"
          signup_ip_checks: "SignupIPCheck"
          signup_ip_check: "SignupIPCheck"
