# maddy configuration for exe.dev inbound email
# This file is parameterized - replace {BOX_DOMAIN} with the actual value.
# Prod: exe.xyz
# Staging: exe-staging.xyz
#
# KNOWN LIMITATION: Recipient filtering at RCPT time
#
# Ideally, maddy would reject invalid recipients (wrong domain, nonexistent box)
# at RCPT time BEFORE forwarding to LMTP. This would avoid the LMTP hop entirely
# for invalid destinations.
#
# We tried several approaches that didn't work in maddy 0.8.2:
#   - destination_in regexp ".*\.escaped-box-domain" {...} - inline regexp rejected valid recipients
#   - table.regexp box_domains "pattern" - "unknown config block" error
#   - limits &inbound_limits reference - syntax not supported
#
# Current workaround: LMTP server (execore/lmtp.go) handles all recipient validation.
# This is acceptably fast since validation happens in the Rcpt() method before DATA,
# and invalid recipients get a proper 550 "Mailbox not found" response.
#
# If future maddy versions support named regexp tables or improve destination_in,
# we could add early rejection here with something like:
#   destination_in &box_subdomains { deliver_to lmtp ... }
#   default_destination { reject 550 5.1.1 "Mailbox not found" }

# Global settings
state_dir /var/lib/maddy
runtime_dir /run/maddy
log syslog
hostname mail.{BOX_DOMAIN}

# TLS certificates
# exed manages wildcard certs for *.{BOX_DOMAIN} via DNS-01 and stores them at
# /home/ubuntu/certs/{BOX_DOMAIN} in combined PEM format (key + cert chain).
# maddy reads the same cert file exed uses - no separate ACME needed.
tls file /home/ubuntu/certs/{BOX_DOMAIN} /home/ubuntu/certs/{BOX_DOMAIN} {
    protocols tls1.2 tls1.3
}

# SMTP server for inbound mail (port 25 with STARTTLS)
smtp tcp://0.0.0.0:25 {
    max_message_size 1M

    limits {
        all rate 10 1s
        all concurrency 5
    }

    check {
        dkim
        spf {
            fail_action reject
        }
    }

    # LMTP server handles recipient validation (domain suffix check, box lookup).
    default_source {
        default_destination {
            deliver_to lmtp unix:///var/run/exed/lmtp.sock
        }
    }
}

# SMTP with implicit TLS (port 465)
smtp tls://0.0.0.0:465 {
    max_message_size 1M

    limits {
        all rate 10 1s
        all concurrency 5
    }

    check {
        dkim
        spf {
            fail_action reject
        }
    }

    # LMTP server handles recipient validation (domain suffix check, box lookup).
    default_source {
        default_destination {
            deliver_to lmtp unix:///var/run/exed/lmtp.sock
        }
    }
}
