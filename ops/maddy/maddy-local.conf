# Local maddy configuration for testing inbound email
#
# Usage:
#   1. Start exed (LMTP is enabled by default in local/test stages)
#   2. Create socket directory: sudo mkdir -p /var/run/exed && sudo chown $USER /var/run/exed
#   3. Run maddy: maddy --config ops/maddy/maddy-local.conf run
#   4. Enable email on a VM: ssh exe.dev share receive-email myvm on
#   5. Test: swaks --to test@myvm.exe.cloud --server localhost:2525
#
# Note: Uses exe.cloud domain to match local test environment.

state_dir /tmp/maddy-local/state
runtime_dir /tmp/maddy-local/run
log stderr
debug yes

hostname localhost

# No TLS for local testing
smtp tcp://127.0.0.1:2525 {
    hostname localhost
    tls off
    max_message_size 1M
    debug yes

    # Accept mail for VM subdomains
    # Matches: *@<vm>.exe.cloud or *@<vm>.exe.xyz (rejects apex domain)
    destination_in regexp ".*\.exe\.(cloud|xyz)" "ok" {
        deliver_to lmtp unix:///var/run/exed/lmtp.sock
    }

    # Reject everything else at the door
    default_destination {
        reject 550 5.1.1 "Mailbox not found"
    }
}
