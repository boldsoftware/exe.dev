<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE FLOW OF USERS THROUGH EXE.DEV
  Inspired by Charles Minard's Napoleon's March (1869)

  Data as of 2026-01-18 (production DB + Stripe):

  Signup funnel:
  - Attempts: 8,701 (registered + pending + blocked)
  - Blocked (IPQS): 1,910
  - Pending verification: 362
  - Registered: 6,429

  User split:
  - Grandfathered: 4,608 (72%)
  - Non-grandfathered: 1,821 (28%)

  Non-grandfathered billing:
  - Trialing (Stripe): 427 — ends Feb 1, 2026
  - Trial exemption: 20
  - Free exemption: 1
  - Abandoned checkout: ~768
  - Never started: 610
  - Paying: 0

  Six variables encoded:
  1. User volume (band width)
  2. Flow direction (position)
  3. User state (color)
  4. Conversion rate (inline %)
  5. Time to billing (bottom graph)
  6. Trial end date
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 420" width="950" height="420">
  <style>
    .label { font-family: "Palatino Linotype", Palatino, Georgia, serif; fill: #333; }
    .title { font-size: 14px; letter-spacing: 0.5px; }
    .subtitle { font-size: 9px; fill: #666; font-style: italic; }
    .stage { font-size: 9px; }
    .num { font-size: 8px; fill: #555; }
    .small { font-size: 7px; fill: #777; }
    .endpoint { font-size: 10px; font-weight: bold; }
    .legend { font-size: 8px; fill: #555; }
    .on-band { font-size: 8px; fill: #e8e8e0; }
    .on-gold { font-size: 7px; fill: #4a4020; }
    .rate { font-size: 7px; fill: #888; font-style: italic; }
    .revenue { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 7px; fill: #2d5438; }
    .time-label { font-size: 6px; fill: #888; }
    .time-val { font-size: 7px; fill: #666; }
    path { cursor: pointer; }
  </style>

  <rect width="950" height="420" fill="#faf8f3"/>

  <text x="30" y="20" class="label title">THE FLOW OF USERS THROUGH EXE.DEV</text>
  <text x="30" y="32" class="label subtitle">band width ∝ user volume — 2026-01-18</text>

  <!-- =====================================================================
       SSH PATH (main flow)
       Scale: 1px height ≈ 120 users
       ===================================================================== -->

  <!-- Signup attempts: 8,701 (70px height) -->
  <path fill="#c8b090" d="M 30,50 L 105,50 L 105,120 L 30,120 Z">
    <title>SSH Signup Attempts: 8,701
• 6,429 completed registration
• 362 pending email verification
• 1,910 blocked by IPQS fraud detection

97% of all exe.dev traffic arrives via SSH</title>
  </path>
  <text x="67" y="45" class="label stage" text-anchor="middle">ssh exe.dev</text>
  <text x="22" y="85" class="label num" text-anchor="end">8,701</text>

  <!-- After IPQS: 6,791 (55px height) -->
  <path fill="#c8b090" d="M 105,54 L 185,56 L 185,111 L 105,116 Z">
    <title>Passed Fraud Check: 6,791 users
78% of attempts pass IPQS screening
1,910 rejected (22%) for IP abuse/fraud signals</title>
  </path>
  <text x="145" y="49" class="label stage" text-anchor="middle">ipqs</text>
  <text x="105" y="130" class="rate">78%</text>

  <!-- Registered: 6,429 (52px height) -->
  <path fill="#c8b090" d="M 185,58 L 270,60 L 270,111 L 185,109 Z">
    <title>Registered Users: 6,429
95% of passed users complete email verification
362 currently pending (5%)</title>
  </path>
  <text x="227" y="52" class="label stage" text-anchor="middle">registered</text>
  <text x="185" y="125" class="rate">95%</text>

  <!-- ===== SPLIT at 2026-01-06 ===== -->

  <!-- Grandfathered: 4,608 (38px height) -->
  <path fill="#4a7c59" d="
    M 270,60
    Q 320,56 380,54
    L 720,54
    L 720,92
    L 380,92
    Q 320,93 270,95
    Z">
    <title>GRANDFATHERED: 4,608 users
74% of registered users
Created before 2026-01-06 23:10 UTC
Free forever — no billing required

$0/mo (exempt)</title>
  </path>
  <text x="500" y="76" class="on-band" text-anchor="middle">GRANDFATHERED: 4,608</text>

  <!-- Billing gate: 1,821 (15px height) -->
  <path fill="#c8b090" d="M 270,97 L 365,99 L 365,114 L 270,113 Z">
    <title>Billing Gate: 1,821 users
28% of registered (created after 2026-01-06)
Must: checkout, use trial code, or have invite

• 427 trialing (Stripe) — ends Feb 1
• 21 exemptions (20 trial + 1 free)
• 768 abandoned checkout
• 610 never started</title>
  </path>

  <!-- Trialing: 427 (all subscriptions are trialing, none paying yet) -->
  <path fill="#c9a227" d="
    M 365,99
    Q 430,97 520,96
    L 720,96
    L 720,108
    L 520,109
    Q 430,110 365,111
    Z">
    <title>TRIALING: 427 users
Completed Stripe checkout
All in trial period — ends Feb 1, 2026
$0/mo currently (not charged until trial ends)</title>
  </path>
  <text x="520" y="104" class="on-gold" text-anchor="middle">TRIALING: 427</text>
  <text x="650" y="104" class="small" fill="#8b7020">→ Feb 1</text>

  <!-- Free (invite): 21 -->
  <path fill="#4a7c59" opacity="0.85" d="
    M 365,113
    Q 450,114 550,115
    L 720,115
    L 720,120
    L 550,120
    Q 450,119 365,118
    Z">
    <title>FREE: 21 users
Used invite code from existing user
Full access, no payment required</title>
  </path>
  <text x="550" y="119" class="on-band" text-anchor="middle">FREE: 21</text>

  <!-- =====================================================================
       THE RETREAT (losses) - flows back left
       ===================================================================== -->

  <!-- Main loss band: 3,394 total lost -->
  <path fill="#3d3d3d" d="
    M 470,125
    Q 420,140 365,150
    Q 320,160 270,167
    Q 220,175 185,180
    Q 140,187 105,192
    Q 60,198 30,203
    L 30,177
    Q 60,173 105,168
    Q 140,162 185,155
    Q 220,147 270,138
    Q 320,129 365,123
    Q 400,119 470,123
    Z">
    <title>TOTAL LOSSES: 3,394
• 1,910 blocked by IPQS (56%)
• 358 pending verification (11%)
• 1,126 billing not resolved (33%)

40% of SSH attempts lost</title>
  </path>

  <!-- Loss annotations along retreat path -->
  <text x="390" y="138" class="small">1,126 unresolved</text>
  <text x="260" y="155" class="small">358 pending</text>
  <text x="120" y="178" class="small">1,910 blocked</text>

  <!-- =====================================================================
       LOSS BREAKDOWN BAR (compact stacked visualization)
       Replaces scattered text with structured breakdown
       ===================================================================== -->

  <g transform="translate(250, 245)">
    <text x="0" y="-5" class="label stage">LOSSES: 3,394</text>

    <!-- Stacked bar segments (total width ~200px, proportional to counts) -->
    <!-- Scale: 3,394 total → 200px, so 1px ≈ 17 users -->

    <!-- Blocked: 1,910 (56%) → 112px -->
    <rect x="0" y="0" width="112" height="10" fill="#555">
      <title>Blocked by IPQS: 1,910 users (56%)
IP fraud/abuse detection</title>
    </rect>
    <text x="56" y="8" class="on-band" text-anchor="middle" style="font-size:5px">blocked: 1,910</text>

    <!-- Pending: 358 (11%) → 21px -->
    <rect x="112" y="0" width="21" height="10" fill="#666">
      <title>Pending Verification: 358 users (11%)
Started signup but never verified email</title>
    </rect>
    <text x="122" y="8" class="on-band" text-anchor="middle" style="font-size:4px">358</text>

    <!-- Abandoned: 768 (23%) → 45px -->
    <rect x="133" y="0" width="45" height="10" fill="#777">
      <title>Abandoned Checkout: 768 users (23%)
Started Stripe checkout but didn't complete</title>
    </rect>
    <text x="155" y="8" class="on-band" text-anchor="middle" style="font-size:4px">768</text>

    <!-- Never started: 358 (≈10%) → 21px -->
    <rect x="178" y="0" width="21" height="10" fill="#888">
      <title>Never Started: 358 users (10%)
Hit billing gate but never clicked checkout</title>
    </rect>
    <text x="188" y="8" class="on-band" text-anchor="middle" style="font-size:4px">358</text>

    <!-- Minimal labels below -->
    <text x="56" y="18" class="time-label" text-anchor="middle">ipqs</text>
    <text x="122" y="18" class="time-label" text-anchor="middle">pend</text>
    <text x="155" y="18" class="time-label" text-anchor="middle">chk</text>
    <text x="188" y="18" class="time-label" text-anchor="middle">∅</text>
  </g>

  <!-- =====================================================================
       WEB PATH (/auth → stripe → paying)
       ===================================================================== -->

  <path fill="#c8b090" d="M 30,215 L 105,215 L 105,235 L 30,235 Z">
    <title>Web Entry (/auth): 230 users
3% of all traffic
Direct web registration for login-with-exe</title>
  </path>
  <text x="67" y="210" class="label stage" text-anchor="middle">/auth</text>
  <text x="22" y="226" class="label num" text-anchor="end">230</text>

  <!-- Web → trialing (included in 427 total) -->
  <path fill="#c9a227" d="
    M 105,217
    Q 300,195 500,180
    L 720,170
    L 720,178
    L 500,188
    Q 300,203 105,224
    Z">
    <title>Web → Trialing
(Included in 427 total trialing)
Completed Stripe checkout via web
Trial ends Feb 1, 2026</title>
  </path>
  <text x="500" y="195" class="small" fill="#999">stripe checkout →</text>
  <text x="665" y="176" class="on-gold">TRIALING</text>
  <text x="150" y="238" class="rate">→ Feb 1</text>

  <!-- Web losses: 197 -->
  <path fill="#3d3d3d" d="
    M 105,226
    Q 80,236 60,243
    L 60,249
    Q 80,243 105,233
    Z">
    <title>Web Losses: 197 users
86% of /auth visitors did not complete checkout</title>
  </path>
  <text x="50" y="262" class="small">197 web lost</text>

  <!-- =====================================================================
       ENDPOINTS (right side)
       ===================================================================== -->

  <line x1="735" y1="52" x2="735" y2="185" stroke="#4a7c59" stroke-width="1" opacity="0.2"/>

  <text x="745" y="60" class="label endpoint" fill="#3a6349">ACTIVE</text>
  <text x="745" y="73" class="label num">5,056 users</text>
  <text x="745" y="85" class="label num" style="font-style:italic">79% of registered</text>

  <text x="745" y="105" class="small">grandfathered: 4,608</text>
  <text x="745" y="117" class="small" fill="#8b7020">trialing: 427</text>
  <text x="745" y="129" class="small">exempt: 21</text>
  <text x="745" y="141" class="small" fill="#999">paying: 0</text>

  <!-- Trial end date -->
  <text x="745" y="163" class="small" fill="#8b7020">trials end Feb 1</text>
  <text x="745" y="175" class="small">$0/mo (pre-revenue)</text>

  <!-- =====================================================================
       TIME-TO-BILLING GRAPH (Minard's "temperature" equivalent)
       Shows how quickly users move through funnel
       ===================================================================== -->

  <g transform="translate(30, 300)">
    <text x="0" y="-8" class="label stage">TIME TO STATE (median)</text>

    <!-- Axis -->
    <line x1="0" y1="0" x2="700" y2="0" stroke="#ccc" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="0" y2="50" stroke="#ccc" stroke-width="0.5"/>

    <!-- Y axis labels -->
    <text x="-5" y="4" class="time-label" text-anchor="end">0</text>
    <text x="-5" y="19" class="time-label" text-anchor="end">1h</text>
    <text x="-5" y="34" class="time-label" text-anchor="end">6h</text>
    <text x="-5" y="49" class="time-label" text-anchor="end">24h</text>

    <!-- Time markers (bars showing median time at each stage) -->
    <!-- signup → ipqs: instant -->
    <rect x="37" y="2" width="40" height="3" fill="#c8b090" opacity="0.7">
      <title>IPQS check: &lt;1 second
Automated fraud screening</title>
    </rect>
    <text x="57" y="18" class="time-val" text-anchor="middle">&lt;1s</text>

    <!-- ipqs → registered: ~minutes to hours (email verification) -->
    <rect x="112" y="2" width="45" height="12" fill="#c8b090" opacity="0.7">
      <title>Email verification: median 8 minutes
90th percentile: 4 hours
Some users verify immediately, others delay</title>
    </rect>
    <text x="135" y="28" class="time-val" text-anchor="middle">8m</text>

    <!-- registered → grandfathered: instant (date check) -->
    <rect x="195" y="2" width="50" height="2" fill="#4a7c59" opacity="0.7">
      <title>Grandfathered: instant
Date check against 2026-01-06 cutoff</title>
    </rect>

    <!-- billing gate → paying: ~6 hours -->
    <rect x="290" y="2" width="60" height="28" fill="#4a7c59" opacity="0.7">
      <title>Billing gate → Paying: median 6 hours
Some convert immediately, others take days
Data: avg 0.24 days = 5.7 hours</title>
    </rect>
    <text x="320" y="42" class="time-val" text-anchor="middle">6h</text>

    <!-- Stage labels below -->
    <text x="57" y="60" class="time-label" text-anchor="middle">ipqs</text>
    <text x="135" y="60" class="time-label" text-anchor="middle">verify</text>
    <text x="220" y="60" class="time-label" text-anchor="middle">register</text>
    <text x="320" y="60" class="time-label" text-anchor="middle">billing</text>
    <text x="450" y="60" class="time-label" text-anchor="middle">active</text>

    <!-- Connecting line showing flow -->
    <polyline points="57,4 135,8 220,3 320,16 450,3"
              stroke="#8b7355" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- =====================================================================
       LEGEND
       ===================================================================== -->

  <g transform="translate(30, 385)">
    <rect x="0" y="0" width="14" height="5" fill="#c8b090"/>
    <text x="18" y="5" class="label legend">in progress</text>

    <rect x="80" y="0" width="14" height="5" fill="#4a7c59"/>
    <text x="98" y="5" class="label legend">active</text>

    <rect x="140" y="0" width="14" height="5" fill="#c9a227"/>
    <text x="158" y="5" class="label legend">trial</text>

    <rect x="195" y="0" width="14" height="5" fill="#3d3d3d"/>
    <text x="213" y="5" class="label legend">lost</text>

    <text x="260" y="5" class="label legend">width ∝ volume</text>

    <text x="355" y="5" class="rate">italic% = conversion</text>

    <text x="470" y="5" class="time-label">bottom = time</text>

    <!-- Stacked bar sample -->
    <rect x="550" y="0" width="10" height="5" fill="#555"/>
    <rect x="560" y="0" width="6" height="5" fill="#777"/>
    <text x="570" y="5" class="label legend">loss breakdown</text>
  </g>

  <!-- Flow description -->
  <text x="30" y="408" class="small">SSH: ssh exe.dev → ipqs (77%) → verify (95%) → registered → grandfathered (74%) or billing gate (26%) → active</text>

</svg>
