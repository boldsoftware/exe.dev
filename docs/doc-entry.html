<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exe docs: {{.Entry.Title}}</title>
    <link rel="stylesheet" href="/static/exe.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
	overscroll-behavior: none;
      }

      body {
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        line-height: 1.6;
        color: #414141;
        background-color: #fffff8;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.02) 0px,
          rgba(0, 0, 0, 0.02) 2px,
          transparent 2px,
          transparent 4px
        );
        background-size: 4px 4px;
        font-size: 16px;
      }

      /* Navigation */
      header {
        padding: 16px 24px;
        border-bottom: 1px solid #e5e5e5;
        background: #ffffff;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 32px;
      }

      .nav-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 18px;
        color: #000000;
        text-decoration: none;
        white-space: nowrap;
      }

      .nav-logo img {
        width: 30px;
        height: 30px;
        flex-shrink: 0;
      }

      .nav-links {
        display: flex;
        gap: 24px;
      }

      .nav-links a {
        color: #414141;
        text-decoration: none;
        font-size: 14px;
      }

      .nav-links a:hover {
        color: #000000;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .btn {
        padding: 8px 16px;
        border: 1px solid #e5e5e5;
        background: #ffffff;
        color: #414141;
        text-decoration: none;
        font-size: 14px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }

      .btn:hover {
        background: #f5f5f5;
        border-color: #d0d0d0;
      }

      .btn-primary {
        background: #000000;
        color: #ffffff;
        border-color: #000000;
      }

      .btn-primary:hover {
        background: #333333;
      }

      /* Layout */
      .container {
        display: flex;
        max-width: 1200px;
        margin: 48px auto 96px;
        gap: 40px;
        align-items: flex-start;
        padding: 0 24px;
      }

      /* Sidebar */
      .sidebar {
        width: 240px;
        flex: 0 0 240px;
        padding: 32px 24px;
        background: rgba(255, 255, 248, 0.95);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 20px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
        position: sticky;
        top: 120px;
        max-height: calc(100vh - 144px);
        overflow-y: auto;
      }

      .sidebar-heading {
        color: #000000;
        font-weight: 600;
        margin: 24px 0 12px 0;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .sidebar-heading:first-child {
        margin-top: 0;
      }

      .sidebar-link {
        display: block;
        color: #666666;
        text-decoration: none;
        padding: 6px 0;
        font-size: 14px;
        margin-left: 8px;
        line-height: 1.4;
      }

      .sidebar-link:hover {
        color: #000000;
      }

      .sidebar-link.active {
        color: #000000;
        font-weight: 600;
      }

      /* Main Content */
      .main {
        flex: 1;
        min-width: 0;
        padding: 72px 80px;
        background: rgba(255, 255, 248, 0.95);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 28px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
      }

      h1 {
        font-size: 36px;
        font-weight: 400;
        color: #000000;
        margin-bottom: 16px;
        line-height: 1.2;
        letter-spacing: -0.01em;
      }

      .doc-content {
        max-width: 800px;
        font-size: 16px;
        line-height: 1.7;
        color: #333333;
      }

      .doc-content p {
        margin-bottom: 20px;
      }

      .doc-content h1 {
        font-size: 28px;
        font-weight: 600;
        color: #000000;
        margin: 48px 0 24px 0;
        line-height: 1.3;
      }

      .doc-content h2 {
        font-size: 24px;
        font-weight: 600;
        color: #000000;
        margin: 40px 0 20px 0;
        line-height: 1.3;
      }

      .doc-content h3 {
        font-size: 20px;
        font-weight: 600;
        color: #000000;
        margin: 32px 0 16px 0;
        line-height: 1.3;
      }

      .doc-content ul,
      .doc-content ol {
        margin: 20px 0;
        padding-left: 24px;
      }

      .doc-content li {
        margin-bottom: 8px;
      }

      .doc-content a {
        color: #0066cc;
        text-decoration: underline;
      }

      .doc-content a:hover {
        color: #004499;
      }

      .doc-content code {
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 14px;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      }

      .doc-content pre {
        background: #f8f8f8;
        padding: 24px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 24px 0;
        font-size: 14px;
        line-height: 1.5;
        border: 1px solid #e5e5e5;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      }

      .doc-content pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: inherit;
      }

      .doc-content blockquote {
        margin: 24px 0;
        padding: 20px;
        border-left: 4px solid #e5e5e5;
        background: #fafafa;
        font-style: italic;
      }

      .doc-footer {
        margin-top: 80px;
        padding-top: 24px;
        border-top: 1px dotted #cccccc;
      }

      .doc-footer a {
        color: #666666;
        text-decoration: none;
        font-size: 14px;
      }

      .doc-footer a:hover {
        color: #000000;
      }

      /* Mobile Navigation */
      .mobile-nav-toggle {
        display: none;
        background: #f8f8f8;
        border: 1px solid #e5e5e5;
        padding: 12px 16px;
        margin: 24px;
        border-radius: 6px;
        cursor: pointer;
        text-align: center;
        font-size: 14px;
        color: #666666;
      }

      .mobile-nav-content {
        display: block;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .container {
          flex-direction: column;
          gap: 24px;
          padding: 0 20px;
          margin: 24px auto 72px;
        }

        .sidebar {
          width: 100%;
          position: static;
          max-height: none;
          padding: 24px 20px;
        }

        .mobile-nav-toggle {
          display: block;
        }

        .mobile-nav-content {
          display: none;
          padding: 0;
        }

        .mobile-nav-content.show {
          display: block;
        }

        .main {
          padding: 40px 24px;
          border-radius: 20px;
        }

        .doc-title {
          font-size: 30px;
        }

        .nav-links {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <header>
      <div class="nav-container">
        <div class="nav-left">
          <a href="/" class="nav-logo">
            <img src="/static/exy.png" alt="exe.dev logo" />
            exe.dev
          </a>
          <div class="nav-links">
            <a href="/docs">docs</a>
            <a href="/soon">waitlist</a>
          </div>
        </div>
        <div class="nav-right">
          <a href="/soon" class="btn">Join the waitlist</a>
        </div>
      </div>
    </header>

    <div class="container">
      <!-- Sidebar Navigation -->
      <div class="sidebar" role="navigation" aria-label="Documentation sections">
        <!-- Mobile Table of Contents Toggle -->
        <div class="mobile-nav-toggle" onclick="toggleMobileNav()">📚 Table of Contents</div>

        <div class="mobile-nav-content" id="mobileNavContent">
          {{range .Groups}}
          <div class="sidebar-heading">{{.Heading}}</div>
          {{range .Docs}}
          <a href="{{.Path}}" class="sidebar-link{{if eq .Path $.Entry.Path}} active{{end}}">
            {{.Title}}
          </a>
          {{end}} {{end}}
        </div>
      </div>

      <!-- Main Content -->
      <main class="main">
        {{with .Entry}}
        <h1 class="doc-title">{{.Title}}</h1>

        <div class="doc-content">{{.Content}}</div>
        {{end}}

        <footer class="doc-footer">
          <a href="https://exe.dev">exe.dev</a>
        </footer>
      </main>
    </div>

    <script>
      function toggleMobileNav() {
        const content = document.getElementById("mobileNavContent");
        content.classList.toggle("show");
      }
    </script>
  </body>
</html>
