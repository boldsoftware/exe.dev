<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Entry.Title}}{{if and .ShowHidden (not .Entry.Published)}} [draft]{{end}} - exe.dev blog</title>
    <meta name="description" content="{{.Entry.Description}}">
    <link rel="canonical" href="https://blog.exe.dev{{.Entry.Path}}">
    <meta property="og:title" content="{{.Entry.Title}} - exe.dev blog">
    <meta property="og:description" content="{{.Entry.Description}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://blog.exe.dev{{.Entry.Path}}">
    <meta property="og:site_name" content="exe.dev">
    <meta property="article:published_time" content="{{.Entry.DateString}}">
    <meta property="article:author" content="{{.Entry.Author}}">
    <link rel="stylesheet" href="/static/exe.css" />
    <link rel="alternate" type="application/atom+xml" title="exe.dev blog" href="https://blog.exe.dev/atom.xml" />
    {{template "topbar_style" .}}
    <style>
      body {
        font-family:
          "Charter", "Charter Roman", "ITC Charter", "STIX Two Text", "Hoefler Text",
          "Iowan Old Style", "Palatino", "Palatino Linotype", "URW Palladio L",
          Georgia, "Times New Roman", serif;
        font-size: 16px;
        font-size-adjust: 0.48;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        background: #fff;
        color: #1f1f1f;
        margin: 0;
      }

      main {
        max-width: 720px;
        margin: 64px auto 120px;
        padding: 0 24px;
      }

      .post-header {
        margin-bottom: 48px;
      }

      .post-title {
        font-size: 40px;
        font-weight: 400;
        letter-spacing: -0.01em;
        margin-bottom: 12px;
      }

      .post-meta {
        font-size: 13px;
        color: rgba(0, 0, 0, 0.6);
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }

      .post-meta span {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .unpublished-note {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(0, 0, 0, 0.55);
        margin-left: 8px;
      }

      .post-content {
        font-size: 17px;
        line-height: 1.75;
        color: #2c2c2c;
      }

      .post-content h1,
      .post-content h2,
      .post-content h3,
      .post-content h4 {
        margin: 48px 0 16px 0;
        font-weight: 600;
        line-height: 1.3;
        color: #111;
      }

      /* Tame global h1 sizing for in-article headings */
      .post-content h1 { font-size: 32px; }
      .post-content h2 { font-size: 26px; }
      .post-content h3 { font-size: 22px; }
      .post-content h4 { font-size: 18px; }

      .post-content p {
        margin-bottom: 22px;
      }

      .post-content ul,
      .post-content ol {
        padding-left: 28px;
        margin-bottom: 22px;
      }

      .post-content a {
        color: #0054d1;
        text-decoration: underline;
      }

      .post-content blockquote {
        margin: 32px 0;
        padding: 20px 24px;
        border-left: 4px solid rgba(0, 0, 0, 0.08);
        background: #f6f6f0;
        border-radius: 14px;
        font-style: italic;
        font-size: 18px;
        white-space: normal;
        overflow-x: visible;
      }

      .post-content blockquote p {
        margin: 0 0 16px;
      }

      .post-content blockquote p:last-child {
        margin-bottom: 0;
      }

      /* Fenced code blocks */
      .post-content pre.code {
        background: #f6f6f0;
        padding: 20px;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 15px;
        line-height: 1.6;
      }

      /* Tab-indented blocks: wrap text, inherit font */
      .post-content pre.indented {
        background: transparent;
        padding: 12px 0;
        border-radius: 0;
        overflow-x: visible;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 17px;
        line-height: 1.75;
      }
      .post-content pre.indented code { font-family: inherit; }

      .post-footer {
        margin-top: 64px;
        padding-top: 32px;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
      }

      .post-footer a {
        color: #0054d1;
        text-decoration: none;
      }

      @media (max-width: 768px) {
        main {
          margin: 32px auto 80px;
          padding: 0 16px;
        }

        .post-title {
          font-size: 32px;
        }

        .post-content h1 { font-size: 28px; }
        .post-content h2 { font-size: 24px; }
        .post-content h3 { font-size: 20px; }
        .post-content h4 { font-size: 18px; }

        .post-meta {
          flex-direction: column;
          gap: 8px;
        }
      }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        body {
          background: #111;
          color: #e5e5e5;
        }

        .post-title {
          color: #f3f4f6;
        }

        .post-meta {
          color: rgba(255, 255, 255, 0.6);
        }

        .unpublished-note {
          color: rgba(255, 255, 255, 0.55);
        }

        .post-content {
          color: #d1d5db;
        }

        .post-content h1,
        .post-content h2,
        .post-content h3,
        .post-content h4 {
          color: #f3f4f6;
        }

        .post-content a {
          color: #60a5fa;
        }

        .post-content blockquote {
          border-left-color: rgba(255, 255, 255, 0.15);
          background: #1a1a1a;
        }

        .post-content pre.code {
          background: #1a1a1a;
        }

        .post-content img[src$=".svg"] {
          filter: invert(1) hue-rotate(180deg);
        }

        .post-footer {
          border-top-color: rgba(255, 255, 255, 0.1);
        }

        .post-footer a {
          color: #60a5fa;
        }
      }
    </style>
  </head>
  <body>
    {{template "topbar" .}}
    <main>
      <header class="post-header">
        <h1 class="post-title">{{.Entry.Title}}</h1>
        <div class="post-meta">
          <span>{{.Entry.DateString}}</span>
          <span>
            {{.Entry.Author}}
            {{if and .ShowHidden (not .Entry.Published)}}
            <span class="unpublished-note">[unpublished]</span>
            {{end}}
          </span>
        </div>
      </header>
      <article class="post-content">{{.Entry.Content}}</article>
      <footer class="post-footer">
        <a href="/">&larr; All posts</a>
      </footer>
    </main>
  </body>
</html>
